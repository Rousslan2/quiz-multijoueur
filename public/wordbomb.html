<!DOCTYPE html>
<html lang="fr" data-zp-game="wordbomb">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="/zp-loader.css">
<title>ZapPlay — Word Bomb</title>
<style>
:root{
  --primary:#00E8D4;--buzz:#FF7033;--ok:#22c55e;--bad:#ef4444;--gold:#fbbf24;
  --text:#E8E8F0;--muted:#7A8098;--card:#12121f;--border:rgba(0,232,212,.10)
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Exo 2',sans-serif;
  
  color:var(--text);height:100dvh;overflow:hidden
}
#app{max-width:860px;margin:0 auto;height:100dvh;padding:56px 12px 14px;display:flex;flex-direction:column;gap:12px}
#back{position:fixed;top:8px;left:8px;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 10px}
#sound-btn{position:fixed;top:8px;right:34px;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:1rem}
#dot{position:fixed;top:10px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--bad)}#dot.ok{background:var(--ok)}
h1{text-align:center;font-size:1.9rem;background:linear-gradient(135deg,var(--primary),var(--buzz));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
  border:1px solid var(--border);border-radius:14px;padding:12px;
  backdrop-filter:blur(8px)
}
.hidden{display:none!important}
.spectate-strip{display:none;margin:0 0 10px;padding:8px 12px;text-align:center;font-size:.76rem;font-weight:700;color:#a5f3fc;background:rgba(0,232,212,.1);border:1px solid rgba(0,232,212,.28);border-radius:10px;letter-spacing:.04em}
.spectate-strip.on{display:block}
.btn{border:none;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff}.btn-buzz{background:var(--buzz);color:#fff}.btn-muted{background:rgba(255,255,255,.12);color:var(--text)}
input{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 12px;outline:none}
input:focus{border-color:var(--primary)}
#name-screen{display:flex;flex-direction:column;gap:10px;max-width:420px;width:100%;margin:0 auto}
#join-area{display:none;gap:8px;flex-direction:column}
#game-screen{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
#waiting{display:flex;flex-direction:column;gap:10px;align-items:center}
#players{display:flex;flex-wrap:wrap;gap:8px}
#players .chip{padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--border);font-size:.8rem}
#syllable{
  font-size:2.35rem;font-weight:900;text-align:center;letter-spacing:.08em;color:#fde68a;
  text-shadow:0 0 20px rgba(251,191,36,.22)
}
#bomb-timer{
  width:min(230px,72vw);
  height:10px;
  margin:0 auto 6px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.3);
  box-shadow:0 0 0 1px rgba(255,255,255,.08) inset, 0 4px 14px rgba(0,0,0,.25);
}
#bomb-timer-fill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);
  box-shadow:0 0 8px rgba(245,158,11,.4);
  transition:width .5s linear;
}
#time-left{
  text-align:center;
  font-weight:800;
  color:#f8fafc;
  margin:0 auto 6px;
  font-variant-numeric:tabular-nums;
  text-shadow:0 1px 6px rgba(0,0,0,.45);
}
#bomb-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
#bomb-shell{position:relative;width:140px;height:92px;display:flex;align-items:flex-end;justify-content:center;perspective:500px}
#bomb-body{
  width:92px;height:92px;border-radius:50%;
  
  box-shadow:
    inset -14px -18px 26px rgba(0,0,0,.46),
    inset 9px 9px 18px rgba(255,255,255,.12),
    0 10px 25px rgba(0,0,0,.45);
  transform-style:preserve-3d;
  animation:bombfloat 1.6s ease-in-out infinite;
}
#bomb-body::before{
  content:'';position:absolute;width:24px;height:16px;left:30px;top:24px;border-radius:50%;
  background:rgba(255,255,255,.18);filter:blur(.3px)
}
#bomb-cap{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:30px;height:16px;border-radius:8px;background:linear-gradient(180deg,#9ca3af,#4b5563);
  border:1px solid rgba(255,255,255,.22);box-shadow:0 3px 8px rgba(0,0,0,.35)
}
#bomb-fuse{
  position:absolute;top:13px;left:50%;
  width:34px;height:4px;border-radius:999px;
  background:linear-gradient(90deg,#f59e0b,#fb7185,#f59e0b);
  background-size:180% 100%;
  transform:translateX(14px);
  transition:width .12s linear;
  animation:fuseflow .8s linear infinite;
}
#bomb-spark{
  position:absolute;top:4px;left:calc(50% + 34px);width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle,#fde047 0%,#f59e0b 55%,rgba(245,158,11,.1) 100%);
  box-shadow:0 0 12px rgba(251,191,36,.75),0 0 24px rgba(245,158,11,.45);
  transition:left .12s linear,opacity .12s linear;
  animation:sparkpulse .35s ease-in-out infinite;
}
#bomb-spark::before,#bomb-spark::after{
  content:'';position:absolute;left:50%;top:50%;width:2px;height:9px;background:#fde68a;border-radius:2px;
  transform-origin:center bottom
}
#bomb-spark::before{transform:translate(-50%,-50%) rotate(26deg)}
#bomb-spark::after{transform:translate(-50%,-50%) rotate(-36deg)}
#bomb-wrap.danger #bomb-body{animation:bombshake .18s linear infinite}
#bomb-wrap.danger #bomb-spark{animation:sparkpulse .22s ease-in-out infinite}
@keyframes bombfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.8px)}}
@keyframes fuseflow{0%{background-position:0% 50%}100%{background-position:180% 50%}}
@keyframes bombshake{0%{transform:translateX(0)}25%{transform:translateX(-1.4px)}50%{transform:translateX(1.4px)}100%{transform:translateX(0)}}
@keyframes sparkpulse{0%,100%{opacity:.65}50%{opacity:1}}
#status{text-align:center;color:var(--muted);min-height:20px}
#feedback{
  text-align:center;min-height:18px;font-size:.84rem;font-weight:700;
  color:#cbd5e1;transition:opacity .15s
}
#feedback.ok{color:#86efac}
#feedback.warn{color:#fde68a}
#feedback.bad{color:#fca5a5}
#combo-pill{
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:999px;padding:5px 10px;font-size:.74rem;font-weight:800;
  background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);color:#86efac
}
#combo-pill.hidden{display:none}
#word.shake{animation:wshake .22s linear}
@keyframes wshake{
  0%{transform:translateX(0)}25%{transform:translateX(-2px)}50%{transform:translateX(2px)}100%{transform:translateX(0)}
}
#score-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.row{
  padding:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);
  border-radius:10px;font-size:.82rem;display:flex;flex-direction:column;gap:4px
}
.row-top{display:flex;justify-content:space-between;gap:6px;align-items:center}
.row-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-metrics{font-size:.78rem;color:var(--muted)}
.row.turn{border-color:var(--gold,#fbbf24);box-shadow:0 0 0 1px rgba(251,191,36,.3) inset}
.row.dead{opacity:.5}
#recent{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow:auto}
.r{font-size:.8rem;color:var(--muted)}
#action{display:flex;gap:8px}
#gcount{position:fixed;inset:0;background:rgba(15,12,41,.8);display:none;align-items:center;justify-content:center;z-index:500}
#gcount span{font-size:6rem;font-weight:800;color:#f59e0b}
@media (max-width:760px){
  #app{padding-top:52px;padding-bottom:10px}
  .btn{padding:12px 14px;font-size:.95rem}
  #action{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(36,36,62,0),rgba(36,36,62,.92) 28%,rgba(36,36,62,.98));padding-top:8px}
  #word{font-size:1rem;padding:12px 11px}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="zp-space-bg"><div class="zp-neb1"></div><div class="zp-neb2"></div><div class="zp-stars" id="zp-stars-wordbomb"></div><div class="zp-sgrid"></div><div class="zp-comet"></div></div>
<div id="gcount"><span id="gnum">3</span></div>
<button id="back" onclick="location.href='index.html'">← Accueil</button>
<button id="sound-btn" onclick="toggleSound()" title="Son">🔊</button>
<div id="dot"></div>
<div id="app">
  <div id="spectate-strip" class="spectate-strip"></div>
  <h1>💣 Word Bomb</h1>

  <div id="name-screen">
    <div class="card" style="display:flex;flex-direction:column;gap:8px">
      <input id="name" maxlength="20" placeholder="Ton pseudo">
      <button class="btn btn-primary" onclick="createGame()">Créer une salle</button>
      <button class="btn btn-buzz" onclick="toggleJoin()">Rejoindre (code)</button>
      <div id="join-area">
        <input id="code" maxlength="4" placeholder="Code (ABCD)" style="text-transform:uppercase;letter-spacing:.14em;text-align:center">
        <button class="btn btn-buzz" onclick="joinGame()">Rejoindre</button>
        <button type="button" class="btn btn-muted" onclick="joinSpectate()">Regarder en spectateur</button>
      </div>
      <div id="err" style="color:#fca5a5;font-size:.82rem;min-height:18px;text-align:center"></div>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <div id="waiting" class="card hidden">
      <div id="code-box" onclick="copyCode()" style="cursor:pointer;text-align:center">
        <div style="font-size:.72rem;color:var(--muted)">Code de la salle</div>
        <div id="room-code" style="font-size:2.1rem;font-family:monospace;letter-spacing:.2em;color:var(--primary);font-weight:800">----</div>
      </div>
      <div id="players"></div>
      <button id="start-btn" class="btn btn-primary hidden" onclick="startGame()">Lancer la partie</button>
    </div>

    <div id="playing" class="hidden" style="display:flex;flex-direction:column;gap:10px;min-height:0;flex:1">
      <div class="card">
        <div id="bomb-wrap">
          <div id="bomb-shell">
            <div id="bomb-cap"></div>
            <div id="bomb-fuse"></div>
            <div id="bomb-spark"></div>
            <div id="bomb-body"></div>
          </div>
        </div>
        <div id="bomb-timer"><div id="bomb-timer-fill"></div></div>
        <div id="time-left">--.-s</div>
        <div id="syllable">--</div>
        <div id="status"></div>
        <div id="feedback"></div>
      </div>
      <div class="card"><div id="score-list"></div></div>
      <div class="card" style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:center"><div id="combo-pill" class="hidden">Combo x1</div></div>
        <div id="action">
          <input id="word" placeholder="Mot contenant la syllabe..." maxlength="40">
          <button class="btn btn-buzz" onclick="sendWord()">Valider</button>
        </div>
      </div>
      <div class="card" style="min-height:0;flex:1">
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:6px">Mots récents</div>
        <div id="recent"></div>
      </div>
    </div>

    <div id="over" class="card hidden" style="text-align:center;display:flex;flex-direction:column;gap:10px">
      <div id="over-title" style="font-size:1.3rem;font-weight:800"></div>
      <button class="btn btn-primary" onclick="restart()">Rejouer</button>
      <button class="btn btn-muted" onclick="location.href='index.html'">Accueil</button>
    </div>
  </div>
</div>

<script>
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/bomb`;
let ws=null,mySlot=-1,myCode='',myName='',state=null,pendingAction=null,timerInt=null,lastPhase='';
let isSpectator=false;
let activeTurnEndsAt=0;
let activeTimerKey='';
let serverOffsetMs = 0;
let soundOn=true,audioCtx=null,lastTickSecond=-1,lastRecentKey='';
let fuseOsc=null,fuseGain=null,fuseLfo=null,fuseLfoGain=null;
let feedbackTimeout=null,myCombo=0;
function $(id){return document.getElementById(id);}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function bindLoungeSender(){ if(window.ZapPlay)ZapPlay.setLoungeSender(text=>send({type:'lounge_chat',text})); else setTimeout(bindLoungeSender,120); }
bindLoungeSender();
function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch{} } }
function tone(f,d=.08,t='sine',v=.15){
  if(!soundOn)return; ensureAudio(); if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination); o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.start(); o.stop(audioCtx.currentTime+d+.01);
}
const SND={
  tick(){tone(960,.05,'square',.1);},
  good(){tone(520,.08); setTimeout(()=>tone(660,.09),90);},
  boom(){tone(130,.15,'sawtooth',.22); setTimeout(()=>tone(85,.25,'sawtooth',.18),120);}
};
function startFuseSound(){
  if(!soundOn)return;
  ensureAudio(); if(!audioCtx || fuseOsc)return;
  fuseOsc=audioCtx.createOscillator();
  fuseGain=audioCtx.createGain();
  fuseLfo=audioCtx.createOscillator();
  fuseLfoGain=audioCtx.createGain();
  fuseOsc.type='triangle'; fuseOsc.frequency.value=520;
  fuseGain.gain.value=0.0015;
  fuseLfo.type='sine'; fuseLfo.frequency.value=7.2;
  fuseLfoGain.gain.value=180;
  fuseLfo.connect(fuseLfoGain); fuseLfoGain.connect(fuseOsc.frequency);
  fuseOsc.connect(fuseGain); fuseGain.connect(audioCtx.destination);
  fuseOsc.start(); fuseLfo.start();
}
function updateFuseSound(ratio){
  if(!fuseOsc||!fuseGain)return;
  const r=Math.max(0,Math.min(1,ratio));
  const base=420 + (1-r)*520;
  fuseOsc.frequency.setTargetAtTime(base, audioCtx.currentTime, 0.04);
  fuseGain.gain.setTargetAtTime(0.0012 + (1-r)*0.0052, audioCtx.currentTime, 0.04);
}
function stopFuseSound(){
  [fuseOsc,fuseLfo].forEach(n=>{try{if(n)n.stop();}catch{}});
  [fuseOsc,fuseGain,fuseLfo,fuseLfoGain]=[null,null,null,null];
}
function toggleSound(){
  soundOn=!soundOn;
  $('sound-btn').textContent=soundOn?'🔊':'🔇';
  if(!soundOn) stopFuseSound();
}
function syncSpectateStrip(){
  const el=$('spectate-strip'); if(!el)return;
  el.classList.toggle('on',!!isSpectator);
  el.textContent=isSpectator?'Mode spectateur — tu vois la bombe et le chat, sans jouer.':'';
}
function joinSpectate(){
  ensureAudio();
  const n=$('name').value.trim(); const c=$('code').value.trim().toUpperCase();
  if(!n||!c){$('err').textContent='Nom + code requis';return;}
  myName=n; mySlot=-1; isSpectator=true; syncSpectateStrip();
  if(window.ZapPlay)ZapPlay.savePseudo(n);
  const action=()=>send({type:'join_bomb_spectate',name:n,code:c});
  if(ws&&ws.readyState===1) action();
  else { pendingAction=action; if(!ws||ws.readyState===3) connect(); }
}
function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ $('dot').classList.add('ok'); if(window.ZapPlay)ZapPlay.hideLoader(); if(pendingAction){pendingAction();pendingAction=null;} };
  ws.onclose=()=>{ $('dot').classList.remove('ok'); setTimeout(connect,2000); };
  ws.onmessage=e=>{ let m; try{m=JSON.parse(e.data);}catch{return;} handle(m); };
}
connect();
function toggleJoin(){ $('join-area').style.display = $('join-area').style.display==='flex' ? 'none' : 'flex'; }
function createGame(){
  ensureAudio();
  const n=$('name').value.trim(); if(!n){$('err').textContent='Entre ton pseudo';return;}
  myName=n; isSpectator=false; syncSpectateStrip(); if(window.ZapPlay)ZapPlay.savePseudo(n);
  const action=()=>send({type:'create_bomb',name:n});
  if(ws&&ws.readyState===1) action();
  else { pendingAction=action; if(!ws||ws.readyState===3) connect(); }
}
function joinGame(){
  ensureAudio();
  const n=$('name').value.trim(); const c=$('code').value.trim().toUpperCase();
  if(!n||!c){$('err').textContent='Nom + code requis';return;}
  myName=n; isSpectator=false; syncSpectateStrip(); if(window.ZapPlay)ZapPlay.savePseudo(n);
  const action=()=>send({type:'join_bomb',name:n,code:c});
  if(ws&&ws.readyState===1) action();
  else { pendingAction=action; if(!ws||ws.readyState===3) connect(); }
}
function startGame(){ if(isSpectator)return; send({type:'start_bomb'}); }
function sendWord(){
  if(isSpectator)return;
  ensureAudio();
  const w=$('word').value.trim(); if(!w)return;
  send({type:'bomb_word',word:w}); $('word').value='';
}
function restart(){ if(isSpectator)return; send({type:'restart_bomb'}); }
function copyCode(){ if(!myCode)return; navigator.clipboard.writeText(myCode).catch(()=>{}); }
function setFeedback(text,type=''){
  const el=$('feedback');
  if(!el)return;
  el.textContent=text||'';
  el.className=type||'';
  if(feedbackTimeout){clearTimeout(feedbackTimeout);feedbackTimeout=null;}
  if(text){
    feedbackTimeout=setTimeout(()=>{
      if(el.textContent===text){el.textContent='';el.className='';}
    },1700);
  }
}
function renderCombo(){
  const el=$('combo-pill');
  if(!el)return;
  if(myCombo>=2){
    el.classList.remove('hidden');
    el.textContent=`Combo x${myCombo}`;
  }else{
    el.classList.add('hidden');
    el.textContent='Combo x1';
  }
}
function resetCombo(){
  myCombo=0;
  renderCombo();
}
function bumpCombo(){
  myCombo=Math.max(1,myCombo+1);
  renderCombo();
}
function shakeWordInput(){
  const input=$('word');
  if(!input)return;
  input.classList.remove('shake');
  void input.offsetWidth;
  input.classList.add('shake');
}

function handle(m){
  if(m.type==='created_bomb'){mySlot=m.slot;myCode=m.code;isSpectator=false;syncSpectateStrip();showGame();}
  if(m.type==='welcome_bomb'){mySlot=m.slot;myCode=m.code;isSpectator=false;syncSpectateStrip();showGame();}
  if(m.type==='welcome_bomb_spectate'){mySlot=-1;myCode=m.code;isSpectator=true;syncSpectateStrip();showGame();}
  if(m.type==='error'){
    $('err').textContent=m.msg;
    setFeedback(m.msg,'bad');
    shakeWordInput();
    resetCombo();
  }
  if(m.type==='countdown')showCountdown(m.seconds||3);
  if(m.type==='player_left')$('status').textContent=(m.name||'Un joueur')+' a quitté.';
  if(m.type==='lounge_chat' && window.ZapPlay)ZapPlay.addLoungeMessage(m);
  if(m.type==='bomb_state'){
    if(m.timeoutName){
      setFeedback(`${m.timeoutName} a explosé 💥`,'warn');
      if(m.timeoutSlot===mySlot)resetCombo();
    }
    state=m;
    render();
  }
}
function showGame(){ $('name-screen').classList.add('hidden'); $('game-screen').classList.remove('hidden'); }
function showCountdown(n){
  const g=$('gcount'),num=$('gnum'); g.style.display='flex'; num.textContent=n;
  let c=n; const t=setInterval(()=>{c--; if(c<=0){clearInterval(t); g.style.display='none';} else num.textContent=c;},1000);
}
function setScreen(id){
  ['waiting','playing','over'].forEach(x=>$(x).classList.add('hidden'));
  $(id).classList.remove('hidden');
}
function render(){
  if(!state)return;
  $('room-code').textContent = state.code||myCode||'----';
  const players=state.players||[];
  if(state.phase==='WAITING'){
    if(window.ZapPlay)ZapPlay.showLounge({players,mySlot:isSpectator?-1:mySlot,roomCode:state.code||myCode,gameName:'Word Bomb'});
    setScreen('waiting');
    $('players').innerHTML=players.map(p=>`<span class="chip">${p.name}${p.slot===0?' 👑':''}</span>`).join('');
    $('start-btn').classList.toggle('hidden', isSpectator||!(mySlot===0 && players.length>=2));
    stopTimer();
    resetCombo();
    return;
  }
  if(state.phase==='PLAYING'){
    if(window.ZapPlay)ZapPlay.hideLounge();
    setScreen('playing');
    $('syllable').textContent=state.syllable||'--';
    const me=players.find(p=>p.slot===mySlot);
    const canPlay = !isSpectator && me && me.alive && state.turn===mySlot;
    $('word').disabled=!canPlay;
    if(canPlay) $('word').focus();
    $('status').textContent = canPlay ? 'À toi ! Trouve un mot.' : `Tour de ${players.find(p=>p.slot===state.turn)?.name||'?'}`;
    $('score-list').innerHTML=players.map(p=>{
      const lives='❤️'.repeat(Math.max(0,p.lives||0)) || '☠️';
      const cls=['row',p.slot===state.turn?'turn':'',!p.alive?'dead':''].join(' ');
      return `<div class="${cls}">
        <div class="row-top"><span class="row-name">${p.name}</span><span>${lives}</span></div>
        <div class="row-metrics">${p.score||0} pt${(p.score||0)>1?'s':''}</div>
      </div>`;
    }).join('');
    const rec=state.recentWords||[];
    const last = rec.length ? rec[rec.length-1] : null;
    const k = last ? `${last.name}::${last.word}` : '';
    if(!isSpectator && k && k!==lastRecentKey && last.name===myName){
      SND.good();
      bumpCombo();
      setFeedback(`✅ Mot validé (+1) • Combo x${Math.max(1,myCombo)}`,'ok');
    }
    lastRecentKey = k;
    $('recent').innerHTML = rec.length ? rec.slice().reverse().map(r=>`<div class="r"><b>${r.name}</b> : ${r.word}</div>`).join('') : '<div class="r">Aucun mot pour le moment.</div>';
    const turnEndsAt = Number(state.turnEndsAt||0);
    const turnMs = Number(state.turnMs||12000);
    // Sync: compute server/client clock offset (serverNow included in bomb_state)
    if(state.serverNow){
      const sn = Number(state.serverNow);
      if(Number.isFinite(sn) && sn>0) serverOffsetMs = sn - Date.now();
    }
    const timerKey = `${state.turn}|${state.syllable||''}|${turnEndsAt}`;
    if(timerKey !== activeTimerKey){
      startTimer(turnEndsAt, turnMs, timerKey);
    }
    return;
  }
  if(state.phase==='GAME_OVER'){
    if(window.ZapPlay)ZapPlay.hideLounge();
    setScreen('over');
    stopTimer();
    resetCombo();
    const winName = state.winnerSlot>=0 ? (players.find(p=>p.slot===state.winnerSlot)?.name||'') : '';
    $('over-title').textContent = state.winnerSlot>=0 ? `🏆 ${winName} gagne !` : 'Égalité !';
    if(!isSpectator && lastPhase!=='GAME_OVER' && state.winnerSlot===mySlot && window.ZapFX) ZapFX.confetti({count:200});
    if(!isSpectator && lastPhase!=='GAME_OVER' && window.ZapPlay){
      const pNames=players.map(p=>p.name);
      ZapPlay.saveGameResult({game:'bomb',gameName:'Word Bomb',players:pNames,winner:winName||'Égalité',myName,myScore:players.find(p=>p.slot===mySlot)?.score||0,isWinner:state.winnerSlot===mySlot});
    }
  }
  lastPhase=state.phase;
}
function startTimer(endTs, turnMs, timerKey){
  stopTimer();
  activeTurnEndsAt = Number(endTs||0);
  activeTimerKey = String(timerKey||activeTurnEndsAt||'');
  const roundMs = Number(turnMs||12000);
  if(!endTs){
    $('bomb-timer-fill').style.width='100%';
    if($('time-left')) $('time-left').textContent='--.-s';
    return;
  }
  const now = Date.now();
  // Use server-synced time for consistent countdown
  const nowServer = now + (serverOffsetMs||0);
  let initialLeft = Number(endTs) - nowServer;
  if(!Number.isFinite(initialLeft) || initialLeft < 250 || initialLeft > (roundMs + 5000)){
    initialLeft = roundMs;
  }
  const localEndTs = now + initialLeft;
  startFuseSound();
  lastTickSecond=-1;
  timerInt=setInterval(()=>{
    const left=Math.max(0,localEndTs-Date.now());
    const ratio=Math.max(0,Math.min(1,left/roundMs));
    $('bomb-timer-fill').style.width=(ratio*100).toFixed(1)+'%';
    if($('time-left')) $('time-left').textContent=(left/1000).toFixed(1)+'s';
    const sec=Math.ceil(left/1000);
    const bw=$('bomb-wrap'),f=$('bomb-fuse'),sp=$('bomb-spark');
    if(f) f.style.width = `${Math.max(3,Math.round(34*ratio))}px`;
    if(sp) sp.style.left = `calc(50% + ${Math.round(34*ratio)}px)`;
    updateFuseSound(ratio);
    if(bw) bw.classList.toggle('danger', sec<=4);
    if(sec<=5 && sec>0 && sec!==lastTickSecond){ SND.tick(); lastTickSecond=sec; }
    if(left<=0){
      $('bomb-timer-fill').style.width='0%';
      if($('time-left')) $('time-left').textContent='0.0s';
      stopFuseSound();
      SND.boom();
      stopTimer(false);
    }
  },100);
}
function stopTimer(resetVisual=true){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  activeTurnEndsAt = 0;
  activeTimerKey = '';
  stopFuseSound();
  const bw=$('bomb-wrap'),f=$('bomb-fuse'),sp=$('bomb-spark');
  if(bw) bw.classList.remove('danger');
  if(f) f.style.width='34px';
  if(sp) sp.style.left='calc(50% + 34px)';
  if(resetVisual){
    if($('bomb-timer-fill')) $('bomb-timer-fill').style.width='100%';
    if($('time-left')) $('time-left').textContent='--.-s';
  }
}
const p=new URLSearchParams(location.search);
if(p.get('name'))$('name').value=p.get('name');
if(window.ZapPlay && !$('name').value){
  const saved=window.ZapPlay.getSavedPseudo&&window.ZapPlay.getSavedPseudo();
  if(saved) $('name').value=saved;
}
if(p.get('code')){ $('code').value=p.get('code').toUpperCase(); $('join-area').style.display='flex'; }
// Auto-join when coming from lobby (code + saved/URL name)
if(p.get('spectate')==='1' && p.get('code')){
  $('join-area').style.display='flex';
  const n=($('name').value||'').trim();
  if(n){
    myName=n; mySlot=-1; isSpectator=true; syncSpectateStrip();
    pendingAction=()=>send({type:'join_bomb_spectate',name:n,code:$('code').value.trim().toUpperCase()});
    if(!ws||ws.readyState===3)connect();
  }
}
else if(p.get('code') && $('name').value){
  const n = $('name').value.trim().slice(0,20);
  if(n){
    myName = n;
    pendingAction = () => send({type:'join_bomb', name:n, code:$('code').value.trim().toUpperCase()});
    if(!ws || ws.readyState===3) connect();
  }
}
if(p.get('create')==='1'&&p.get('name')){
  const n=p.get('name'); $('name').value=n; myName=n;
  pendingAction=()=>send({type:'create_bomb',name:n}); connect();
}
$('name').addEventListener('keydown',e=>{if(e.key==='Enter')createGame();});
$('code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});
$('code').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});
$('word').addEventListener('keydown',e=>{if(e.key==='Enter')sendWord();});
