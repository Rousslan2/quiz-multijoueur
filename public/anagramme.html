<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="theme.css">
<title>ZapPlay — Anagramme</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#FF3864;--gold:#fbbf24;--ok:#22c55e;--bad:#ef4444;--text:#E8E8F0;--muted:#5A5A78;--card:#0E0E22;--border:rgba(255,56,100,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;color:var(--text);min-height:100dvh;padding-bottom:24px}
#app{max-width:560px;margin:0 auto;padding:60px 14px 20px;display:flex;flex-direction:column;gap:14px}
#back{position:fixed;top:8px;left:8px;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:1rem}
#dot{position:fixed;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--bad)}
#dot.ok{background:var(--ok)}
.hidden{display:none!important}
.card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:14px;padding:16px}
.btn{border:none;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;transition:transform .1s;font-size:.95rem;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--primary);color:#fff}
.btn-s{background:rgba(255,255,255,.12);color:var(--text)}
.btn-full{width:100%}
input{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px;font-size:1rem;outline:none;font-family:inherit}
input:focus{border-color:var(--primary)}
h2{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px}
.code-box{text-align:center;background:rgba(255,56,100,.07);border:1px solid rgba(255,56,100,.2);border-radius:12px;padding:12px;cursor:pointer;width:100%}
.code-big{font-size:2.2rem;font-weight:900;letter-spacing:.2em;color:var(--primary);font-family:monospace}
.p-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--border);font-size:.82rem}
#score-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.sc-chip{display:flex;flex-direction:column;align-items:center;min-width:80px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
.sc-chip.me{border-color:rgba(255,56,100,.5)}
.sc-name{color:var(--muted);font-size:.7rem;margin-bottom:2px}
.sc-pts{font-weight:800;font-size:1.1rem;color:var(--primary)}
#scramble-disp{font-size:2.8rem;font-weight:900;letter-spacing:.25em;text-align:center;color:var(--primary);text-shadow:0 0 30px rgba(255,56,100,.35);font-family:monospace;padding:8px 0}
.timer-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--gold));transition:width .25s linear}
.hint-dots{display:flex;gap:6px;justify-content:center;margin-top:4px}
.hint-dot{width:18px;height:18px;background:rgba(255,255,255,.1);border-radius:4px;display:inline-block}
.rank-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.05);font-size:.9rem;gap:8px}
.rank-row.me{background:rgba(255,56,100,.1);border:1px solid rgba(255,56,100,.25)}
.big-num{font-size:5rem;font-weight:900;text-align:center;color:var(--primary)}
.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="zp-space-bg"><div class="zp-neb1"></div><div class="zp-neb2"></div><div class="zp-stars" id="zp-stars-anagramme"></div><div class="zp-sgrid"></div><div class="zp-comet"></div></div>
<div id="app">
<button id="back" onclick="history.back()" data-i18n="ui_back">← Retour</button>
<div id="dot"></div>

<template id="tpl-sc">
  <div class="sc-chip"><div class="sc-name"></div><div class="sc-pts"></div></div>
</template>
<template id="tpl-rank">
  <div class="rank-row"><span class="rk-medal"></span><span class="rk-name"></span><span class="rk-pts"></span></div>
</template>

<!-- Name -->
<div id="scr-name">
  <h2>🔤 <span data-i18n="ana_title">Anagramme</span></h2>
  <div class="card" style="display:flex;flex-direction:column;gap:10px">
    <p style="text-align:center;color:var(--muted);font-size:.85rem" data-i18n="ana_tagline">Déchiffre le mot avant les autres ! 8 manches · 2–4 joueurs</p>
    <input id="name-input" type="text" maxlength="20" placeholder="Ton pseudo" data-i18n-ph="ui_name_ph" autocomplete="off">
    <div style="display:flex;gap:8px">
      <button class="btn btn-p" style="flex:1" onclick="createGame()" data-i18n="ui_create_room">Créer une salle</button>
      <button class="btn btn-s" style="flex:1" onclick="toggleJoin()" data-i18n="ui_join">Rejoindre</button>
    </div>
    <div id="join-area" style="display:none;flex-direction:column;gap:8px">
      <input id="code-in" type="text" maxlength="4" placeholder="Code ABCD" data-i18n-ph="ui_code_ph" autocomplete="off" style="text-transform:uppercase;text-align:center;font-size:1.2rem;letter-spacing:.15em">
      <button class="btn btn-p btn-full" onclick="joinGame()" data-i18n="ui_join_arrow">Rejoindre →</button>
    </div>
    <p id="err" style="color:var(--bad);text-align:center;font-size:.85rem;min-height:18px"></p>
  </div>
</div>

<!-- Wait -->
<div id="scr-wait" class="hidden">
  <h2>🔤 <span data-i18n="ana_title">Anagramme</span></h2>
  <div class="card" style="display:flex;flex-direction:column;gap:12px;align-items:center">
    <div class="code-box" onclick="copyCode()">
      <div style="font-size:.62rem;color:var(--muted);letter-spacing:.08em;margin-bottom:4px" data-i18n="ana_room_code">CODE DE LA SALLE</div>
      <div class="code-big" id="w-code">----</div>
      <div style="font-size:.62rem;color:var(--muted);margin-top:4px" data-i18n="ana_click_copy">Cliquer pour copier</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px" id="w-players"></div>
    <button id="start-btn" class="btn btn-p btn-full hidden" onclick="startGame()" data-i18n="ana_start">▶ Lancer</button>
    <p id="w-hint" style="color:var(--muted);font-size:.82rem"></p>
  </div>
</div>

<!-- Countdown -->
<div id="scr-cd" class="hidden" style="min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <p style="color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-size:.9rem" data-i18n="quiz_prepare">Prêts ?</p>
  <div class="big-num" id="cd-n">3</div>
</div>

<!-- Play -->
<div id="scr-play" class="hidden" style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span id="rnd-info" style="font-size:.78rem;color:var(--muted);letter-spacing:.1em;font-family:monospace">MANCHE 1/8</span>
    <span id="timer-txt" style="font-family:monospace;color:var(--gold);font-weight:700">20s</span>
  </div>
  <div id="score-bar"></div>
  <div class="card" style="text-align:center">
    <p style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Anagramme</p>
    <div id="scramble-disp">???</div>
    <div class="hint-dots" id="hint-dots"></div>
    <div class="timer-wrap" style="margin-top:14px"><div class="timer-bar" id="tbar" style="width:100%"></div></div>
  </div>
  <div class="card" style="display:flex;flex-direction:column;gap:10px">
    <input id="guess-in" type="text" placeholder="Tape le mot…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn btn-p btn-full" onclick="submitGuess()">Valider →</button>
    <p id="feed" style="text-align:center;font-size:.9rem;font-weight:700;min-height:22px;color:var(--ok)"></p>
  </div>
</div>

<!-- Round over -->
<div id="scr-rnd" class="hidden" style="display:flex;flex-direction:column;gap:14px">
  <div class="card" style="text-align:center">
    <p style="color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Réponse</p>
    <p id="rnd-word" style="font-size:2rem;font-weight:900;color:var(--primary);letter-spacing:.1em;font-family:monospace;margin-bottom:10px"></p>
    <p id="rnd-result" style="font-size:.95rem;color:var(--gold)"></p>
    <div id="rnd-ranks" style="display:flex;flex-direction:column;gap:6px;margin-top:12px"></div>
  </div>
  <div id="score-bar-r" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center"></div>
</div>

<!-- Game over -->
<div id="scr-over" class="hidden" style="display:flex;flex-direction:column;gap:14px">
  <div class="card" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:8px">🏆</div>
    <p id="winner-txt" style="font-size:1.2rem;font-weight:800;color:var(--gold);margin-bottom:16px"></p>
    <div id="final-ranks" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px"></div>
    <button class="btn btn-s btn-full" onclick="restart()">Rejouer</button>
  </div>
</div>

</div>
<script>
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/anagramme`;
let ws, mySlot=-1, myCode='', timerIv=null, timerAnim=null, locked=false;
let pendingAction=null;
let lastState=null;
const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');
const send = d => ws && ws.readyState===1 && ws.send(JSON.stringify(d));

function connect(){
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { $('dot').classList.add('ok'); if(pendingAction){pendingAction();pendingAction=null;} };
  ws.onclose = () => { $('dot').classList.remove('ok'); setTimeout(connect,2000); };
  ws.onmessage = e => { try{ handleMsg(JSON.parse(e.data)); }catch{} };
}
connect();

function toggleJoin(){ const a=$('join-area'); a.style.display=a.style.display==='flex'?'none':'flex'; }
function createGame(){ send({type:'create_anagramme',name:$('name-input').value.trim()||'Joueur'}); }
function joinGame(){ send({type:'join_anagramme',name:$('name-input').value.trim()||'Joueur',code:$('code-in').value.trim().toUpperCase()}); }
function copyCode(){ try{ navigator.clipboard.writeText(myCode); }catch{} }
function startGame(){ send({type:'start_anagramme'}); }
function restart(){ send({type:'restart_anagramme'}); }
function submitGuess(){
  if(locked) return;
  const g = $('guess-in').value.trim().toLowerCase();
  if(!g) return;
  send({type:'anagramme_guess',word:g});
}

function renderScores(players, cid){
  const c=$(cid); c.textContent='';
  const tpl=$('tpl-sc');
  players.forEach(p=>{
    const node=tpl.content.cloneNode(true);
    const chip=node.querySelector('.sc-chip');
    if(p.slot===mySlot) chip.classList.add('me');
    node.querySelector('.sc-name').textContent=p.name;
    node.querySelector('.sc-pts').textContent=p.score||0;
    c.appendChild(node);
  });
}
function renderRanks(rows,cid){
  const c=$(cid); c.textContent='';
  const tpl=$('tpl-rank');
  rows.forEach(r=>{
    const node=tpl.content.cloneNode(true);
    const row=node.querySelector('.rank-row');
    if(r.me) row.classList.add('me');
    node.querySelector('.rk-medal').textContent=r.medal;
    node.querySelector('.rk-name').textContent=r.name;
    const pts=node.querySelector('.rk-pts');
    pts.textContent=r.pts; pts.style.color=r.color||'var(--gold)'; pts.style.fontWeight='700';
    c.appendChild(node);
  });
}
function buildDots(len){
  const c=$('hint-dots'); c.textContent='';
  for(let i=0;i<len;i++){
    const d=document.createElement('span');
    d.className='hint-dot'; c.appendChild(d);
  }
}
function startTimer(secs){
  clearInterval(timerIv); clearInterval(timerAnim);
  let left=secs; $('timer-txt').textContent=left+'s';
  $('tbar').style.transition='none'; $('tbar').style.width='100%';
  requestAnimationFrame(()=>{
    $('tbar').style.transition='width '+secs+'s linear';
    $('tbar').style.width='0%';
  });
  timerIv=setInterval(()=>{ left--; $('timer-txt').textContent=left+'s'; if(left<=0) clearInterval(timerIv); },1000);
}

const medals=['🥇','🥈','🥉','4️⃣'];

function handleMsg(d){
  switch(d.type){
    case 'created_anagramme':
      mySlot=d.slot; myCode=d.code;
      hide('scr-name'); show('scr-wait');
      $('w-code').textContent=d.code; break;
    case 'welcome_anagramme':
      mySlot=d.slot; myCode=d.code;
      hide('scr-name'); show('scr-wait');
      $('w-code').textContent=d.code;
      $('w-hint').textContent=window.ZapPlay?ZapPlay.t('ana_wait_launch'):'En attente du lancement…'; break;
    case 'anagramme_state': updateState(d); break;
    case 'countdown':{
      ['scr-wait','scr-name','scr-rnd'].forEach(hide);
      if(window.ZapPlay)ZapPlay.hideLounge();
      show('scr-cd');
      let n=d.seconds; $('cd-n').textContent=n;
      const iv=setInterval(()=>{ n--; if(n<=0) clearInterval(iv); else $('cd-n').textContent=n; },1000);
      break;
    }
    case 'anagramme_round':
      locked=false; ['scr-cd','scr-rnd'].forEach(hide); show('scr-play');
      $('rnd-info').textContent=window.ZapPlay?ZapPlay.t('ana_round',{cur:d.round,total:d.totalRounds}):('MANCHE '+d.round+'/'+d.totalRounds);
      $('scramble-disp').textContent=d.scrambled.toUpperCase();
      $('guess-in').value=''; $('guess-in').disabled=false; $('guess-in').focus();
      $('feed').textContent=''; buildDots(d.wordLen); startTimer(20); break;
    case 'anagramme_wrong':
      $('feed').textContent=window.ZapPlay?ZapPlay.t('ana_wrong'):'✗ Mauvaise réponse !'; $('feed').style.color='var(--bad)';
      $('guess-in').classList.add('shake');
      setTimeout(()=>$('guess-in').classList.remove('shake'),400);
      $('guess-in').value=''; break;
    case 'anagramme_won':{
      clearInterval(timerIv); locked=true;
      ['scr-play'].forEach(hide); show('scr-rnd');
      $('rnd-word').textContent=d.word.toUpperCase();
      $('rnd-result').textContent = d.slot===mySlot
        ? (window.ZapPlay?ZapPlay.t('ana_you_found'):'🎉 Tu as trouvé !')
        : (window.ZapPlay?ZapPlay.t('ana_x_found',{name:d.winner}):(d.winner+' a trouvé !'));
      break;
    }
    case 'anagramme_timeout':{
      clearInterval(timerIv); locked=true;
      ['scr-play'].forEach(hide); show('scr-rnd');
      $('rnd-word').textContent=d.word.toUpperCase();
      $('rnd-result').textContent=window.ZapPlay?ZapPlay.t('ana_timeout'):'Temps écoulé — personne n\'a trouvé'; $('rnd-result').style.color='var(--muted)';
      break;
    }
    case 'error': $('err').textContent=d.msg; break;
    case 'game_abandoned': alert(window.ZapPlay?ZapPlay.t('ana_abandoned'):'Un joueur a quitté.'); location.reload(); break;
    case 'lounge_chat': if(window.ZapPlay)ZapPlay.addLoungeMessage(d); break;
  }
}
function updateState(d){
  lastState=d;
  if(d.phase==='WAITING'){
    ['scr-cd','scr-play','scr-rnd','scr-over'].forEach(hide); show('scr-wait');
    $('w-code').textContent=d.code;
    const pw=$('w-players'); pw.textContent='';
    d.players.forEach(p=>{ const c=document.createElement('span'); c.className='p-chip'; c.textContent=(p.slot===0?'👑 ':'')+p.name; pw.appendChild(c); });
    if(mySlot===0) show('start-btn'); else $('w-hint').textContent=window.ZapPlay?ZapPlay.t('ana_wait_p1'):'En attente du joueur 1…';
    if(window.ZapPlay)ZapPlay.showLounge({players:d.players,mySlot,roomCode:d.code,gameName:'Anagramme'});
  }
  if(d.phase==='PLAYING'){if(window.ZapPlay)ZapPlay.hideLounge(); renderScores(d.players,'score-bar');}
  if(['ROUNDOVER','PLAYING'].includes(d.phase)) renderScores(d.players,'score-bar-r');
  if(d.phase==='GAME_OVER'){
    if(window.ZapPlay)ZapPlay.hideLounge();
    ['scr-play','scr-rnd'].forEach(hide); show('scr-over');
    const sorted=[...d.players].sort((a,b)=>b.score-a.score);
    $('winner-txt').textContent = sorted[0]
      ? (window.ZapPlay?ZapPlay.t('ana_x_wins',{name:sorted[0].name}):(sorted[0].name+' gagne !'))
      : '';
    renderRanks(sorted.map((p,i)=>({
      me:p.slot===mySlot,
      medal:medals[i]||'🏅',
      name:p.name,
      pts:(window.ZapPlay?ZapPlay.t('ana_pts',{n:p.score}):(p.score+' pts'))
    })),'final-ranks');
  }
}
$('guess-in').addEventListener('keydown',e=>{ if(e.key==='Enter') submitGuess(); });

(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('name')) $('name-input').value=p.get('name');
  if(p.get('code')){ $('code-in').value=p.get('code').toUpperCase(); toggleJoin(); }
  if(p.get('create')==='1'&&p.get('name')){
    const name=p.get('name'); $('name-input').value=name;
    pendingAction=()=>send({type:'create_anagramme',name});
  }
})();
function bindLoungeSender(){if(window.ZapPlay)ZapPlay.setLoungeSender(text=>send({type:'lounge_chat',text}));else setTimeout(bindLoungeSender,120);}
bindLoungeSender();

// Refresh dynamic strings on language switch
window.addEventListener('zapplay:lang', () => {
  // shared.js re-applies data-i18n; refresh state-driven strings too
  if (lastState) updateState(lastState);
});
</script>
<script src="shared.js"></script>
<script src="chat.js"></script>
<script>(function(){var sc=document.getElementById('zp-stars-anagramme');if(!sc)return;for(var i=0;i<60;i++){var s=document.createElement('div');s.className='zp-star';var sz=(.4+Math.random()*1.6).toFixed(1);s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+((.2+Math.random()*.8).toFixed(2))+';animation-duration:'+(2+Math.random()*4).toFixed(1)+'s;animation-delay:'+(Math.random()*5).toFixed(1)+'s';sc.appendChild(s);}})();</script>
</body>
</html>
