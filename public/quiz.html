<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZapPlay — Quiz</title>
<style>
:root{--bg:#0f0c29;--bg2:#302b63;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.13);--primary:#a78bfa;--primary2:#7c3aed;--buzz:#f97316;--correct:#22c55e;--wrong:#ef4444;--gold:#fbbf24;--text:#f1f5f9;--muted:#94a3b8;--r:14px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 55%,#24243e 100%);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
#wrap{height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;padding:0 12px}
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.active{display:flex}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--primary2);color:#fff}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
.btn-success{background:var(--correct);color:#fff}
.btn-sm{padding:8px 14px;font-size:.85rem;border-radius:8px;width:auto}
input[type=text]{background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;font-size:16px;color:var(--text);width:100%;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--primary)}
input[type=text]::placeholder{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
/* Home */
#s-home{justify-content:center;gap:18px}
.logo h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.logo p{color:var(--muted);text-align:center;font-size:.9rem;margin-top:4px}
.form-card{display:flex;flex-direction:column;gap:12px}
.form-card h2{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
#err{color:#fca5a5;font-size:.85rem;text-align:center;min-height:18px}
/* Wait */
#s-wait{justify-content:center;align-items:center;gap:18px;text-align:center}
#wait-msg h2{font-size:1.2rem;font-weight:700}
#wait-msg p{color:var(--muted);margin-top:6px;font-size:.9rem}
/* Setup */
#s-setup{gap:12px;padding:10px 0;overflow-y:auto}
#s-setup h2{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 6px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation;line-height:1.3}
.cat-btn.on{border-color:var(--primary);background:rgba(167,139,250,.12);color:var(--text)}
.diff-row{display:flex;gap:8px}
.diff-btn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation}
.diff-btn.on{border-color:var(--buzz);color:var(--text);background:rgba(249,115,22,.1)}
/* Count selector */
.count-row{display:flex;gap:8px}
.count-btn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px;font-size:.9rem;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation}
.count-btn.on{border-color:var(--correct);color:var(--text);background:rgba(34,197,94,.1)}
.custom-toggle{background:none;border:1px dashed var(--border);border-radius:8px;padding:10px;width:100%;color:var(--muted);font-size:.85rem;cursor:pointer;transition:color .15s}
#custom-area{display:none;flex-direction:column;gap:8px}
.opts-2x2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.radio-row{display:flex;gap:10px;align-items:center;font-size:.85rem;color:var(--muted)}
.radio-row label{display:flex;align-items:center;gap:4px;cursor:pointer}
.radio-row input{accent-color:var(--primary)}
#custom-list{display:flex;flex-direction:column;gap:6px}
.cq-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:.82rem}
.cq-del{background:none;border:none;color:var(--wrong);cursor:pointer;font-size:1rem;padding:0 4px}
/* Game */
#scoreboard{display:flex;justify-content:space-between;align-items:center;padding:10px 0;gap:6px;flex-wrap:wrap}
.sc{flex:1;min-width:60px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px 8px;text-align:center;position:relative}
.sc.me{border-color:var(--primary)}
.sc.opp{border-color:var(--buzz)}
.sc-name{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-pts{font-size:1.25rem;font-weight:700}
.sc.me .sc-pts{color:var(--primary)}
.sc.opp .sc-pts{color:var(--buzz)}
.streak-badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#000;border-radius:20px;font-size:.6rem;font-weight:800;padding:2px 5px;display:none}
.streak-badge.show{display:block}
.wins-row{font-size:.65rem;color:var(--muted);text-align:center;margin-top:2px}
.vs{background:var(--card);border:1px solid var(--border);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:var(--muted);flex-shrink:0}
#timer-wrap{height:5px;background:rgba(255,255,255,.08);border-radius:3px;margin:2px 0 8px;overflow:hidden}
#timer-bar{height:100%;width:100%;border-radius:3px;background:var(--primary);transform-origin:left}
#timer-bar.go{animation:shrink linear forwards}
@keyframes shrink{0%{width:100%;background:var(--primary)}60%{background:var(--buzz)}100%{width:0%;background:var(--wrong)}}
#main{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding:2px 0}
#q-num{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
#q-text{font-size:1.1rem;font-weight:600;line-height:1.45}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ans-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 10px;font-size:.9rem;font-weight:500;color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,transform .1s;touch-action:manipulation;min-height:58px;text-align:center;line-height:1.3}
.ans-btn:active{transform:scale(.97)}
.ans-btn:disabled{cursor:default;opacity:.7}
.ans-btn.enabled:hover{border-color:var(--primary);background:rgba(167,139,250,.1)}
.ans-btn.correct{border-color:var(--correct)!important;background:rgba(34,197,94,.18)!important;color:#86efac}
.ans-btn.wrong{border-color:var(--wrong)!important;background:rgba(239,68,68,.18)!important;color:#fca5a5}
.ans-btn.hidden-joker{opacity:.18;pointer-events:none}
#status{text-align:center;padding:11px;border-radius:12px;font-weight:600;font-size:.92rem;background:var(--card);border:1px solid var(--border);min-height:48px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
/* Jokers */
#joker-row{display:flex;gap:8px;padding:4px 0}
.joker-btn{flex:1;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:9px;padding:8px 10px;font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;touch-action:manipulation}
.joker-btn:not(:disabled):hover{border-color:var(--gold);color:var(--gold);background:rgba(251,191,36,.1)}
.joker-btn:disabled{opacity:.35;cursor:default}
.joker-btn.used{opacity:.25;cursor:default;text-decoration:line-through}
.joker-btn.flash{animation:jokerflash .4s ease}
@keyframes jokerflash{0%,100%{transform:scale(1)}50%{transform:scale(1.12);border-color:var(--gold);color:var(--gold)}}
#buzz-area{padding:4px 0 10px}
#buzz-btn{width:100%;min-height:82px;background:linear-gradient(135deg,var(--buzz),#c2410c);border:none;border-radius:var(--r);font-size:1.7rem;font-weight:800;color:#fff;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 20px rgba(249,115,22,.35);transition:transform .1s;position:relative;overflow:hidden;letter-spacing:.04em}
#buzz-btn:active{transform:scale(.97)}
#buzz-btn.pulse{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(249,115,22,.35)}50%{box-shadow:0 4px 40px rgba(249,115,22,.75)}}
#buzz-btn:disabled{background:#374151;box-shadow:none;opacity:.45;cursor:default;animation:none}
/* Game over */
#s-gameover{justify-content:center;align-items:center;text-align:center;gap:14px}
#go-title{font-size:1.7rem;font-weight:800}
#go-winner{font-size:1rem;color:var(--gold);font-weight:600;padding:10px 18px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:10px}
.final-scores{display:flex;flex-wrap:wrap;gap:10px;width:100%}
.fs-card{flex:1;min-width:calc(50% - 10px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.fs-name{color:var(--muted);font-size:.8rem;margin-bottom:4px}
.fs-pts{font-size:2rem;font-weight:800}
.fs-wins{font-size:.75rem;color:var(--muted);margin-top:4px}
/* Countdown */
#cdown{position:fixed;inset:0;background:rgba(15,12,41,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;font-size:7rem;font-weight:800;color:var(--primary)}
#cdown small{font-size:1.2rem;font-weight:600;color:var(--muted);margin-top:-10px}
#dot{position:fixed;top:10px;right:12px;width:8px;height:8px;border-radius:50%;background:#ef4444;transition:background .3s}
#dot.ok{background:#22c55e}
#sound-toggle{position:fixed;top:6px;right:28px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted);padding:4px}
#back-btn{position:fixed;top:6px;left:10px;background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;padding:4px 8px;border-radius:6px}
#back-btn:hover{color:var(--text)}
/* Confetti */
#confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.conf{position:absolute;width:10px;height:10px;border-radius:2px;opacity:0;animation:conffall linear forwards}
@keyframes conffall{
  0%{opacity:1;transform:translateY(-20px) rotate(0deg)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg)}
}
</style>
</head>
<body>
<div id="dot"></div>
<button id="back-btn" onclick="location.href='index.html'">&#8592; Accueil</button>
<button id="sound-toggle" title="Sons on/off">&#128266;</button>
<div id="cdown"><span id="cnum"></span><small>Préparez-vous !</small></div>
<div id="confetti-wrap"></div>

<div id="wrap">
<!-- HOME -->
<div id="s-home" class="screen active">
  <div style="flex:1"></div>
  <div class="logo"><h1>Quiz Eclair</h1><p>Buzzez le premier !</p></div>
  <div class="card form-card">
    <h2>Ton prénom</h2>
    <input id="inp-name" type="text" placeholder="Ex: Marie" maxlength="20" autocomplete="off">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="doCreate()">Créer une salle</button>
      <button class="btn btn-secondary" style="flex:1" onclick="showJoinInput()">Rejoindre (code)</button>
    </div>
    <div id="join-code-area" style="display:none;flex-direction:column;gap:8px">
      <input id="inp-code" type="text" placeholder="Code (ex: ABCD)" maxlength="4" autocomplete="off"
        style="text-transform:uppercase;letter-spacing:.12em;font-size:1.1rem;font-weight:700;text-align:center">
      <button class="btn btn-secondary" onclick="doJoin()">Rejoindre</button>
    </div>
  </div>
  <div id="err"></div>
  <div style="flex:1"></div>
</div>

<!-- WAIT (host waiting for 2nd player) -->
<div id="s-wait" class="screen">
  <div style="text-align:center;padding:16px 0 8px">
    <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Code de votre salle</div>
    <div id="room-code-display" onclick="copyRoomCode()" title="Cliquer pour copier"
      style="font-size:3rem;font-weight:800;letter-spacing:.2em;color:var(--primary);font-family:monospace;
             background:rgba(167,139,250,.1);border:2px solid rgba(167,139,250,.35);border-radius:14px;
             padding:14px 20px;cursor:pointer;transition:background .18s;display:inline-block">
      ----
    </div>
    <div id="copy-hint-quiz" style="font-size:.72rem;color:var(--muted);margin-top:6px">Cliquer pour copier</div>
  </div>
  <div id="wait-msg"><h2 id="wait-title">En attente...</h2><p id="wait-count" style="color:var(--muted);font-size:.9rem">1 joueur connecté</p></div>
</div>

<!-- SETUP -->
<div id="s-setup" class="screen">
  <div style="height:8px"></div>
  <h2>Categories</h2>
  <div class="cat-grid" id="cat-grid">
    <button class="cat-btn on" data-cat="geo">Géographie</button>
    <button class="cat-btn on" data-cat="histoire">Histoire</button>
    <button class="cat-btn on" data-cat="sciences">Sciences</button>
    <button class="cat-btn on" data-cat="cinema">Cinéma &amp; TV</button>
    <button class="cat-btn on" data-cat="musique">Musique</button>
    <button class="cat-btn on" data-cat="sport">Sport</button>
    <button class="cat-btn on" data-cat="cuisine">Gastronomie</button>
    <button class="cat-btn on" data-cat="tech">Tech</button>
    <button class="cat-btn on" data-cat="culture">Culture</button>
  </div>
  <h2>Difficulté</h2>
  <div class="diff-row" id="diff-row">
    <button class="diff-btn on" data-diff="0">Toutes</button>
    <button class="diff-btn" data-diff="1">Facile</button>
    <button class="diff-btn" data-diff="2">Moyen</button>
    <button class="diff-btn" data-diff="3">Difficile</button>
  </div>
  <h2>Nombre de questions</h2>
  <div class="count-row" id="count-row">
    <button class="count-btn" data-count="5">5</button>
    <button class="count-btn" data-count="10">10</button>
    <button class="count-btn on" data-count="15">15</button>
    <button class="count-btn" data-count="20">20</button>
  </div>
  <button class="custom-toggle" onclick="toggleCustom()">+ Questions personnalisées</button>
  <div id="custom-area">
    <input type="text" id="cq-text" placeholder="Votre question..." maxlength="200">
    <div class="opts-2x2">
      <input type="text" id="cq0" placeholder="Réponse A" maxlength="60">
      <input type="text" id="cq1" placeholder="Réponse B" maxlength="60">
      <input type="text" id="cq2" placeholder="Réponse C" maxlength="60">
      <input type="text" id="cq3" placeholder="Réponse D" maxlength="60">
    </div>
    <div class="radio-row">
      <span>Bonne réponse :</span>
      <label><input type="radio" name="cqans" value="0"> A</label>
      <label><input type="radio" name="cqans" value="1"> B</label>
      <label><input type="radio" name="cqans" value="2"> C</label>
      <label><input type="radio" name="cqans" value="3"> D</label>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="addCustomQ()">Ajouter</button>
    <div id="custom-list"></div>
  </div>
  <div id="setup-actions" style="margin-top:auto;padding-top:10px;display:flex;flex-direction:column;gap:8px">
    <div id="setup-status" style="text-align:center;color:var(--muted);font-size:.85rem"></div>
    <button id="btn-start" class="btn btn-success" onclick="doStart()" style="display:none">Lancer la partie !</button>
  </div>
  <div style="height:6px"></div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div id="scoreboard">
    <!-- Dynamically rendered by renderScoreboard() -->
  </div>
  <div id="timer-wrap"><div id="timer-bar"></div></div>
  <div id="main">
    <div class="card"><div id="q-num">Question 1 / 15</div><div style="height:6px"></div><div id="q-text">...</div></div>
    <div class="ans-grid">
      <button class="ans-btn" id="a0" onclick="doAnswer(0)"></button>
      <button class="ans-btn" id="a1" onclick="doAnswer(1)"></button>
      <button class="ans-btn" id="a2" onclick="doAnswer(2)"></button>
      <button class="ans-btn" id="a3" onclick="doAnswer(3)"></button>
    </div>
    <div id="joker-row">
      <button class="joker-btn" id="joker-fifty" onclick="doJoker('fifty')" disabled>&#9000; 50/50</button>
      <button class="joker-btn" id="joker-pass" onclick="doJoker('pass')" disabled>&#8594; Passe</button>
    </div>
    <div id="status"></div>
  </div>
  <div id="buzz-area"><button id="buzz-btn" onclick="doBuzz()" disabled>BUZZ !</button></div>
</div>

<!-- GAME OVER -->
<div id="s-gameover" class="screen">
  <div id="go-title">Fin de la partie !</div>
  <div id="go-winner"></div>
  <div class="final-scores" id="go-scores"></div>
  <button class="btn btn-primary" onclick="doRestart()">Rejouer</button>
  <button class="btn btn-secondary" onclick="location.href='index.html'">Accueil</button>
</div>
</div><!-- /wrap -->

<script>
// ── Sound ─────────────────────────────────────────────────────────────────────
let soundOn = true;
document.getElementById('sound-toggle').onclick = () => {
  soundOn = !soundOn;
  document.getElementById('sound-toggle').textContent = soundOn ? '\uD83D\uDD0A' : '\uD83D\uDD07';
};
const SND = (() => {
  let ctx = null;
  function init() { if (!ctx) try { ctx = new AudioContext(); } catch {} }
  function beep(f,d,t='sine',v=0.28){if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d);o.start();o.stop(ctx.currentTime+d+.01);}
  function later(ms,fn){setTimeout(fn,ms);}
  return {
    init,
    buzz(){if(!soundOn)return;beep(440,.08,'square',.3);},
    correct(){if(!soundOn)return;beep(523,.12);later(140,()=>beep(659,.12));later(280,()=>beep(784,.25,'sine',.35));},
    wrong(){if(!soundOn)return;beep(220,.12,'sawtooth',.35);later(130,()=>beep(185,.22,'sawtooth',.28));},
    tick(){if(!soundOn)return;beep(1100,.04,'sine',.12);},
    count(){if(!soundOn)return;beep(330,.15,'sine',.22);},
    start(){if(!soundOn)return;[0,180,360,540].forEach((d,i)=>later(d,()=>beep([261,330,392,523][i],.2,'sine',.25)));},
  };
})();

// ── Timer ─────────────────────────────────────────────────────────────────────
let tickT = null;
function startTimer(s){
  clearTimeout(tickT);
  const bar=document.getElementById('timer-bar');
  bar.classList.remove('go');bar.style.animationDuration='';
  void bar.offsetWidth;bar.style.animationDuration=s+'s';bar.classList.add('go');
  tickT=setTimeout(()=>{let r=5;const t=setInterval(()=>{SND.tick();if(--r<=0)clearInterval(t);},1000);},Math.max(0,(s-5)*1000));
}
function stopTimer(){clearTimeout(tickT);const b=document.getElementById('timer-bar');b.classList.remove('go');}

// ── WebSocket ─────────────────────────────────────────────────────────────────
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/quiz`;
let ws, mySlot=-1, myName='', myCode='', reconnectAction=null;
function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    document.getElementById('dot').classList.add('ok');
    if(reconnectAction){reconnectAction();reconnectAction=null;}
  };
  ws.onclose=()=>{document.getElementById('dot').classList.remove('ok');setTimeout(connect,2000);};
  ws.onerror=()=>{};
  ws.onmessage=e=>{let m;try{m=JSON.parse(e.data);}catch{return;}handle(m);};
}
connect();
function send(d){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(d));}

// ── URL params auto-action ────────────────────────────────────────────────────
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('name'))document.getElementById('inp-name').value=p.get('name');
  if(p.get('code')){
    const code=p.get('code').toUpperCase();
    document.getElementById('inp-code').value=code;
    showJoinInput();
  }
  if(p.get('create')==='1'&&p.get('name')){
    // Auto-create after WS connects
    const name=p.get('name');
    document.getElementById('inp-name').value=name;
    const tryCreate=()=>{
      if(ws&&ws.readyState===WebSocket.OPEN){SND.init();myName=name;send({type:'create_quiz',name});}
      else reconnectAction=tryCreate;
    };
    setTimeout(tryCreate,300);
  }
})();

// ── Question count ────────────────────────────────────────────────────────────
let selectedCount = 15;
document.getElementById('count-row').addEventListener('click', e => {
  const b = e.target.closest('.count-btn');
  if (!b) return;
  document.querySelectorAll('.count-btn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  selectedCount = Number(b.dataset.count);
});

// ── Actions ───────────────────────────────────────────────────────────────────
function showJoinInput(){
  const a=document.getElementById('join-code-area');
  a.style.display=a.style.display==='flex'?'none':'flex';
  a.style.flexDirection='column';a.style.gap='8px';
}
function doCreate(){
  SND.init();
  const n=document.getElementById('inp-name').value.trim();
  if(!n){showErr('Entre ton prénom !');return;}
  myName=n;send({type:'create_quiz',name:n});
}
function doJoin(){
  SND.init();
  const n=document.getElementById('inp-name').value.trim();
  if(!n){showErr('Entre ton prénom !');return;}
  const c=document.getElementById('inp-code').value.trim().toUpperCase();
  if(!c){showErr('Entre le code de la salle !');return;}
  myName=n;send({type:'join_quiz',name:n,code:c});
}
function copyRoomCode(){
  if(!myCode)return;
  navigator.clipboard.writeText(myCode).then(()=>{
    const h=document.getElementById('copy-hint-quiz');
    h.textContent='Copié !';h.style.color='var(--correct)';
    setTimeout(()=>{h.textContent='Cliquer pour copier';h.style.color='';},1500);
  }).catch(()=>{});
}
function copyCode(){
  if(!myCode)return;
  navigator.clipboard.writeText(myCode).then(()=>{
    const el=document.querySelector('#setup-status span');
    if(el){const orig=el.textContent;el.textContent='Copié !';setTimeout(()=>{el.textContent=orig;},1200);}
  }).catch(()=>{});
}
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')doCreate();});
document.getElementById('inp-code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});
document.getElementById('inp-code').addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});
function doBuzz(){send({type:'buzz'});}
function doAnswer(i){send({type:'answer',index:i});}
function doRestart(){send({type:'restart_quiz'});}
function doStart(){
  const cats=[...document.querySelectorAll('.cat-btn.on')].map(b=>b.dataset.cat);
  const diff=Number(document.querySelector('.diff-btn.on').dataset.diff);
  send({type:'start_quiz',categories:cats,difficulty:diff,custom:customQuestions,count:selectedCount});
}
function showErr(msg){const el=document.getElementById('err');el.textContent=msg;setTimeout(()=>{if(el.textContent===msg)el.textContent='';},3000);}

// ── Jokers ────────────────────────────────────────────────────────────────────
function doJoker(kind) {
  send({ type: 'joker', kind });
  const btn = document.getElementById('joker-' + kind);
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 400);
}

function updateJokerButtons(phase, myJokers) {
  const fiftyBtn = document.getElementById('joker-fifty');
  const passBtn  = document.getElementById('joker-pass');
  const activePhase = (phase === 'QUESTION' || phase === 'BUZZED');

  if (!myJokers) {
    fiftyBtn.disabled = true; passBtn.disabled = true; return;
  }
  // fifty/fifty
  if (!myJokers.fifty || !activePhase) {
    fiftyBtn.disabled = true;
    if (!myJokers.fifty) fiftyBtn.classList.add('used');
  } else {
    fiftyBtn.disabled = false;
    fiftyBtn.classList.remove('used');
  }
  // pass
  if (!myJokers.pass || !activePhase) {
    passBtn.disabled = true;
    if (!myJokers.pass) passBtn.classList.add('used');
  } else {
    passBtn.disabled = false;
    passBtn.classList.remove('used');
  }
}

// ── Setup ─────────────────────────────────────────────────────────────────────
document.getElementById('cat-grid').addEventListener('click',e=>{const b=e.target.closest('.cat-btn');if(b)b.classList.toggle('on');});
document.getElementById('diff-row').addEventListener('click',e=>{const b=e.target.closest('.diff-btn');if(b){document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');}});
function toggleCustom(){const a=document.getElementById('custom-area');a.style.display=a.style.display==='flex'?'none':'flex';a.style.flexDirection='column';a.style.gap='8px';}
const customQuestions=[];
function addCustomQ(){const text=document.getElementById('cq-text').value.trim();const opts=[0,1,2,3].map(i=>document.getElementById('cq'+i).value.trim());const ansEl=document.querySelector('input[name="cqans"]:checked');if(!text||opts.some(o=>!o)||!ansEl){alert('Remplis tous les champs !');return;}customQuestions.push({text,opts,ans:Number(ansEl.value)});renderCustomList();document.getElementById('cq-text').value='';[0,1,2,3].forEach(i=>document.getElementById('cq'+i).value='');document.querySelectorAll('input[name="cqans"]').forEach(r=>r.checked=false);}
function removeCustomQ(i){customQuestions.splice(i,1);renderCustomList();}
function renderCustomList(){document.getElementById('custom-list').innerHTML=customQuestions.map((q,i)=>`<div class="cq-item"><span>${q.text}</span><button class="cq-del" onclick="removeCustomQ(${i})">✕</button></div>`).join('');}


// ── Countdown ─────────────────────────────────────────────────────────────────
function showCountdown(n){const el=document.getElementById('cdown');const num=document.getElementById('cnum');el.style.display='flex';let c=n;function tick(){if(c<=0){el.style.display='none';SND.start();return;}num.textContent=c--;SND.count();setTimeout(tick,1000);}tick();}

// ── Screen ────────────────────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#a78bfa','#f97316','#22c55e','#fbbf24','#ef4444','#60a5fa','#f472b6','#34d399'];
  const count = 70;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'conf';
    const size = 8 + Math.random() * 10;
    el.style.cssText = [
      `left:${Math.random()*100}%`,
      `top:${-20 - Math.random()*40}px`,
      `width:${size}px`,
      `height:${size * (0.5 + Math.random())}px`,
      `background:${colors[Math.floor(Math.random()*colors.length)]}`,
      `border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`,
      `animation-duration:${2.2 + Math.random()*1.4}s`,
      `animation-delay:${Math.random()*0.8}s`,
    ].join(';');
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 4000);
}

// ── Messages ──────────────────────────────────────────────────────────────────
function handle(msg){
  switch(msg.type){
    case 'created_quiz':
      mySlot=msg.slot;myCode=msg.code;
      document.getElementById('room-code-display').textContent=msg.code;
      show('s-wait');
      break;
    case 'welcome_quiz': mySlot=msg.slot;myCode=msg.code||''; break;
    case 'error': showErr(msg.msg); break;
    case 'countdown': showCountdown(msg.seconds); break;
    case 'player_left':
      if(msg.name){showErr((msg.name)+' a quitté.');}
      // stay in current screen if still playing, go home only if waiting
      break;
    case 'game_abandoned':
      showErr('Tous les autres joueurs ont quitté — partie abandonnée !');
      break;
    case 'state': render(msg); break;
  }
}

// ── Scoreboard renderer ───────────────────────────────────────────────────────
function renderScoreboard(st){
  const sb=document.getElementById('scoreboard');
  sb.innerHTML='';
  st.players.forEach((p,i)=>{
    if(i>0){const vs=document.createElement('div');vs.className='vs';vs.textContent='VS';sb.appendChild(vs);}
    const isMe=p.slot===mySlot;
    const streak=st.players[p.slot]?.streak||0;
    const wins=st.wins?.[p.slot]||0;
    const d=document.createElement('div');
    d.className='sc'+(isMe?' me':' opp');
    d.id='sc-'+p.slot;
    d.innerHTML=`<div class="sc-name">${p.name}</div><div class="sc-pts" id="pts-${p.slot}">${p.score}</div><div class="wins-row" id="wins-${p.slot}">${wins?wins+' vic.':''}</div><div class="streak-badge${streak>=3?' show':''}" id="streak-${p.slot}">x${streak}</div>`;
    sb.appendChild(d);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(st){
  const me=st.players.find(p=>p.slot===mySlot);
  if(st.phase==='WAITING'){
    show('s-wait');
    const c=st.players.length;
    document.getElementById('wait-count').textContent=c+' joueur'+(c>1?'s':'')+' connecté'+(c>1?'s':'');
    return;
  }
  if(st.phase==='SETUP'){
    show('s-setup');
    const isP1=mySlot===0;
    const n=st.players.length;
    const canStart=isP1&&n>=2;
    document.getElementById('btn-start').style.display=canStart?'':'none';
    if(isP1){
      if(n<2){
        document.getElementById('setup-status').innerHTML=`Code&nbsp;: <span onclick="copyCode()" title="Copier" style="font-family:monospace;font-weight:800;color:var(--primary);letter-spacing:.12em;cursor:pointer">${myCode}</span>&nbsp;— En attente de joueurs…`;
      } else {
        document.getElementById('setup-status').textContent=`${n} joueur${n>1?'s':''} — lance quand tu es prêt !`;
      }
    } else {
      document.getElementById('setup-status').textContent=`En attente que ${st.players[0]?.name||'Joueur 1'} lance…`;
    }
    document.querySelectorAll('.cat-btn,.diff-btn,.count-btn,.custom-toggle').forEach(el=>{el.disabled=!isP1;el.style.pointerEvents=isP1?'':'none';el.style.opacity=isP1?'':'0.5';});
    document.getElementById('btn-start').disabled=!canStart;
    return;
  }
  if(st.phase==='GAME_OVER'){renderGameOver(st);return;}
  if(st.phase==='COUNTDOWN')return;
  show('s-game');
  renderScoreboard(st);

  // Update joker buttons
  const myJokers = me?.jokers || null;
  updateJokerButtons(st.phase, myJokers);

  if(st.question){
    document.getElementById('q-num').textContent=`Question ${st.qIndex+1} / ${st.total}`;
    document.getElementById('q-text').textContent=st.question.text;
    const opts=st.question.opts;
    const btns=[0,1,2,3].map(i=>document.getElementById('a'+i));
    btns.forEach((b,i)=>{b.textContent=opts[i];b.className='ans-btn';b.disabled=true;});

    // Apply 50/50 joker hiding
    if(st.joker50&&st.joker50.hide){
      st.joker50.hide.forEach(idx=>{btns[idx].classList.add('hidden-joker');});
    }

    if(st.phase==='QUESTION'){stopTimer();startTimer(st.timerSeconds||15);setBuzz(true);setStatus('');}
    if(st.phase==='BUZZED'){
      navigator.vibrate&&navigator.vibrate(200);
      const isBuzzer=st.buzzedSlot===mySlot;
      stopTimer();startTimer(st.timerSeconds||10);
      if(isBuzzer){btns.forEach(b=>{b.className='ans-btn enabled';b.disabled=false;if(st.joker50&&st.joker50.hide&&st.joker50.hide.some(idx=>btns.indexOf(b)===idx)){b.className='ans-btn hidden-joker';b.disabled=true;}});setStatus('Tu as buzzé ! Choisis ta réponse...');}
      else{setStatus(`${st.players[st.buzzedSlot]?.name||'?'} a buzzé !`);}
      setBuzz(false);
    }
    if(st.phase==='SECOND_CHANCE'){
      const isSecondMe=st.secondChanceSlot===mySlot;
      stopTimer();startTimer(st.timerSeconds||5);
      if(st.firstWrongAns>=0)btns[st.firstWrongAns].className='ans-btn wrong';
      if(isSecondMe){btns.forEach((b,i)=>{if(i!==st.firstWrongAns){b.className='ans-btn enabled';b.disabled=false;}});setStatus('Deuxième chance pour toi !','second');}
      else{setStatus(`Deuxième chance pour ${st.players[st.secondChanceSlot]?.name||'?'} !`,'second');}
      setBuzz(false);SND.buzz();
    }
    if(st.phase==='REVEAL'&&st.reveal){
      stopTimer();
      const{correct,selected,isCorrect,answererSlot,isSecondChance,pts,streakBonus,firstWrongAns,timeBonus}=st.reveal;
      btns.forEach((b,i)=>{if(i===correct)b.className='ans-btn correct';else if(i===selected&&!isCorrect)b.className='ans-btn wrong';else if(i===firstWrongAns&&firstWrongAns>=0&&firstWrongAns!==correct)b.className='ans-btn wrong';else b.className='ans-btn';});
      setBuzz(false);
      if(answererSlot<0||selected<0)setStatus('Temps écoulé ! Personne n\'a répondu.');
      else if(answererSlot===mySlot){
        if(isCorrect){
          navigator.vibrate&&navigator.vibrate([100,50,100]);
          const bonus=timeBonus?' ⚡+1 Bonus Vitesse !':'';
          setStatus(`+${pts} point${pts>1?'s':''}${streakBonus?' + Bonus série !':''}${bonus}`,'ok',isSecondChance?'(2ème chance)':'');
          SND.correct();
        }else{setStatus('Mauvaise réponse...','bad');SND.wrong();}
      }
      else{const aName=st.players[answererSlot]?.name||'?';if(isCorrect){setStatus(aName+' : +'+pts+' pt'+(pts>1?'s':''),'bad',isSecondChance?'(2ème chance)':'');SND.correct();}else{setStatus(aName+' s\'est trompé !','ok');SND.wrong();}}
    }
  }
}
function setBuzz(on){const b=document.getElementById('buzz-btn');b.disabled=!on;b.classList.toggle('pulse',on);}
function setStatus(text,cls='',sub=''){
  const el=document.getElementById('status');
  el.style.cssText='';
  if(cls==='ok'){el.style.borderColor='var(--correct)';el.style.color='#86efac';}
  else if(cls==='bad'){el.style.borderColor='var(--wrong)';el.style.color='#fca5a5';}
  else if(cls==='second'){el.style.borderColor='var(--gold)';el.style.color='var(--gold)';}
  else{el.style.borderColor='var(--border)';el.style.color='var(--muted)';}
  el.innerHTML=text+(sub?`<small style="font-size:.75rem;font-weight:400;color:var(--muted)">${sub}</small>`:'');
}
function renderGameOver(st){
  show('s-gameover');stopTimer();
  const ws=st.winnerSlot??-1;
  if(ws<0)document.getElementById('go-winner').textContent='Égalité — match nul !';
  else if(ws===mySlot){document.getElementById('go-winner').textContent='Tu as gagné ! Félicitations !';launchConfetti();}
  else document.getElementById('go-winner').textContent=(st.players[ws]?.name||'?')+' a gagné !';
  const sc=document.getElementById('go-scores');sc.innerHTML='';
  // Sort by score descending
  const sorted=[...st.players].sort((a,b)=>b.score-a.score);
  sorted.forEach(p=>{
    const wins=st.wins?.[p.slot]??0;
    const d=document.createElement('div');
    d.className='fs-card';
    if(p.slot===mySlot)d.style.borderColor='var(--primary)';
    d.innerHTML='<div class="fs-name">'+p.name+'</div><div class="fs-pts">'+p.score+'</div><div class="fs-wins">'+wins+' victoire'+(wins!==1?'s':'')+'</div>';
    sc.appendChild(d);
  });
}
