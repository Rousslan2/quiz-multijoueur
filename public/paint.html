<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZapPlay — Paint.io</title>
<style>
:root{
  --primary:#a78bfa;--buzz:#f97316;--ok:#22c55e;--bad:#ef4444;
  --text:#f1f5f9;--muted:#94a3b8;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.13)
}
*{box-sizing:border-box;margin:0;padding:0;touch-action:none}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:var(--text);height:100dvh;overflow:hidden
}
#app{max-width:900px;margin:0 auto;height:100dvh;padding:56px 12px 14px;display:flex;flex-direction:column;gap:10px}
#back{position:fixed;top:8px;left:8px;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 10px;z-index:50}
#dot{position:fixed;top:10px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--bad);z-index:50}#dot.ok{background:var(--ok)}
h1{text-align:center;font-size:1.9rem;background:linear-gradient(135deg,var(--primary),var(--buzz));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid var(--border);border-radius:14px;padding:12px;backdrop-filter:blur(8px)}
.hidden{display:none!important}
.btn{border:none;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}.btn-buzz{background:var(--buzz);color:#fff}.btn-muted{background:rgba(255,255,255,.12);color:var(--text)}
input{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 12px;outline:none}
#name-screen{display:flex;flex-direction:column;gap:10px;max-width:420px;width:100%;margin:0 auto}
#join-area{display:none;gap:8px;flex-direction:column}
#game-screen{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
#waiting{display:flex;flex-direction:column;gap:10px;align-items:center}
#players{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
#players .chip{padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--border);font-size:.8rem}
#arena-wrap{display:flex;justify-content:center;align-items:center;flex:1;min-height:0;padding:4px}
#arena{
  width:min(96vw,760px);height:min(96vw,760px);max-width:760px;max-height:min(72dvh,760px);
  aspect-ratio:1;border-radius:16px;
  background:radial-gradient(ellipse 120% 100% at 50% 0%,rgba(167,139,250,.12),transparent 55%),#0f0d24;
  border:2px solid rgba(167,139,250,.35);box-shadow:0 0 0 1px rgba(0,0,0,.4),0 12px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06)
}
#status{text-align:center;color:var(--muted);min-height:18px;font-size:.85rem}
#score-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.row{padding:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:10px;font-size:.82rem;display:flex;justify-content:space-between}
.row.dead{opacity:.4}
.color-box{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle}
#controls-mobile{display:none;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:8px;justify-content:center;margin-top:10px}
.mbtn{border:none;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center}
.mbtn:active{background:rgba(255,255,255,.3)}
#gcount{position:fixed;inset:0;background:rgba(15,12,41,.8);display:none;align-items:center;justify-content:center;z-index:500}
#gcount span{font-size:6rem;font-weight:800;color:#f59e0b}
#skin-row{display:flex;flex-direction:column;gap:6px;margin-top:4px}
#skin-row label{font-size:.75rem;color:var(--muted);letter-spacing:.02em}
#skin-pick{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:.9rem;cursor:pointer;outline:none}
#skin-pick:focus{border-color:var(--primary)}
@media(max-width:760px){
  #controls-mobile{display:grid}
  #app{padding-top:48px}
  #arena{max-height:min(58dvh,760px)}
}
</style>
</head>
<body>
<div id="gcount"><span id="gnum">3</span></div>
<button id="back" onclick="location.href='index.html'">← Accueil</button>
<div id="dot"></div>
<div id="app">
  <h1>🎨 Paint.io</h1>

  <div id="name-screen">
    <div class="card" style="display:flex;flex-direction:column;gap:8px">
      <input id="name" maxlength="20" placeholder="Ton pseudo">
      <button class="btn btn-primary" onclick="createGame()">Créer une salle</button>
      <button class="btn btn-buzz" onclick="toggleJoin()">Rejoindre (code)</button>
      <div id="join-area">
        <input id="code" maxlength="4" placeholder="Code (ABCD)" style="text-transform:uppercase;letter-spacing:.14em;text-align:center">
        <button class="btn btn-buzz" onclick="joinGame()">Rejoindre</button>
      </div>
      <div id="skin-row">
        <label for="skin-pick">Thème &amp; skins</label>
        <select id="skin-pick" aria-label="Thème visuel Paint.io"></select>
      </div>
      <div id="err" style="color:#fca5a5;font-size:.82rem;min-height:18px;text-align:center"></div>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <div id="waiting" class="card hidden">
      <div id="code-box" onclick="copyCode()" style="cursor:pointer;text-align:center">
        <div style="font-size:.72rem;color:var(--muted)">Code de la salle</div>
        <div id="room-code" style="font-size:2.1rem;font-family:monospace;letter-spacing:.2em;color:var(--primary);font-weight:800">----</div>
      </div>
      <div id="players"></div>
      <button id="start-btn" class="btn btn-primary hidden" onclick="startGame()">Lancer la partie</button>
    </div>

    <div id="playing" class="hidden" style="display:flex;flex-direction:column;gap:10px;min-height:0;flex:1">
      <div class="card" style="display:flex;flex-direction:column;flex:1;min-height:0;padding:8px">
        <div id="arena-wrap"><canvas id="arena" width="800" height="800"></canvas></div>
        <div id="status" style="margin-top:6px"></div>
      </div>
      <div class="card" style="padding:8px"><div id="score-list"></div></div>
      <div id="controls-mobile">
        <div></div><button class="mbtn" data-dir="up">▲</button><div></div>
        <button class="mbtn" data-dir="left">◀</button><button class="mbtn" data-dir="down">▼</button><button class="mbtn" data-dir="right">▶</button>
      </div>
    </div>

    <div id="over" class="card hidden" style="text-align:center;display:flex;flex-direction:column;gap:10px">
      <div id="over-title" style="font-size:1.3rem;font-weight:800"></div>
      <button class="btn btn-primary" onclick="restart()">Rejouer</button>
      <button class="btn btn-muted" onclick="location.href='index.html'">Accueil</button>
    </div>
  </div>
</div>

<script>
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/paint`;
const PAINT_SKIN_KEY = 'zapplay_paint_skin';
const PAINT_SKINS = {
  neon:{
    name:'Néon ZapPlay',
    colors:['#a78bfa','#22c55e','#f97316','#60a5fa'],
    voidRgb:[18,16,42],
    bg:[['#2a2452',0],['#15122e',0.45],['#0a0818',1]],
    border:'rgba(167,139,250,0.42)',
    gridAlpha:0.05,
    gridStep:4,
    head:'round',
    trailGlow:0.95
  },
  cyber:{
    name:'Cyber grid',
    colors:['#22d3ee','#e879f9','#4ade80','#fbbf24'],
    voidRgb:[8,20,35],
    bg:[['#0c4a6e',0],['#1e1033',0.5],['#020617',1]],
    border:'rgba(34,211,238,0.45)',
    gridAlpha:0.055,
    gridStep:4,
    head:'diamond',
    trailGlow:0.85
  },
  sunset:{
    name:'Coucher de soleil',
    colors:['#fb7185','#f97316','#fbbf24','#a78bfa'],
    voidRgb:[45,20,28],
    bg:[['#9f1239',0],['#431407',0.55],['#1c1917',1]],
    border:'rgba(251,113,133,0.45)',
    gridAlpha:0.048,
    gridStep:4,
    head:'round',
    trailGlow:1
  },
  jungle:{
    name:'Jungle',
    colors:['#4ade80','#22c55e','#a3e635','#14b8a6'],
    voidRgb:[12,35,22],
    bg:[['#14532d',0],['#052e16',0.5],['#020617',1]],
    border:'rgba(74,222,128,0.4)',
    gridAlpha:0.045,
    gridStep:4,
    head:'circle',
    trailGlow:0.8
  },
  arctic:{
    name:'Arctique',
    colors:['#93c5fd','#e0f2fe','#38bdf8','#7dd3fc'],
    voidRgb:[15,28,48],
    bg:[['#1e3a5f',0],['#0f172a',0.55],['#020617',1]],
    border:'rgba(147,197,253,0.45)',
    gridAlpha:0.05,
    gridStep:4,
    head:'round',
    trailGlow:0.75
  },
  retro:{
    name:'Arcade 8-bit',
    colors:['#f472b6','#38bdf8','#facc15','#4ade80'],
    voidRgb:[25,15,40],
    bg:[['#4c1d95',0],['#312e81',0.45],['#0f0a1a',1]],
    border:'rgba(244,114,182,0.5)',
    gridAlpha:0.06,
    gridStep:8,
    head:'diamond',
    trailGlow:0.9
  }
};

let activeSkinId='neon';
function skin(){
  const s=PAINT_SKINS[activeSkinId];
  return s||PAINT_SKINS.neon;
}
function hexToRgb(h){
  const n=String(h).slice(1);
  return [parseInt(n.slice(0,2),16),parseInt(n.slice(2,4),16),parseInt(n.slice(4,6),16)];
}
function trailRgba(hex,a){
  const [r,g,b]=hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function slotColor(slot){ return skin().colors[slot%4]||'#fff'; }

let ws=null,mySlot=-1,myCode='',myName='',state=null,pendingAction=null,lastPhase='';
const $ = id => document.getElementById(id);
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function bindLoungeSender(){ if(window.ZapPlay)ZapPlay.setLoungeSender(text=>send({type:'lounge_chat',text})); else setTimeout(bindLoungeSender,120); }
bindLoungeSender();

let arenaDisplayCss = 520;
let territoryBm = null;
let lastGridStr = '';
let staticLayer = null;
let staticLayerKey = '';

function rgbStr(r,g,b,a=1){ return `rgba(${r},${g},${b},${a})`; }
function lowFx(){ return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches); }

function initSkinUi(){
  const sel=$('skin-pick');
  if(!sel)return;
  const saved=localStorage.getItem(PAINT_SKIN_KEY);
  if(saved && PAINT_SKINS[saved]) activeSkinId=saved;
  sel.innerHTML=Object.keys(PAINT_SKINS).map(id=>`<option value="${id}">${PAINT_SKINS[id].name}</option>`).join('');
  sel.value=activeSkinId;
  sel.addEventListener('change',()=>{
    activeSkinId=sel.value;
    localStorage.setItem(PAINT_SKIN_KEY,activeSkinId);
    invalidatePaintVisualCache();
    if(state&&state.phase==='PLAYING') drawArena();
  });
}
function invalidatePaintVisualCache(){
  lastGridStr='';
  staticLayerKey='';
  territoryBm=null;
}
initSkinUi();

function resizeArenaCanvas(){
  const wrap=$('arena-wrap'), cv=$('arena');
  if(!wrap||!cv)return;
  const r=wrap.getBoundingClientRect();
  const side=Math.floor(Math.min(r.width,r.height)-10);
  const size=Math.max(300,Math.min(side,760));
  const prev=arenaDisplayCss;
  arenaDisplayCss=size;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const px=Math.floor(size*dpr);
  if(cv.width!==px||cv.height!==px||Math.round(prev)!==Math.round(size)){
    cv.width=px; cv.height=px;
    cv.style.width=size+'px'; cv.style.height=size+'px';
    staticLayerKey='';
  }
}
window.addEventListener('resize',()=>{ if(state&&state.phase==='PLAYING'){ resizeArenaCanvas(); drawArena(); } });

function ensureStaticBackground(display,W,H,sk){
  const isMobile=typeof window.matchMedia==='function'&&window.matchMedia('(max-width:760px)').matches;
  const base=sk.gridStep||4;
  const step=isMobile&&Math.max(W,H)>64?Math.max(base,8):base;
  const gkey=`${activeSkinId}-${Math.round(display)}-${W}-${H}-${step}`;
  if(staticLayerKey===gkey&&staticLayer&&staticLayer.width===Math.floor(display)) return staticLayer;
  staticLayerKey=gkey;
  if(!staticLayer) staticLayer=document.createElement('canvas');
  const d=Math.max(1,Math.floor(display));
  staticLayer.width=d;
  staticLayer.height=d;
  const sx=staticLayer.getContext('2d');
  if(!sx)return staticLayer;
  const g=sx.createRadialGradient(d*0.35,d*0.22,0,d*0.52,d*0.55,d*0.92);
  const stops=sk.bg||[['#2a2452',0],['#15122e',0.45],['#0a0818',1]];
  stops.forEach(([c,p])=>g.addColorStop(p,c));
  sx.fillStyle=g;
  sx.fillRect(0,0,d,d);
  sx.strokeStyle=`rgba(255,255,255,${sk.gridAlpha||0.05})`;
  sx.lineWidth=1;
  sx.beginPath();
  for(let x=0;x<=W;x+=step){
    sx.moveTo((x/W)*d+0.5,0);
    sx.lineTo((x/W)*d+0.5,d);
  }
  for(let y=0;y<=H;y+=step){
    sx.moveTo(0,(y/H)*d+0.5);
    sx.lineTo(d,(y/H)*d+0.5);
  }
  sx.stroke();
  sx.strokeStyle=sk.border||'rgba(167,139,250,0.4)';
  sx.lineWidth=2;
  sx.strokeRect(1.5,1.5,d-3,d-3);
  return staticLayer;
}

function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ $('dot').classList.add('ok'); if(window.ZapPlay)ZapPlay.hideLoader(); if(pendingAction){pendingAction();pendingAction=null;} };
  ws.onclose=()=>{ $('dot').classList.remove('ok'); setTimeout(connect,2000); };
  ws.onmessage=e=>{ let m; try{m=JSON.parse(e.data);}catch{return;} handle(m); };
}
connect();

function toggleJoin(){ $('join-area').style.display = $('join-area').style.display==='flex' ? 'none' : 'flex'; }
function createGame(){
  const n=$('name').value.trim(); if(!n){$('err').textContent='Entre ton pseudo';return;}
  myName=n; if(window.ZapPlay)ZapPlay.savePseudo(n);
  const action=()=>send({type:'create_paint',name:n});
  if(ws&&ws.readyState===1) action(); else { pendingAction=action; if(!ws||ws.readyState===3) connect(); }
}
function joinGame(){
  const n=$('name').value.trim(); const c=$('code').value.trim().toUpperCase();
  if(!n||!c){$('err').textContent='Nom + code requis';return;}
  myName=n; if(window.ZapPlay)ZapPlay.savePseudo(n);
  const action=()=>send({type:'join_paint',name:n,code:c});
  if(ws&&ws.readyState===1) action(); else { pendingAction=action; if(!ws||ws.readyState===3) connect(); }
}
function startGame(){ send({type:'start_paint'}); }
function restart(){ send({type:'restart_paint'}); }
function copyCode(){ if(!myCode)return; navigator.clipboard.writeText(myCode).catch(()=>{}); }

function handle(m){
  if(m.type==='created_paint'){mySlot=m.slot;myCode=m.code;showGame();}
  if(m.type==='welcome_paint'){mySlot=m.slot;myCode=m.code;showGame();}
  if(m.type==='error'){ $('err').textContent=m.msg; $('status').textContent=m.msg; }
  if(m.type==='countdown')showCountdown(m.seconds||3);
  if(m.type==='player_left')$('status').textContent=(m.name||'Un joueur')+' a quitté.';
  if(m.type==='lounge_chat' && window.ZapPlay)ZapPlay.addLoungeMessage(m);
  if(m.type==='paint_state'){
    if(m.kills && m.kills.length){
      $('status').textContent = m.kills.map(k => `${k.victim} a été éliminé!`).join(' • ');
      if(navigator.vibrate && m.kills.some(k=>k.victimSlot===mySlot)) navigator.vibrate([200,100,200]);
    }
    state=m;
    render();
  }
}
function showGame(){ $('name-screen').classList.add('hidden'); $('game-screen').classList.remove('hidden'); }
function showCountdown(n){
  const g=$('gcount'),num=$('gnum'); g.style.display='flex'; num.textContent=n;
  let c=n; const t=setInterval(()=>{c--; if(c<=0){clearInterval(t); g.style.display='none';} else num.textContent=c;},1000);
}
function setScreen(id){ ['waiting','playing','over'].forEach(x=>$(x).classList.add('hidden')); $(id).classList.remove('hidden'); }

function render(){
  if(!state)return;
  $('room-code').textContent = state.code||myCode||'----';
  const players=state.players||[];
  if(state.phase==='WAITING'){
    if(window.ZapPlay)ZapPlay.showLounge({players,mySlot,roomCode:state.code||myCode,gameName:'Paint.io'});
    setScreen('waiting');
    $('players').innerHTML=players.map(p=>`<span class="chip"><span class="color-box" style="background:${slotColor(p.slot)}"></span>${p.name}${p.slot===0?' 👑':''}</span>`).join('');
    $('start-btn').classList.toggle('hidden', !(mySlot===0 && players.length>=2));
    return;
  }
  if(state.phase==='PLAYING'){
    if(window.ZapPlay)ZapPlay.hideLounge();
    setScreen('playing');
    resizeArenaCanvas();
    const totalCells = state.W * state.H;
    $('score-list').innerHTML=players.map(p=>{
      const cls=['row',!p.alive?'dead':''].join(' ');
      const pct = ((p.score / totalCells) * 100).toFixed(1);
      return `<div class="${cls}">
        <div style="font-weight:700"><span class="color-box" style="background:${slotColor(p.slot)}"></span>${p.name}</div>
        <div style="font-weight:800;color:${slotColor(p.slot)}">${pct}%</div>
      </div>`;
    }).join('');
    drawArena();
    return;
  }
  if(state.phase==='GAME_OVER'){
    if(window.ZapPlay)ZapPlay.hideLounge();
    setScreen('over');
    const winName = state.winnerSlot>=0 ? (players.find(p=>p.slot===state.winnerSlot)?.name||'') : '';
    $('over-title').textContent = state.winnerSlot>=0 ? `🏆 ${winName} gagne !` : 'Égalité !';
    if(lastPhase!=='GAME_OVER' && window.ZapPlay){
      const pNames=players.map(p=>p.name);
      ZapPlay.saveGameResult({game:'paint',gameName:'Paint.io',players:pNames,winner:winName||'Égalité',myName,myScore:players.find(p=>p.slot===mySlot)?.score||0,isWinner:state.winnerSlot===mySlot});
    }
  }
  lastPhase=state.phase;
}

function getTerritoryBitmap(W,H,gridStr){
  const sk=skin();
  const voidRgb=sk.voidRgb;
  const pal=sk.colors.map(hexToRgb);
  const gridKey=(gridStr||'')+':'+activeSkinId;
  if(gridKey===lastGridStr && territoryBm && territoryBm.width===W) return territoryBm;
  lastGridStr=gridKey;
  if(!territoryBm||territoryBm.width!==W||territoryBm.height!==H){
    territoryBm=document.createElement('canvas');
    territoryBm.width=W; territoryBm.height=H;
  }
  const c=territoryBm.getContext('2d');
  const img=c.createImageData(W,H);
  const d=img.data;
  for(let i=0,pix=0;i<W*H;i++,pix+=4){
    const ch=gridStr[i];
    let r,g,b;
    if(ch==='.'||ch===undefined||ch===''){
      r=voidRgb[0]; g=voidRgb[1]; b=voidRgb[2];
    }else{
      const slot=parseInt(ch,10);
      const rgb=pal[slot]||voidRgb;
      r=Math.min(255,rgb[0]+14); g=Math.min(255,rgb[1]+10); b=Math.min(255,rgb[2]+18);
    }
    d[pix]=r; d[pix+1]=g; d[pix+2]=b; d[pix+3]=255;
  }
  c.putImageData(img,0,0);
  return territoryBm;
}

function roundRectPath(ctx,x,y,w,h,r){
  const rad=Math.min(r,w/2,h/2);
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath();
}

function drawPlayerHead(ctx,p,cellSize,px,py,sk){
  const col=slotColor(p.slot);
  const rgb=hexToRgb(col);
  const inset=cellSize*0.1;
  const hw=cellSize-2*inset;
  const rad=cellSize*0.28;
  const cx=px+cellSize/2, cy=py+cellSize/2;
  const g=ctx.createRadialGradient(px+cellSize*0.35,py+cellSize*0.32,cellSize*0.08,px+cellSize*0.5,py+cellSize*0.5,cellSize*0.55);
  g.addColorStop(0,'#ffffff');
  g.addColorStop(0.25,rgbStr(rgb[0],rgb[1],rgb[2],1));
  g.addColorStop(1,rgbStr(Math.max(0,rgb[0]-40),Math.max(0,rgb[1]-35),Math.max(0,rgb[2]-30),1));
  ctx.fillStyle=g;
  ctx.strokeStyle='rgba(255,255,255,0.55)';
  ctx.lineWidth=Math.max(1.1,cellSize*0.09);
  const htype=sk.head||'round';
  if(htype==='circle'){
    ctx.beginPath();
    ctx.arc(cx,cy,hw*0.44,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();
  }else if(htype==='diamond'){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(Math.PI/4);
    ctx.scale(0.78,0.78);
    ctx.beginPath();
    roundRectPath(ctx,-hw/2,-hw/2,hw,hw,rad);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }else{
    ctx.beginPath();
    roundRectPath(ctx,px+inset,py+inset,hw,hw,rad);
    ctx.fill();
    ctx.stroke();
  }
  if(p.slot===mySlot){
    ctx.save();
    ctx.strokeStyle='#fff';
    ctx.lineWidth=Math.max(2,cellSize*0.12);
    ctx.setLineDash([cellSize*0.22,cellSize*0.14]);
    if(htype==='circle'){
      ctx.beginPath();
      ctx.arc(cx,cy,hw*0.52,0,Math.PI*2);
      ctx.stroke();
    }else if(htype==='diamond'){
      ctx.translate(cx,cy);
      ctx.rotate(Math.PI/4);
      ctx.scale(0.78,0.78);
      ctx.beginPath();
      roundRectPath(ctx,-hw*0.65,-hw*0.65,hw*1.3,hw*1.3,rad+cellSize*0.12);
      ctx.stroke();
    }else{
      ctx.beginPath();
      roundRectPath(ctx,px-cellSize*0.08,py-cellSize*0.08,cellSize+cellSize*0.16,cellSize+cellSize*0.16,rad+cellSize*0.12);
      ctx.stroke();
    }
    ctx.restore();
    ctx.setLineDash([]);
  }
}

function drawArena(){
  const cv=$('arena'),ctx=cv.getContext('2d'); if(!ctx||!state)return;
  const sk=skin();
  const W=state.W,H=state.H;
  const display=arenaDisplayCss||Math.min(cv.getBoundingClientRect().width,520);
  const dpr=cv.width/display;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const cellSize=display/W;

  const slab=ensureStaticBackground(display,W,H,sk);
  ctx.drawImage(slab,0,0,display,display);

  if(state.gridStr){
    const bm=getTerritoryBitmap(W,H,state.gridStr);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(bm,0,0,W,H,0,0,display,display);
  }

  const glow=lowFx()?0:Math.min(15,cellSize*(sk.trailGlow!=null?sk.trailGlow:1));
  (state.players||[]).forEach(p=>{
    if(!p.alive)return;
    const tw=cellSize*0.62, pad=(cellSize-tw)/2;
    ctx.save();
    if(glow>0.5){
      ctx.shadowColor=slotColor(p.slot);
      ctx.shadowBlur=glow;
    }
    ctx.fillStyle=trailRgba(slotColor(p.slot),0.74);
    (p.trail||[]).forEach(t=>{
      ctx.beginPath();
      roundRectPath(ctx,t.x*cellSize+pad,t.y*cellSize+pad,tw,tw,cellSize*0.18);
      ctx.fill();
    });
    ctx.restore();

    const px=p.x*cellSize, py=p.y*cellSize;
    drawPlayerHead(ctx,p,cellSize,px,py,sk);
  });
}

function sendDir(dir){
  if(!state || state.phase!=='PLAYING') return;
  send({type:'paint_input', dir});
  if(navigator.vibrate) navigator.vibrate(15);
}

window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='z'||k==='w') sendDir('up');
  if(k==='arrowdown'||k==='s') sendDir('down');
  if(k==='arrowleft'||k==='q'||k==='a') sendDir('left');
  if(k==='arrowright'||k==='d') sendDir('right');
});

document.querySelectorAll('[data-dir]').forEach(btn=>{
  btn.addEventListener('touchstart', e => { e.preventDefault(); sendDir(btn.getAttribute('data-dir')); }, {passive:false});
  btn.addEventListener('mousedown', () => sendDir(btn.getAttribute('data-dir')));
});

const p=new URLSearchParams(location.search);
if(p.get('name'))$('name').value=p.get('name');
if(window.ZapPlay && !$('name').value){
  const saved=window.ZapPlay.getSavedPseudo&&window.ZapPlay.getSavedPseudo();
  if(saved) $('name').value=saved;
}
if(p.get('code')){ $('code').value=p.get('code').toUpperCase(); $('join-area').style.display='flex'; }
if(p.get('create')==='1'&&p.get('name')){
  const n=p.get('name'); $('name').value=n; myName=n;
  const action=()=>send({type:'create_paint',name:n});
  if(ws&&ws.readyState===1) action();
  else { pendingAction=action; if(!ws||ws.readyState===3) connect(); }
}
$('name').addEventListener('keydown',e=>{if(e.key==='Enter')createGame();});
$('code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});
$('code').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});
</script>
