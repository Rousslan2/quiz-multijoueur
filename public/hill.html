<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="theme.css">
<title>ZapPlay — Hill Climb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#00F5D4;--pink:#FF3864;--blue:#3B82F6;--gold:#FFE234;
  --ok:#22c55e;--bad:#ef4444;
  --text:#E8E8F0;--muted:#5A5A78;--card:#0E0E22;--border:rgba(0,245,212,.12)
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Exo 2',sans-serif;color:var(--text);height:100dvh;overflow:hidden}
#back{position:fixed;top:8px;left:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:var(--muted);padding:6px 12px;border-radius:10px;cursor:pointer;font-size:.75rem;z-index:50}
#dot{position:fixed;top:10px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--bad);z-index:50}#dot.ok{background:var(--ok)}
#app{max-width:1100px;margin:0 auto;height:100dvh;padding:56px 12px 14px;display:flex;flex-direction:column;gap:10px}
h1{text-align:center;font-size:1.9rem;background:linear-gradient(135deg,var(--primary),var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Orbitron',monospace;letter-spacing:.02em}
.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:16px;padding:12px;backdrop-filter:blur(10px)}
.hidden{display:none!important}
.row{display:flex;gap:10px}
@media(max-width:860px){.row{flex-direction:column}}
.btn{border:none;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:.08em;font-size:.78rem}
.btn-primary{background:var(--primary);color:#061019;box-shadow:0 10px 30px rgba(0,245,212,.16)}
.btn-ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--text)}
input,select{width:100%;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);padding:12px 12px;outline:none}
input::placeholder{color:rgba(90,90,120,.9)}
.pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.18);font-size:.78rem;color:rgba(232,232,240,.88)}

/* canvas */
#view{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
#hud{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between}
#hud-left,#hud-right{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
#canvas-wrap{flex:1;min-height:0;display:flex;justify-content:center;align-items:center}
#cv{width:min(96vw,1060px);height:min(62vh,560px);background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.16);border-radius:16px}

/* mobile controls */
#mobile{display:none;position:fixed;left:0;right:0;bottom:0;height:30vh;pointer-events:none;z-index:70}
.mc{pointer-events:auto;position:absolute;bottom:18px;width:44%;max-width:220px;height:88px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.24);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;letter-spacing:.08em}
.mc.left{left:14px}
.mc.right{right:14px}
.mc:active{transform:scale(.98)}
@media(max-width:860px){#mobile{display:block}}

/* scoreboard */
#score{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
@media(max-width:860px){#score{grid-template-columns:repeat(2,minmax(0,1fr))}}
.srow{padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.16)}
.srow.me{border-color:rgba(0,245,212,.28);box-shadow:0 0 0 1px rgba(0,245,212,.10)}
.sname{font-weight:900}
.smeta{margin-top:6px;color:rgba(232,232,240,.72);font-size:.82rem;display:flex;justify-content:space-between;gap:10px}
.bar{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;width:40%;background:linear-gradient(90deg,var(--primary),var(--blue));border-radius:999px}
</style>
</head>
<body>
<div class="zp-space-bg"><div class="zp-neb1"></div><div class="zp-neb2"></div><div class="zp-stars" id="zp-stars"></div><div class="zp-sgrid"></div><div class="zp-comet"></div></div>
<button id="back" onclick="location.href='index.html'">← Accueil</button>
<div id="dot"></div>

<div id="app">
  <h1>🏔️ Hill Climb</h1>

  <div id="name-screen" class="card" style="max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:10px">
    <div class="row">
      <div style="flex:1">
        <input id="name" maxlength="20" placeholder="Ton pseudo" autocomplete="off">
      </div>
      <div style="width:190px">
        <select id="veh">
          <option value="car">Voiture</option>
          <option value="buggy">Buggy</option>
          <option value="truck">Camion</option>
        </select>
      </div>
    </div>
    <div class="row">
      <button class="btn btn-primary" style="flex:1" onclick="createGame()">Créer une salle</button>
      <button class="btn btn-ghost" style="flex:1" onclick="toggleJoin()">Rejoindre (code)</button>
    </div>
    <div id="join-area" class="hidden" style="display:flex;flex-direction:column;gap:8px">
      <input id="code" maxlength="4" placeholder="Code (ABCD)" style="text-transform:uppercase;letter-spacing:.14em;text-align:center;font-weight:900">
      <button class="btn btn-primary" onclick="joinGame()">Rejoindre</button>
    </div>
    <div id="err" style="color:#fca5a5;font-size:.86rem;min-height:18px;text-align:center"></div>
  </div>

  <div id="game-screen" class="hidden" style="display:flex;flex-direction:column;gap:10px;flex:1;min-height:0">
    <div id="waiting" class="card hidden" style="text-align:center">
      <div onclick="copyCode()" style="cursor:pointer">
        <div style="font-size:.72rem;color:var(--muted)">Code</div>
        <div id="room-code" style="font-size:2.1rem;font-family:monospace;letter-spacing:.2em;color:var(--primary);font-weight:900">----</div>
      </div>
      <div id="players" style="margin-top:10px;color:rgba(232,232,240,.78)"></div>
      <div id="wait-hint" style="margin-top:8px;color:var(--muted);min-height:18px"></div>
      <div class="row" style="margin-top:10px">
        <button id="start-btn" class="btn btn-primary hidden" style="flex:1" onclick="startGame()">Lancer</button>
        <button class="btn btn-ghost" style="flex:1" onclick="location.href='lobby.html'">Voir les salles</button>
      </div>
    </div>

    <div id="view" class="hidden">
      <div class="card" id="hud">
        <div id="hud-left">
          <span class="pill">⛽ <b id="fuel">--</b>%</span>
          <span class="pill">📏 <b id="dist">0</b> m</span>
          <span class="pill">⚡ Nitro <b id="nitro">0</b></span>
        </div>
        <div id="hud-right">
          <span class="pill">🎮 <span id="ctrl-hint">A/D ou ←/→</span></span>
          <span class="pill">🏆 <b id="rank">--</b>/<b id="pcount">--</b></span>
        </div>
      </div>

      <div class="card" id="canvas-wrap">
        <canvas id="cv" width="1100" height="600"></canvas>
      </div>

      <div class="card">
        <div style="font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Classement</div>
        <div id="score"></div>
      </div>
    </div>

    <div id="over" class="card hidden" style="text-align:center">
      <div id="over-title" style="font-size:1.25rem;font-weight:900;margin-bottom:10px"></div>
      <div style="color:var(--muted);margin-bottom:14px">Tu es en spectateur si tu as crash. Tu peux rejouer quand l’hôte relance.</div>
      <div class="row">
        <button id="restart-btn" class="btn btn-primary hidden" style="flex:1" onclick="restartGame()">Rejouer</button>
        <button class="btn btn-ghost" style="flex:1" onclick="location.href='index.html'">Accueil</button>
      </div>
    </div>
  </div>
</div>

<div id="mobile">
  <div class="mc left" id="m-left">FREIN</div>
  <div class="mc right" id="m-right">GAZ</div>
</div>

<script src="shared.js"></script>
<script src="chat.js"></script>
<script>
const WS_URL = (location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws/hill';
let ws=null, mySlot=-1, myCode='', myName='', pendingAction=null;
let state=null, lastServerNow=0, serverSkew=0;
let keys={left:false,right:false}, nitroDown=false;
let inputSeq=0;

const $=id=>document.getElementById(id);
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function bindLoungeSender(){ if(window.ZapPlay)ZapPlay.setLoungeSender(text=>send({type:'lounge_chat',text})); else setTimeout(bindLoungeSender,120); }
bindLoungeSender();

function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ $('dot').classList.add('ok'); if(window.ZapPlay)ZapPlay.hideLoader(); if(pendingAction){pendingAction();pendingAction=null;} };
  ws.onclose=()=>{ $('dot').classList.remove('ok'); setTimeout(connect,2000); };
  ws.onmessage=e=>{ let m; try{m=JSON.parse(e.data)}catch{return;} handle(m); };
}
connect();

function toggleJoin(){ $('join-area').classList.toggle('hidden'); }
function createGame(){
  const n=$('name').value.trim(); if(!n){$('err').textContent='Entre ton pseudo';return;}
  myName=n; if(window.ZapPlay)ZapPlay.savePseudo(n);
  const veh=$('veh').value;
  const act=()=>send({type:'create_hill',name:n,veh});
  if(ws&&ws.readyState===1) act(); else pendingAction=act;
}
function joinGame(){
  let n=$('name').value.trim(); if(!n && window.ZapPlay && ZapPlay.getSavedPseudo) n=ZapPlay.getSavedPseudo().trim();
  $('name').value=n;
  const c=$('code').value.trim().toUpperCase();
  if(!n||!c){$('err').textContent='Pseudo + code requis';return;}
  myName=n; if(window.ZapPlay)ZapPlay.savePseudo(n);
  const veh=$('veh').value;
  const act=()=>send({type:'join_hill',name:n,code:c,veh});
  if(ws&&ws.readyState===1) act(); else pendingAction=act;
}
function startGame(){ send({type:'start_hill'}); }
function restartGame(){ send({type:'restart_hill'}); }
function copyCode(){ if(!myCode)return; navigator.clipboard.writeText(myCode).catch(()=>{}); }

function showScreens(){
  $('name-screen').classList.add('hidden');
  $('game-screen').classList.remove('hidden');
}
function setPhase(phase){
  $('waiting').classList.toggle('hidden', phase!=='WAITING');
  $('view').classList.toggle('hidden', !['COUNTDOWN','RACE','GAME_OVER'].includes(phase));
  $('over').classList.toggle('hidden', phase!=='GAME_OVER');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

function handle(m){
  if(m.type==='error'){ $('err').textContent=m.msg; return; }
  if(m.type==='lounge_chat' && window.ZapPlay){ ZapPlay.addLoungeMessage(m); return; }
  if(m.type==='created_hill'){ mySlot=m.slot; myCode=m.code; showScreens(); }
  if(m.type==='welcome_hill'){ mySlot=m.slot; myCode=m.code; showScreens(); }
  if(m.type!=='hill_state') return;
  state=m;
  lastServerNow = m.serverNow||Date.now();
  serverSkew = lastServerNow - Date.now();

  $('pcount').textContent = (m.players||[]).length;
  if(m.phase==='WAITING'){
    $('room-code').textContent = m.code||'----';
    $('players').innerHTML = (m.players||[]).map(p=>`<span class=\"pill\">${esc(p.name)}</span>`).join(' ');
    const need=2, has=(m.players||[]).length, miss=need-has;
    $('wait-hint').textContent = miss>0 ? `Il manque ${miss} joueur${miss>1?'s':''} (min 2).` : `Prêt ! Choisissez vos véhicules.`;
    const isHost=mySlot===0;
    $('start-btn').classList.toggle('hidden', !(isHost && has>=2));
    myCode = m.code || myCode;
    if(window.ZapPlay)ZapPlay.showLounge({players:m.players,mySlot,roomCode:m.code,gameName:'Hill Climb'});
    setPhase('WAITING');
    return;
  }
  if(window.ZapPlay)ZapPlay.hideLounge();
  setPhase(m.phase);

  // HUD
  const me = (m.players||[]).find(p=>p.slot===mySlot);
  if(me){
    $('fuel').textContent = Math.max(0,Math.round((me.fuel||0)*100));
    $('dist').textContent = Math.max(0,Math.round(me.x||0));
    $('nitro').textContent = me.nitro||0;
  }
  // rank
  const sorted=(m.players||[]).slice().sort((a,b)=>(b.x||0)-(a.x||0));
  const idx = sorted.findIndex(p=>p.slot===mySlot);
  $('rank').textContent = idx>=0 ? (idx+1) : '--';

  // scoreboard
  const sc = $('score');
  sc.innerHTML='';
  sorted.forEach(p=>{
    const d=document.createElement('div');
    d.className='srow'+(p.slot===mySlot?' me':'');
    const crash = p.alive===false ? '💥' : '';
    d.innerHTML = `<div class=\"sname\">${esc(p.name)} ${crash}</div>`+
      `<div class=\"smeta\"><span>${Math.round(p.x||0)} m</span><span>⛽ ${Math.round((p.fuel||0)*100)}%</span></div>`+
      `<div class=\"bar\"><i style=\"width:${Math.max(2,Math.min(100,(p.fuel||0)*100))}%\"></i></div>`;
    sc.appendChild(d);
  });

  if(m.phase==='GAME_OVER'){
    const win = (m.players||[]).slice().sort((a,b)=>(b.x||0)-(a.x||0))[0];
    $('over-title').textContent = win ? `🏁 Gagnant : ${win.name} (${Math.round(win.x||0)} m)` : '🏁 Fin';
    $('restart-btn').classList.toggle('hidden', !(mySlot===0));
  }
}

// ── Controls ─────────────────────────────────────────────
function sendInput(){
  if(!state || state.phase!=='RACE') return;
  inputSeq++;
  const tilt = (keys.right?1:0) - (keys.left?1:0);
  const t = keys.right ? 1 : 0;
  const b = keys.left ? 0.35 : 0;
  send({type:'hill_input',seq:inputSeq,t,b,tilt,nitro:!!nitroDown});
}
setInterval(sendInput, 50);

addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft' || e.key==='a' || e.key==='q'){ keys.left=true; }
  if(e.key==='ArrowRight'|| e.key==='d'){ keys.right=true; }
  if(e.key==='Shift' || e.key===' '){ nitroDown=true; }
});
addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft' || e.key==='a' || e.key==='q'){ keys.left=false; }
  if(e.key==='ArrowRight'|| e.key==='d'){ keys.right=false; }
  if(e.key==='Shift' || e.key===' '){ nitroDown=false; }
});

// Mobile buttons
function bindBtn(el, key, downVal){
  const b=$(el);
  const down=()=>{ if(key==='nitro') nitroDown=true; else keys[key]=true; };
  const up=()=>{ if(key==='nitro') nitroDown=false; else keys[key]=false; };
  b.addEventListener('touchstart',e=>{e.preventDefault();down();},{passive:false});
  b.addEventListener('touchend',up,{passive:true});
  b.addEventListener('touchcancel',up,{passive:true});
}
bindBtn('m-left','left');
bindBtn('m-right','right');

// ── Render (simple) ──────────────────────────────────────
const cv=$('cv'), ctx=cv.getContext('2d');
let camX=0, lastFrame=performance.now();
function lerp(a,b,t){return a+(b-a)*t;}

function draw(){
  requestAnimationFrame(draw);
  const now=performance.now();
  const dt=Math.min(0.05,(now-lastFrame)/1000); lastFrame=now;

  const w=cv.width, h=cv.height;
  ctx.clearRect(0,0,w,h);

  // background
  ctx.fillStyle='rgba(3,3,10,0.65)';
  ctx.fillRect(0,0,w,h);

  if(!state || !state.terrain){ return; }

  // camera follows me
  const me = (state.players||[]).find(p=>p.slot===mySlot) || (state.players||[])[0];
  const targetCam = me ? (me.x||0) : 0;
  camX = lerp(camX, targetCam, 0.08);

  const scale=1.0;
  const baseY = h*0.68;

  // draw terrain polyline
  ctx.save();
  ctx.translate(w*0.25 - camX*scale, baseY);
  ctx.lineWidth=3;
  ctx.strokeStyle='rgba(0,245,212,.35)';
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();
  const seg=state.terrain;
  for(let i=0;i<seg.length;i++){
    const x=seg[i].x*scale, y=-seg[i].y*scale;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  // close to bottom
  ctx.lineTo(seg[seg.length-1].x*scale, 220);
  ctx.lineTo(seg[0].x*scale, 220);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  for(let i=0;i<seg.length;i++){
    const x=seg[i].x*scale, y=-seg[i].y*scale;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // powerups
  if(Array.isArray(state.powerups)){
    state.powerups.forEach(p=>{
      const taken = (p.takenBySlot!=null) || (p.takenBy!=null);
      if(taken) return;
      const x=p.x*scale, y=-p.y*scale;
      const kind = p.kind || p.type;
      ctx.fillStyle=kind==='nitro'?'rgba(255,226,52,.95)':'rgba(0,245,212,.95)';
      ctx.beginPath(); ctx.arc(x,y-14,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.5)';
      ctx.font='800 12px Orbitron, monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(kind==='nitro'?'N':'F', x, y-14);
    });
  }

  // vehicles
  (state.players||[]).forEach(p=>{
    const x=p.x*scale, y=-p.y*scale;
    const ang=p.a||0;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(ang);
    const alive = p.alive!==false;
    ctx.globalAlpha = alive?1:0.35;
    // body
    ctx.fillStyle = p.slot===mySlot ? 'rgba(0,245,212,.95)' : 'rgba(232,232,240,.92)';
    ctx.strokeStyle='rgba(0,0,0,.35)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.roundRect(-22,-12,44,20,8);
    ctx.fill(); ctx.stroke();
    // wheels
    ctx.fillStyle='rgba(0,0,0,.8)';
    ctx.beginPath(); ctx.arc(-14,10,8,0,Math.PI*2); ctx.arc(14,10,8,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // name
    ctx.save();
    ctx.translate(x,y-34);
    ctx.fillStyle='rgba(232,232,240,.82)';
    ctx.font='700 12px Exo 2, sans-serif';
    ctx.textAlign='center';
    ctx.fillText(p.name||'',0,0);
    ctx.restore();
  });

  ctx.restore();
}
draw();

// URL params auto
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('name')) $('name').value=p.get('name');
  if(p.get('code')){ $('code').value=p.get('code').toUpperCase(); $('join-area').classList.remove('hidden'); }
  if(p.get('create')==='1' && p.get('name')){ $('name').value=p.get('name'); setTimeout(createGame, 350); }
  if(p.get('code') && p.get('name') && p.get('create')!=='1'){ $('name').value=p.get('name'); setTimeout(joinGame, 450); }
})();

// stars
(function(){var sc=document.getElementById('zp-stars');if(!sc)return;for(var i=0;i<50;i++){var s=document.createElement('div');s.className='zp-star';s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(.4+Math.random()*1.4)+'px;height:'+(.4+Math.random()*1.4)+'px;opacity:'+(.2+Math.random()*.8);sc.appendChild(s)}})();
</script>
</body>
</html>
