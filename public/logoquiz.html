<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="theme.css">
<title>ZapPlay — Logo Quiz</title>
<style>
:root{--primary:#3b82f6;--card:#0E0E22;--border:rgba(59,130,246,.25);--text:#E8E8F0;--muted:#5A5A78;--buzz:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden}
#app{max-width:520px;margin:0 auto;padding:56px 14px 16px;min-height:100dvh;display:flex;flex-direction:column;gap:12px}
#dot{position:fixed;top:10px;right:12px;width:8px;height:8px;border-radius:50%;background:#ef4444;z-index:50}
#dot.ok{background:#22c55e}
#back{position:fixed;top:8px;left:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.75rem;z-index:50}
.hidden{display:none!important}
h1{text-align:center;font-size:1.5rem;color:var(--primary)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem}
.btn-primary{background:linear-gradient(135deg,var(--primary),#2563eb);color:#fff}
.btn-secondary{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text)}
.btn-buzz{background:linear-gradient(135deg,var(--buzz),#ea580c);color:#fff}
input[type=text]{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text)}
#hint-box{font-size:1.15rem;text-align:center;padding:20px;background:rgba(59,130,246,.1);border-radius:12px;border:1px solid var(--border);min-height:80px;display:flex;align-items:center;justify-content:center}
#gcount{position:fixed;inset:0;background:rgba(15,12,41,.88);display:none;align-items:center;justify-content:center;z-index:500}
#gcount span{font-size:5rem;font-weight:800;color:var(--buzz)}
#err{color:#f87171;font-size:.85rem;text-align:center;min-height:18px}
</style>
</head>
<body>
<div class="zp-space-bg"><div class="zp-neb1"></div><div class="zp-neb2"></div><div class="zp-stars" id="zp-stars"></div><div class="zp-sgrid"></div><div class="zp-comet"></div></div>
<div id="gcount"><span id="gnum">3</span></div>
<div id="dot"></div>
<button id="back" onclick="location.href='index.html'">← Accueil</button>
<div id="app">
  <div id="name-screen">
    <h1>🏷️ Logo Quiz</h1>
    <p style="text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:8px">Indice sur la marque — buzzez et donnez le nom exact.</p>
    <div class="card">
      <input id="name" maxlength="20" placeholder="Ton pseudo" autocomplete="off">
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary" style="flex:1" onclick="createGame()">Créer</button>
        <button class="btn btn-secondary" style="flex:1" onclick="toggleJoin()">Rejoindre</button>
      </div>
      <div id="join-area" style="display:none;flex-direction:column;gap:8px;margin-top:8px">
        <input id="code" maxlength="4" placeholder="Code" style="text-transform:uppercase;letter-spacing:.2em;text-align:center;font-weight:700">
        <button class="btn btn-primary" onclick="joinGame()">Rejoindre</button>
      </div>
      <div id="err"></div>
    </div>
  </div>
  <div id="game-screen" class="hidden" style="display:flex;flex-direction:column;gap:10px;flex:1;min-height:0">
    <div id="wait" class="card hidden">
      <div onclick="copyCode()" style="cursor:pointer;text-align:center">
        <div style="font-size:.7rem;color:var(--muted)">Code</div>
        <div id="room-code" style="font-size:2rem;font-family:monospace;letter-spacing:.2em;color:var(--primary);font-weight:800">----</div>
      </div>
      <div id="pl-wait" style="margin-top:10px;text-align:center;font-size:.9rem;color:var(--muted)"></div>
      <button id="start-btn" class="btn btn-primary" style="margin-top:12px;display:none" onclick="send({type:'start_logoquiz'})">Lancer</button>
    </div>
    <div id="play" class="hidden" style="display:flex;flex-direction:column;gap:10px">
      <div class="card">
        <div style="text-align:center;color:var(--muted);font-size:.75rem;margin-bottom:6px"><span id="q-num"></span></div>
        <div id="hint-box"><span id="hint-txt"></span></div>
        <div id="reveal-brand" style="display:none;text-align:center;margin-top:12px;font-size:1.2rem;font-weight:800;color:var(--primary)"></div>
      </div>
      <button id="btn-buzz" class="btn btn-buzz" onclick="send({type:'logoquiz_buzz'})">Buzzer</button>
      <div id="answer-zone" class="hidden">
        <input id="ans-inp" type="text" placeholder="Nom de la marque" autocomplete="off">
        <button class="btn btn-primary" style="margin-top:8px" onclick="submitAns()">Valider</button>
      </div>
      <div id="scores" class="card" style="font-size:.9rem"></div>
    </div>
    <div id="over" class="card hidden" style="text-align:center">
      <div style="font-size:1.2rem;font-weight:800;margin-bottom:10px">Partie terminée</div>
      <div id="over-scores"></div>
      <button class="btn btn-primary" style="margin-top:12px;display:none" id="btn-restart" onclick="send({type:'restart_logoquiz'})">Rejouer</button>
      <button class="btn btn-secondary" style="margin-top:8px" onclick="location.href='index.html'">Accueil</button>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script src="chat.js"></script>
<script>
const WS=(location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws/logoquiz';
let ws=null,mySlot=-1,myCode='',myName='',hostName='',pending=null;
function $(id){return document.getElementById(id)}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function connect(){
  ws=new WebSocket(WS);
  ws.onopen=()=>{$('dot').classList.add('ok');if(window.ZapPlay)ZapPlay.hideLoader();if(pending){pending();pending=null}};
  ws.onclose=()=>{$('dot').classList.remove('ok');setTimeout(connect,2000)};
  ws.onmessage=e=>{let m;try{m=JSON.parse(e.data)}catch{return}handle(m)};
}
connect();
function bindL(){if(window.ZapPlay)ZapPlay.setLoungeSender(t=>send({type:'lounge_chat',text:t}));else setTimeout(bindL,120)}
bindL();
function toggleJoin(){$('join-area').style.display=$('join-area').style.display==='flex'?'none':'flex';$('join-area').style.flexDirection='column'}
function createGame(){
  const n=$('name').value.trim();if(!n){$('err').textContent='Pseudo requis';return}
  $('err').textContent='';if(window.ZapPlay)ZapPlay.savePseudo(n);myName=n;
  const go=()=>send({type:'create_logoquiz',name:n});
  if(ws&&ws.readyState===1)go();else pending=go;
}
function joinGame(){
  let n=$('name').value.trim();if(!n&&window.ZapPlay&&ZapPlay.getSavedPseudo)n=ZapPlay.getSavedPseudo().trim();
  $('name').value=n;
  const c=$('code').value.trim().toUpperCase();
  if(!n||!c){$('err').textContent='Pseudo + code';return}
  $('err').textContent='';if(window.ZapPlay)ZapPlay.savePseudo(n);myName=n;
  const go=()=>send({type:'join_logoquiz',name:n,code:c});
  if(ws&&ws.readyState===1)go();else pending=go;
}
function copyCode(){if(myCode)navigator.clipboard.writeText(myCode).catch(()=>{})}
function showCountdown(sec){
  const g=$('gcount'),num=$('gnum');g.style.display='flex';let c=sec;num.textContent=c;
  const t=setInterval(()=>{c--;if(c<=0){clearInterval(t);g.style.display='none'}else num.textContent=c},1000);
}
function submitAns(){const v=$('ans-inp').value.trim();if(!v)return;send({type:'logoquiz_answer',text:v})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function handle(m){
  if(m.type==='error'){$('err').textContent=m.msg;return}
  if(m.type==='lounge_chat'&&window.ZapPlay){ZapPlay.addLoungeMessage(m);return}
  if(m.type==='countdown'){showCountdown(m.seconds||3);return}
  if(m.type==='created_logoquiz'){mySlot=m.slot;myCode=m.code;myName=m.name;showGame()}
  if(m.type==='welcome_logoquiz'){mySlot=m.slot;myCode=m.code;myName=m.name;showGame()}
  if(m.type!=='logoquiz_state')return;
  const s=m;hostName=s.host||'';
  if(mySlot<0&&myName){const me=s.players.find(p=>p.name===myName);if(me)mySlot=me.slot}
  const me=s.players.find(p=>p.slot===mySlot);
  const isHost=me&&me.name===hostName;
  $('name-screen').classList.add('hidden');
  $('game-screen').classList.remove('hidden');
  if(s.phase==='WAITING'){
    $('wait').classList.remove('hidden');$('play').classList.add('hidden');$('over').classList.add('hidden');
    $('room-code').textContent=s.code||'----';
    $('pl-wait').textContent=s.players.map(p=>p.name).join(' · ');
    $('start-btn').style.display=isHost&&s.players.length>=2?'block':'none';
    if(window.ZapPlay)ZapPlay.showLounge({players:s.players,mySlot,roomCode:s.code,gameName:'Logo Quiz'});
    return
  }
  if(window.ZapPlay)ZapPlay.hideLounge();
  $('wait').classList.add('hidden');$('over').classList.add('hidden');$('play').classList.remove('hidden');
  if(s.phase==='GAME_OVER'){
    $('play').classList.add('hidden');$('over').classList.remove('hidden');
    let h='<table style="width:100%">';
    s.players.slice().sort((a,b)=>(b.score||0)-(a.score||0)).forEach((p,i)=>{
      h+='<tr><td>'+(i+1)+'.</td><td>'+esc(p.name)+'</td><td style="text-align:right">'+(p.score||0)+'</td></tr>'
    });
    h+='</table>';
    $('over-scores').innerHTML=h;
    $('btn-restart').style.display=isHost?'block':'none';
    return
  }
  $('q-num').textContent='Question '+(s.qIndex+1)+' / '+s.total;
  const hint=s.current&&s.current.hint?s.current.hint:'';
  $('hint-txt').textContent=hint;
  const rb=$('reveal-brand');
  if(s.phase==='REVEAL'&&s.current&&s.current.brand){
    rb.style.display='block';rb.textContent='Réponse : '+s.current.brand
  }else{rb.style.display='none';rb.textContent=''}
  const buzz=s.buzzSlot;
  $('btn-buzz').style.display=s.phase==='QUESTION'&&buzz===null?'block':'none';
  $('btn-buzz').disabled=false;
  const az=$('answer-zone');
  if(s.phase==='QUESTION'&&buzz===mySlot){az.classList.remove('hidden');$('ans-inp').focus()}else{az.classList.add('hidden')}
  let sc='<div style="font-weight:700;margin-bottom:6px">Scores</div>';
  s.players.forEach(p=>{sc+='<div style="display:flex;justify-content:space-between"><span>'+esc(p.name)+(p.slot===buzz?' 🔔':'')+'</span><span>'+(p.score||0)+'</span></div>'});
  $('scores').innerHTML=sc;
}
function showGame(){
  $('name-screen').classList.add('hidden');
  $('game-screen').classList.remove('hidden');
}
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('name'))$('name').value=p.get('name');
  if(p.get('code')){$('code').value=p.get('code').toUpperCase();toggleJoin()}
  if(p.get('create')==='1'&&p.get('name')){$('name').value=p.get('name');setTimeout(createGame,400)}
  if(p.get('code')&&p.get('name')&&p.get('create')!=='1'){$('name').value=p.get('name');setTimeout(joinGame,500)}
})();
$('code')&&$('code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)});
</script>
<script>(function(){var sc=document.getElementById('zp-stars');if(!sc)return;for(var i=0;i<45;i++){var s=document.createElement('div');s.className='zp-star';s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%';sc.appendChild(s)}})();</script>
</body>
</html>
