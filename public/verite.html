<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérité ou Défi</title>
<style>
  :root {
    --primary: #a78bfa;
    --buzz: #f97316;
    --correct: #22c55e;
    --wrong: #ef4444;
    --gold: #fbbf24;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --card: rgba(255,255,255,.07);
    --border: rgba(255,255,255,.13);
    --verite-bg: rgba(139,92,246,.25);
    --verite-border: #a78bfa;
    --defi-bg: rgba(249,115,22,.22);
    --defi-border: #f97316;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: var(--text);
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #app {
    width: 100%;
    max-width: 500px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 60px 16px 16px;
    gap: 14px;
    overflow-y: auto;
  }

  /* Fixed nav */
  #back-btn {
    position: fixed;
    top: 12px; left: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    z-index: 200;
  }
  #back-btn:hover { background: rgba(255,255,255,.13); }
  #dot {
    position: fixed;
    top: 18px; right: 16px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--wrong);
    transition: background .3s;
    z-index: 200;
  }
  #dot.ok { background: var(--correct); }

  /* Score bar */
  #score-bar, .score-bar-multi {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 6px;
  }
  .player-score { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 60px; }
  .player-score .name { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 75px; }
  .player-score .pts  { font-size: 1.1rem; font-weight: 800; }
  .player-score.active-turn .name { color: var(--primary); }
  .player-score.active-turn .pts { color: var(--primary); }
  .player-score.me .pts { color: var(--primary); }
  .sep { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

  /* Turn progress */
  #turn-progress {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    flex-shrink: 0;
  }
  #turn-progress strong { color: var(--text); }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }

  /* Big choice card */
  #game-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    border-width: 2px;
    border-style: solid;
    padding: 28px 24px;
    text-align: center;
    gap: 16px;
    transition: background .4s, border-color .4s;
    min-height: 200px;
  }
  #game-card.type-verite {
    background: var(--verite-bg);
    border-color: var(--verite-border);
  }
  #game-card.type-defi {
    background: var(--defi-bg);
    border-color: var(--defi-border);
  }
  #game-card.type-none {
    background: var(--card);
    border-color: var(--border);
  }

  #card-badge {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .badge-verite { background: rgba(139,92,246,.4); color: #c4b5fd; border: 1px solid var(--verite-border); }
  .badge-defi   { background: rgba(249,115,22,.35); color: #fdba74; border: 1px solid var(--defi-border); }

  #card-text {
    font-size: 1.3rem;
    font-weight: 600;
    line-height: 1.5;
  }
  #card-cat {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 20px;
    min-height: 56px;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-orange  { background: var(--buzz); color: #fff; }
  .btn-success { background: var(--correct); color: #fff; }
  .btn-muted   { background: rgba(255,255,255,.12); color: var(--text); }
  .btn-gray    { background: rgba(148,163,184,.2); color: var(--muted); border: 1px solid var(--border); }
  .btn-full    { width: 100%; }

  /* Choice buttons row */
  #choice-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  #choice-btns .row {
    display: flex;
    gap: 10px;
  }
  #choice-btns .row .btn { flex: 1; }

  /* Done/pass buttons */
  #done-btns {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  #done-btns .btn { flex: 1; }

  /* Waiting animation */
  #waiting-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }
  #waiting-card .wait-name { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
  #waiting-card .wait-sub  { font-size: 1rem; color: var(--muted); }
  .dots-anim::after {
    content: '';
    animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* Phase overlays */
  #phase-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex: 1;
    text-align: center;
  }
  #phase-overlay h1 { font-size: 1.8rem; font-weight: 800; }
  #phase-overlay p  { font-size: 1rem; color: var(--muted); }
  .qr-box { background: #fff; border-radius: 12px; padding: 12px; display: inline-block; }
  #url-display { font-size: 13px; color: var(--muted); word-break: break-all; text-align: center; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<button id="back-btn" onclick="location.href='index.html'">← Accueil</button>
<div id="dot"></div>

<div id="app">

  <!-- Name entry -->
  <div id="screen-name">
    <div id="phase-overlay">
      <h1>🎭 Vérité ou Défi</h1>
      <p>Entre ton prénom pour rejoindre</p>
      <input id="name-input" type="text" placeholder="Ton prénom" maxlength="20"
        style="width:100%;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:14px;outline:none;text-align:center;">
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="createGame()">Créer une salle</button>
        <button class="btn btn-secondary" style="flex:1" onclick="showJoinV()">Rejoindre (code)</button>
      </div>
      <div id="join-code-area" style="display:none;flex-direction:column;gap:8px;margin-top:4px">
        <input id="code-input" type="text" maxlength="4" placeholder="Code (ABCD)"
          style="width:100%;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1.1rem;font-weight:700;padding:12px;outline:none;text-align:center;text-transform:uppercase;letter-spacing:.12em;" autocomplete="off">
        <button class="btn btn-primary btn-full" onclick="joinGame()">Rejoindre</button>
      </div>
    </div>
  </div>

  <!-- Waiting for player 2 -->
  <div id="screen-waiting" class="hidden">
    <div id="phase-overlay">
      <h1>En attente…</h1>
      <div id="verite-code-box" onclick="copyCodeV()" title="Cliquer pour copier"
        style="text-align:center;background:rgba(167,139,250,.1);border:2px solid rgba(167,139,250,.35);
               border-radius:12px;padding:10px 18px;cursor:pointer;margin-bottom:10px">
        <div style="font-size:.65rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Code de la salle</div>
        <div id="verite-code-display" style="font-size:2.2rem;font-weight:800;letter-spacing:.2em;color:#a78bfa;font-family:monospace;line-height:1">----</div>
        <div id="verite-copy-hint" style="font-size:.65rem;color:#94a3b8;margin-top:3px">Cliquer pour copier</div>
      </div>
      <p>Partage ce lien à ton adversaire</p>
      <div class="qr-box"><canvas id="qr-canvas"></canvas></div>
      <div id="url-display"></div>
    </div>
  </div>

  <!-- Ready -->
  <div id="screen-ready" class="hidden">
    <div id="phase-overlay">
      <h1>Prêts !</h1>
      <p id="ready-players"></p>
      <button id="start-btn" class="btn btn-primary btn-full hidden" onclick="startGame()">Lancer la partie</button>
      <p id="ready-wait" class="hidden" style="color:var(--muted)">En attente du joueur 1…</p>
    </div>
  </div>

  <!-- Choosing (my turn) -->
  <div id="screen-choosing-me" class="hidden" style="display:flex;flex-direction:column;gap:14px;width:100%">
    <div id="score-bar" class="score-bar-multi">
      <!-- Dynamically rendered -->
    </div>
    <div id="turn-progress"><strong id="cm-turn-info">Tour 1/20</strong></div>
    <div id="game-card" class="type-none">
      <div style="font-size:1.4rem;font-weight:800;color:var(--primary)">C'est ton tour !</div>
      <div style="font-size:1rem;color:var(--muted)" id="cm-my-name"></div>
    </div>
    <div id="choice-btns">
      <div class="row">
        <button class="btn btn-primary" onclick="choose('verite')">🗣️ Vérité</button>
        <button class="btn btn-orange"  onclick="choose('defi')">🔥 Défi</button>
      </div>
      <button class="btn btn-gray btn-full" onclick="choose('random')">🎲 Au hasard</button>
    </div>
  </div>

  <!-- Choosing (other's turn) -->
  <div id="screen-choosing-other" class="hidden" style="display:flex;flex-direction:column;gap:14px;width:100%">
    <div id="score-bar-other" class="score-bar-multi" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px">
      <!-- Dynamically rendered -->
    </div>
    <div><strong id="co-turn-info" style="font-size:14px;color:var(--muted);display:block;text-align:center">Tour 1/20</strong></div>
    <div id="waiting-card">
      <div class="wait-name" id="co-other-name">Adversaire</div>
      <div class="wait-sub dots-anim">choisit</div>
    </div>
  </div>

  <!-- Card phase -->
  <div id="screen-card" class="hidden" style="display:flex;flex-direction:column;gap:14px;width:100%">
    <div id="score-bar-card" class="score-bar-multi" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px">
      <!-- Dynamically rendered -->
    </div>
    <div id="card-turn-info" style="text-align:center;font-size:14px;color:var(--muted)"></div>
    <div id="game-card-main" class="type-none" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;border-radius:20px;border:2px solid var(--border);padding:28px 24px;text-align:center;min-height:200px;transition:background .4s,border-color .4s">
      <div id="card-badge-main" class="badge-verite">VÉRITÉ</div>
      <div id="card-cat-main" style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px"></div>
      <div id="card-text-main" style="font-size:1.25rem;font-weight:600;line-height:1.5"></div>
    </div>
    <div id="done-btns">
      <button class="btn btn-success" id="done-btn"  onclick="sendDone(true)">✅ Fait !</button>
      <button class="btn btn-gray"    id="pass-btn"  onclick="sendDone(false)">⏭️ Passe</button>
    </div>
    <div id="card-spectator-msg" class="hidden" style="text-align:center;font-size:14px;color:var(--muted);padding:8px 0">
      En attente de la décision…
    </div>
  </div>

  <!-- Game Over -->
  <div id="screen-gameover" class="hidden">
    <div id="phase-overlay">
      <div class="card" style="width:100%;padding:28px;text-align:center">
        <div style="font-size:2.5rem;margin-bottom:8px">🏆</div>
        <h2 style="font-size:1.8rem;font-weight:900;margin-bottom:16px">Partie terminée !</h2>
        <div id="go-scores-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;justify-content:center"></div>
        <div id="go-winner" style="font-size:1.1rem;color:var(--gold);margin-bottom:20px"></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-muted btn-full" onclick="location.href='index.html'">Accueil</button>
          <button class="btn btn-primary btn-full" onclick="restartGame()">Rejouer</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ─── State ──────────────────────────────────────────── */
let ws = null;
let mySlot = null;
let myName = '';
let state = null;

let myRoomCode = '';
let pendingAction = null;

/* ─── WebSocket ──────────────────────────────────────── */
function connect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/verite`);
  ws.onopen = () => {
    document.getElementById('dot').classList.add('ok');
    if (pendingAction) { pendingAction(); pendingAction = null; }
  };
  ws.onclose = () => {
    document.getElementById('dot').classList.remove('ok');
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
}

(function(){
  const p = new URLSearchParams(location.search);
  if (p.get('name')) document.getElementById('name-input').value = p.get('name');
  if (p.get('code')) {
    const ci = document.getElementById('code-input');
    if(ci) ci.value = p.get('code').toUpperCase();
    showJoinV();
  }
  if (p.get('create') === '1' && p.get('name')) {
    const name = p.get('name');
    document.getElementById('name-input').value = name;
    myName = name; pendingAction = () => send({ type: 'create_verite', name }); connect();
  }
})();

function send(obj) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

/* ─── Messages ───────────────────────────────────────── */
function handleMsg(msg) {
  switch (msg.type) {
    case 'created_verite':
      mySlot = msg.slot; myName = msg.name; myRoomCode = msg.code;
      document.getElementById('verite-code-display').textContent = msg.code;
      showScreen('screen-waiting');
      break;
    case 'welcome_verite':
      mySlot = msg.slot;
      myName = msg.name;
      myRoomCode = msg.code||'';
      break;

    case 'verite_state':
      state = msg;
      renderState();
      break;

    case 'player_left':
      alert('Ton adversaire a quitté la partie.');
      location.href = 'index.html';
      break;

    case 'error':
      console.warn('Server error:', msg.msg);
      break;
  }
}

/* ─── Score bar renderer ─────────────────────────────── */
function renderVeriteScoreBar(barId, players, scores, activeTurn) {
  const bar = document.getElementById(barId);
  if (!bar) return;
  bar.innerHTML = '';
  players.forEach((p, i) => {
    if (i > 0) { const sep = document.createElement('div'); sep.className = 'sep'; bar.appendChild(sep); }
    const isActive = p.slot === activeTurn;
    const isMe = p.slot === mySlot;
    const d = document.createElement('div');
    d.className = 'player-score' + (isMe ? ' me' : '') + (isActive ? ' active-turn' : '');
    d.innerHTML = '<div class="name">' + p.name + (isActive ? ' 🎯' : '') + '</div>'
      + '<div class="pts">' + (scores?.[p.slot] ?? 0) + ' pts</div>';
    bar.appendChild(d);
  });
}

/* ─── Render ─────────────────────────────────────────── */
function renderState() {
  if (!state) return;
  const { phase, players, scores, turn, turnNum, maxTurns, card } = state;
  const isMyTurn = (mySlot === turn);
  const turnPlayerName = players.find(p => p.slot === turn)?.name ?? '?';
  const turnText = 'Tour ' + (turnNum ?? 1) + '/' + (maxTurns ?? 20);

  switch (phase) {
    case 'WAITING':
      if (mySlot === 0) { showScreen('screen-waiting'); renderQR(); }
      break;

    case 'READY':
      showScreen('screen-ready');
      document.getElementById('ready-players').textContent = players.map(p => p.name).join(' · ');
      toggleEl('start-btn', mySlot === 0);
      toggleEl('ready-wait', mySlot !== 0);
      break;

    case 'CHOOSING':
      renderVeriteScoreBar('score-bar', players, scores, turn);
      if (isMyTurn) {
        showScreen('screen-choosing-me');
        setEl('cm-turn-info', turnText);
        setEl('cm-my-name', 'C\'est à toi, ' + myName + ' !');
      } else {
        showScreen('screen-choosing-other');
        renderVeriteScoreBar('score-bar-other', players, scores, turn);
        setEl('co-turn-info', turnText);
        setEl('co-other-name', turnPlayerName);
      }
      break;

    case 'CARD':
      showScreen('screen-card');
      renderVeriteScoreBar('score-bar-card', players, scores, turn);
      setEl('card-turn-info', turnText + ' — ' + turnPlayerName);

      if (card) {
        const isVerite = card.type === 'verite';
        const cardEl = document.getElementById('game-card-main');
        const badge = document.getElementById('card-badge-main');

        cardEl.style.background = isVerite ? 'rgba(139,92,246,.25)' : 'rgba(249,115,22,.22)';
        cardEl.style.borderColor = isVerite ? '#a78bfa' : '#f97316';

        badge.textContent = isVerite ? 'VÉRITÉ' : 'DÉFI';
        badge.className = isVerite ? 'badge-verite' : 'badge-defi';
        badge.style.background = isVerite ? 'rgba(139,92,246,.4)' : 'rgba(249,115,22,.35)';
        badge.style.color = isVerite ? '#c4b5fd' : '#fdba74';
        badge.style.border = '1px solid ' + (isVerite ? '#a78bfa' : '#f97316');

        setEl('card-cat-main', card.cat || '');
        setEl('card-text-main', card.text || '');
      }

      const doneBtns = document.getElementById('done-btns');
      const spectMsg = document.getElementById('card-spectator-msg');
      if (isMyTurn) {
        doneBtns.classList.remove('hidden');
        spectMsg.classList.add('hidden');
      } else {
        doneBtns.classList.add('hidden');
        spectMsg.classList.remove('hidden');
      }
      break;

    case 'GAME_OVER':
      showScreen('screen-gameover');
      const sorted = [...players].sort((a, b) => (scores?.[b.slot] ?? 0) - (scores?.[a.slot] ?? 0));
      const gsList = document.getElementById('go-scores-list');
      gsList.innerHTML = '';
      sorted.forEach(p => {
        const d = document.createElement('div');
        d.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;flex:1;min-width:calc(50% - 8px)';
        if (p.slot === mySlot) d.style.borderColor = 'var(--primary)';
        d.innerHTML = '<div style="font-size:12px;color:var(--muted)">' + p.name + '</div>'
          + '<div style="font-size:1.4rem;font-weight:800;color:var(--primary)">' + (scores?.[p.slot] ?? 0) + ' pts</div>';
        gsList.appendChild(d);
      });
      const winnerSlot = state.winnerSlot ?? -1;
      if (winnerSlot < 0) setEl('go-winner', '🤝 Égalité !');
      else if (winnerSlot === mySlot) setEl('go-winner', '🏆 Tu remportes la partie !');
      else setEl('go-winner', '🏆 ' + (players.find(p => p.slot === winnerSlot)?.name || '?') + ' remporte la partie !');
      break;
  }
}

/* ─── QR ─────────────────────────────────────────────── */
function renderQR() {
  const url = location.href;
  document.getElementById('url-display').textContent = url;
  const canvas = document.getElementById('qr-canvas');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    canvas.width = img.width; canvas.height = img.height;
    canvas.getContext('2d').drawImage(img, 0, 0);
  };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}`;
}

/* ─── Helpers ────────────────────────────────────────── */
function showScreen(id) {
  ['screen-name','screen-waiting','screen-ready','screen-choosing-me','screen-choosing-other','screen-card','screen-gameover']
    .forEach(s => { const el = document.getElementById(s); if (el) el.classList.add('hidden'); });
  const t = document.getElementById(id);
  if (t) t.classList.remove('hidden');
}
function toggleEl(id, show) {
  const el = document.getElementById(id);
  if (!el) return;
  if (show) el.classList.remove('hidden');
  else el.classList.add('hidden');
}
function setEl(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

/* ─── Actions ────────────────────────────────────────── */
function showJoinV() {
  const a = document.getElementById('join-code-area');
  a.style.display = a.style.display === 'flex' ? 'none' : 'flex';
  a.style.flexDirection = 'column'; a.style.gap = '8px';
}
function createGame() {
  const n = document.getElementById('name-input').value.trim();
  if (!n) return;
  myName = n; pendingAction = () => send({ type: 'create_verite', name: n }); connect();
}
function joinGame() {
  const n = document.getElementById('name-input').value.trim();
  if (!n) return;
  const c = document.getElementById('code-input').value.trim().toUpperCase();
  if (!c) return;
  myName = n; pendingAction = () => send({ type: 'join_verite', name: n, code: c }); connect();
}
function copyCodeV() {
  if (!myRoomCode) return;
  navigator.clipboard.writeText(myRoomCode).then(() => {
    const h = document.getElementById('verite-copy-hint');
    h.textContent = 'Copié !'; h.style.color = '#22c55e';
    setTimeout(() => { h.textContent = 'Cliquer pour copier'; h.style.color = ''; }, 1500);
  }).catch(() => {});
}
document.getElementById('code-input') && document.getElementById('code-input').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
});
function startGame() { send({ type: 'start_verite' }); }
function restartGame() { send({ type: 'restart_verite' }); }
function choose(choice) { send({ type: 'choose', choice }); }
function sendDone(completed) { send({ type: 'done', completed }); }

/* ─── Enter key ──────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.id === 'name-input') createGame();
});

/* ─── Init ───────────────────────────────────────────── */
connect();
</script>
<script src="chat.js"></script>
</body>
</html>
