<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZapPlay — Dessin</title>
<style>
:root{--bg:#0f0c29;--bg2:#24243e;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.13);--primary:#a78bfa;--primary2:#7c3aed;--orange:#f97316;--correct:#22c55e;--wrong:#ef4444;--gold:#fbbf24;--text:#f1f5f9;--muted:#94a3b8;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;padding:0 10px}
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.active{display:flex}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-orange{background:var(--orange);color:#fff}
.btn-sec{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
input[type=text]{background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);width:100%;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--orange)}
input[type=text]::placeholder{color:var(--muted)}

/* HOME */
#s-home{justify-content:center;gap:16px}
.logo h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#f97316,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.logo p{color:var(--muted);text-align:center;font-size:.88rem;margin-top:4px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px}
.form-card label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
#err{color:#fca5a5;font-size:.83rem;text-align:center;min-height:16px}

/* WAIT */
#s-wait{justify-content:center;align-items:center;gap:16px;text-align:center}
#qr-box{width:150px;height:150px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;overflow:hidden}
#qr-url{font-size:.75rem;color:var(--muted);font-family:monospace;margin-top:-8px}
#wait-txt h2{font-size:1.1rem;font-weight:700}
#wait-txt p{color:var(--muted);margin-top:5px;font-size:.85rem}

/* READY */
#s-ready{justify-content:center;align-items:center;text-align:center;gap:14px}
#s-ready h2{font-size:1.3rem;font-weight:700}
#s-ready p{color:var(--muted);font-size:.9rem}
/* Round selector */
.round-selector{display:flex;gap:8px;margin-top:4px}
.round-btn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px;font-size:.92rem;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation;max-width:100px}
.round-btn.on{border-color:var(--orange);color:var(--text);background:rgba(249,115,22,.12)}

/* GAME */
#scoreboard{display:flex;justify-content:space-between;align-items:center;padding:8px 0;gap:6px;flex-wrap:wrap}
.sc{flex:1;min-width:55px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 8px;text-align:center;position:relative}
.sc.drawer-active{border-color:var(--orange)}
.sc-name{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-pts{font-size:1.2rem;font-weight:700;color:var(--orange)}
.sc-role{font-size:.6rem;margin-top:1px}
.role-draw{color:var(--orange)}
.role-guess{color:#60a5fa}
.draw-badge{position:absolute;top:-5px;right:-5px;font-size:.75rem;line-height:1;background:var(--card);border-radius:50%;padding:2px}
.vs{width:24px;height:24px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted);flex-shrink:0}

/* Timer bar */
#timer-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin:0 0 6px;overflow:hidden}
#timer-bar{height:100%;width:100%;border-radius:2px}
#timer-bar.go{animation:tshrink linear forwards}
@keyframes tshrink{0%{width:100%;background:var(--correct)}65%{background:var(--gold)}100%{width:0%;background:var(--wrong)}}

/* Canvas area */
#canvas-wrap{flex:1;position:relative;border-radius:var(--r);overflow:hidden;background:#fff;min-height:0;cursor:crosshair}
#canvas-wrap.view-only{cursor:default}
canvas{width:100%;height:100%;display:block;touch-action:none}

/* Big countdown overlay on canvas */
#canvas-countdown{
  position:absolute;inset:0;
  display:none;
  align-items:center;justify-content:center;
  pointer-events:none;
  z-index:10;
}
#canvas-countdown span{
  font-size:7rem;
  font-weight:800;
  color:rgba(124,58,237,.55);
  line-height:1;
  text-shadow:0 2px 20px rgba(0,0,0,.15);
  animation:cdpulse .5s ease;
}
@keyframes cdpulse{0%{transform:scale(1.3);opacity:.6}100%{transform:scale(1);opacity:1}}

/* Drawer toolbar */
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 0;flex-wrap:wrap}
.colors{display:flex;gap:5px;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .15s;flex-shrink:0;touch-action:manipulation}
.color-dot.active{border-color:#fff;transform:scale(1.15)}
.sizes{display:flex;gap:5px}
.size-btn{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:border-color .15s}
.size-btn.active{border-color:var(--orange)}
.size-dot{background:#000;border-radius:50%}
#btn-erase{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text);font-size:.78rem;cursor:pointer;touch-action:manipulation;transition:border-color .15s}
#btn-erase.active{border-color:#fff}
#btn-clear{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:5px 10px;color:#fca5a5;font-size:.78rem;cursor:pointer;touch-action:manipulation}
#btn-undo{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);border-radius:8px;padding:5px 10px;color:var(--primary);font-size:.78rem;cursor:pointer;touch-action:manipulation;transition:border-color .15s}
#btn-undo:hover{border-color:var(--primary)}
#btn-hint{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:8px;padding:5px 10px;color:var(--gold);font-size:.78rem;cursor:pointer;touch-action:manipulation;white-space:nowrap}
#btn-hint:hover{border-color:var(--gold)}

/* Word display */
#word-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
#word-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
#word-value{font-size:1.5rem;font-weight:800;letter-spacing:.08em}
#word-hint{font-size:1.2rem;letter-spacing:.18em;color:var(--muted);font-weight:600}
#round-info{font-size:.72rem;color:var(--muted)}

/* Guess area */
#guess-area{display:flex;gap:8px;padding:6px 0}
#guess-input{flex:1}
#btn-guess{width:auto;padding:12px 18px;flex-shrink:0}
#guess-log{display:flex;flex-direction:column;gap:4px;max-height:80px;overflow-y:auto}
.guess-item{font-size:.82rem;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.guess-item.correct{background:rgba(34,197,94,.15);border-color:var(--correct);color:#86efac}
.guess-item.close{background:rgba(251,191,36,.1);border-color:var(--gold);color:var(--gold)}

/* REVEAL */
#s-reveal{justify-content:center;align-items:center;text-align:center;gap:14px}
#reveal-word{font-size:2rem;font-weight:800;color:var(--orange)}
#reveal-msg{font-size:1rem;color:var(--muted)}

/* GAME OVER */
#s-gameover{justify-content:center;align-items:center;text-align:center;gap:14px}
.final-sc{display:flex;flex-wrap:wrap;gap:10px;width:100%}
.fs-card{flex:1;min-width:calc(50% - 10px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.fs-name{color:var(--muted);font-size:.78rem;margin-bottom:3px}
.fs-pts{font-size:2rem;font-weight:800;color:var(--orange)}

/* Fixed elements */
#dot{position:fixed;top:8px;right:10px;width:7px;height:7px;border-radius:50%;background:#ef4444;transition:background .3s}
#dot.ok{background:#22c55e}
#back-btn{position:fixed;top:5px;left:8px;background:none;border:none;color:var(--muted);font-size:.82rem;cursor:pointer;padding:4px 8px;border-radius:6px;z-index:100}
#back-btn:hover{color:var(--text)}
</style>
</head>
<body>
<div id="dot"></div>
<button id="back-btn" onclick="location.href='index.html'">&#8592; Accueil</button>

<div id="app">

<!-- HOME -->
<div id="s-home" class="screen active">
  <div style="flex:1"></div>
  <div class="logo"><h1>Dessin &amp; Devine</h1><p>Dessine et fais deviner à ton partenaire !</p></div>
  <div class="form-card">
    <label>Ton prénom</label>
    <input id="inp-name" type="text" placeholder="Ex: Jean" maxlength="20" autocomplete="off">
    <div style="display:flex;gap:8px">
      <button class="btn btn-orange" style="flex:1" onclick="doCreate()">Créer une salle</button>
      <button class="btn btn-sec" style="flex:1" onclick="showJoinInput()">Rejoindre (code)</button>
    </div>
    <div id="join-code-area" style="display:none;flex-direction:column;gap:8px">
      <input id="inp-code" type="text" placeholder="Code (ex: ABCD)" maxlength="4" autocomplete="off"
        style="text-transform:uppercase;letter-spacing:.12em;font-size:1.1rem;font-weight:700;text-align:center">
      <button class="btn btn-sec" onclick="doJoin()">Rejoindre</button>
    </div>
  </div>
  <div id="err"></div>
  <div style="flex:1"></div>
</div>

<!-- WAIT -->
<div id="s-wait" class="screen">
  <div style="text-align:center;padding:12px 0 8px">
    <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Code de votre salle</div>
    <div id="room-code-display" onclick="copyRoomCode()" title="Cliquer pour copier"
      style="font-size:2.8rem;font-weight:800;letter-spacing:.2em;color:var(--orange);font-family:monospace;
             background:rgba(249,115,22,.1);border:2px solid rgba(249,115,22,.3);border-radius:12px;
             padding:12px 18px;cursor:pointer;display:inline-block">----</div>
    <div id="copy-hint-draw" style="font-size:.7rem;color:var(--muted);margin-top:4px">Cliquer pour copier</div>
  </div>
  <div id="qr-box"><span style="color:var(--muted);font-size:.72rem">chargement...</span></div>
  <div id="qr-url"></div>
  <div id="wait-txt"><h2>En attente...</h2><p>Partagez le code ou scannez le QR</p></div>
</div>

<!-- READY -->
<div id="s-ready" class="screen">
  <div style="font-size:3rem">&#127912;</div>
  <h2 id="ready-title">Joueurs prêts !</h2>
  <p id="ready-sub">En attente du lancement...</p>
  <div id="round-selector-wrap" style="display:none;flex-direction:column;align-items:center;gap:8px">
    <p style="font-size:.82rem;color:var(--muted)">Nombre de manches</p>
    <div class="round-selector">
      <button class="round-btn" data-rounds="3" onclick="selectRounds(3)">3</button>
      <button class="round-btn on" data-rounds="6" onclick="selectRounds(6)">6</button>
      <button class="round-btn" data-rounds="9" onclick="selectRounds(9)">9</button>
    </div>
  </div>
  <button id="btn-launch" class="btn btn-orange" onclick="doStart()" style="display:none;max-width:260px">Lancer la partie !</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div id="scoreboard">
    <!-- Dynamically rendered -->
  </div>
  <div id="timer-wrap"><div id="timer-bar"></div></div>

  <!-- Word / hint -->
  <div id="word-box">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div id="word-label">Dessine :</div>
      <div id="round-info">Manche 1/6</div>
    </div>
    <div id="word-value" style="display:none"></div>
    <div id="word-hint" style="display:none"></div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="canvas-countdown"><span id="canvas-countdown-num"></span></div>
  </div>

  <!-- Drawer toolbar -->
  <div id="toolbar" style="display:none">
    <div class="colors" id="color-row">
      <div class="color-dot active" style="background:#1a1a1a" data-color="#1a1a1a"></div>
      <div class="color-dot" style="background:#ef4444" data-color="#ef4444"></div>
      <div class="color-dot" style="background:#f97316" data-color="#f97316"></div>
      <div class="color-dot" style="background:#eab308" data-color="#eab308"></div>
      <div class="color-dot" style="background:#22c55e" data-color="#22c55e"></div>
      <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6"></div>
      <div class="color-dot" style="background:#a855f7" data-color="#a855f7"></div>
      <div class="color-dot" style="background:#f472b6" data-color="#f472b6"></div>
    </div>
    <div class="sizes" id="size-row">
      <button class="size-btn active" data-size="3"><div class="size-dot" style="width:5px;height:5px"></div></button>
      <button class="size-btn" data-size="8"><div class="size-dot" style="width:10px;height:10px"></div></button>
      <button class="size-btn" data-size="18"><div class="size-dot" style="width:18px;height:18px"></div></button>
    </div>
    <button id="btn-erase" onclick="toggleErase()">Gomme</button>
    <button id="btn-undo" onclick="doUndo()">&#8617; Annuler</button>
    <button id="btn-hint" onclick="doHint()">Indice (-1pt)</button>
    <button id="btn-clear" onclick="doClear()">Effacer tout</button>
  </div>

  <!-- Guesser area -->
  <div id="guess-area" style="display:none">
    <input id="guess-input" type="text" placeholder="Votre réponse..." maxlength="60" autocomplete="off">
    <button class="btn btn-orange btn-sm" id="btn-guess" onclick="doGuess()" style="width:auto;padding:12px 16px">OK</button>
  </div>
  <div id="guess-log" style="display:none"></div>
</div>

<!-- REVEAL -->
<div id="s-reveal" class="screen">
  <div id="reveal-icon" style="font-size:3rem"></div>
  <div id="reveal-msg"></div>
  <div style="color:var(--muted);font-size:.85rem">Le mot était :</div>
  <div id="reveal-word"></div>
  <div id="reveal-sub" style="font-size:.85rem;color:var(--muted)"></div>
</div>

<!-- GAME OVER -->
<div id="s-gameover" class="screen">
  <div style="font-size:1.7rem;font-weight:800">Fin de la partie !</div>
  <div id="go-winner" style="font-size:1rem;color:var(--gold);font-weight:600;padding:10px 18px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:10px"></div>
  <div class="final-sc" id="go-scores"></div>
  <button class="btn btn-orange" onclick="doRestart()">Rejouer</button>
  <button class="btn btn-sec" onclick="location.href='index.html'">Accueil</button>
</div>

</div><!-- /app -->

<script>
// ── WebSocket ─────────────────────────────────────────────────────────────────
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/draw`;
let ws, mySlot = -1, myName = '', myCode = '', reconnectAction = null;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('dot').classList.add('ok');
    if (reconnectAction) { reconnectAction(); reconnectAction = null; }
  };
  ws.onclose = () => { document.getElementById('dot').classList.remove('ok'); setTimeout(connect, 2000); };
  ws.onerror = () => {};
  ws.onmessage = e => { let m; try { m = JSON.parse(e.data); } catch { return; } handle(m); };
}
connect();
function send(d) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(d)); }

// ── URL params ────────────────────────────────────────────────────────────────
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('name'))document.getElementById('inp-name').value=p.get('name');
  if(p.get('code')){document.getElementById('inp-code').value=p.get('code').toUpperCase();showJoinInput();}
  if(p.get('create')==='1'&&p.get('name')){
    const name=p.get('name');document.getElementById('inp-name').value=name;
    const tryCreate=()=>{if(ws&&ws.readyState===WebSocket.OPEN){myName=name;send({type:'create_draw',name});}else reconnectAction=tryCreate;};
    setTimeout(tryCreate,300);
  }
})();

// ── Round selector ────────────────────────────────────────────────────────────
let selectedRounds = 6;
function selectRounds(n) {
  selectedRounds = n;
  document.querySelectorAll('.round-btn').forEach(b => b.classList.toggle('on', Number(b.dataset.rounds) === n));
}

// ── Actions ───────────────────────────────────────────────────────────────────
function showJoinInput(){
  const a=document.getElementById('join-code-area');
  a.style.display=a.style.display==='flex'?'none':'flex';a.style.flexDirection='column';a.style.gap='8px';
}
function doCreate(){
  const n=document.getElementById('inp-name').value.trim();
  if(!n){showErr('Entre ton prénom !');return;}
  myName=n;send({type:'create_draw',name:n});
}
function doJoin() {
  const n = document.getElementById('inp-name').value.trim();
  if (!n) { showErr('Entre ton prénom !'); return; }
  const c = document.getElementById('inp-code').value.trim().toUpperCase();
  if (!c) { showErr('Entre le code de la salle !'); return; }
  myName = n; send({ type: 'join_draw', name: n, code: c });
}
function copyRoomCode(){
  if(!myCode)return;
  navigator.clipboard.writeText(myCode).then(()=>{
    const h=document.getElementById('copy-hint-draw');
    h.textContent='Copié !';h.style.color='var(--correct)';
    setTimeout(()=>{h.textContent='Cliquer pour copier';h.style.color='';},1500);
  }).catch(()=>{});
}
document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') doCreate(); });
document.getElementById('inp-code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});
document.getElementById('inp-code').addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});
function doStart()   { send({ type: 'start_draw', rounds: selectedRounds }); }
function doRestart() { send({ type: 'restart_draw' }); }
function doClear()   { send({ type: 'draw_clear' }); clearCanvas(); }
function doGuess() {
  const inp = document.getElementById('guess-input');
  const w = inp.value.trim();
  if (!w) return;
  send({ type: 'guess', word: w });
  inp.value = '';
}
document.getElementById('guess-input').addEventListener('keydown', e => { if (e.key === 'Enter') doGuess(); });
function doUndo() { send({ type: 'draw_undo' }); }
function doHint() { send({ type: 'draw_hint' }); }

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

// ── Screen ────────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── QR / IP ───────────────────────────────────────────────────────────────────
async function loadQR() {
  try { const r = await fetch('/api/qr'); document.getElementById('qr-box').innerHTML = await r.text(); } catch {}
  try { const r = await fetch('/api/ip'); const d = await r.json(); document.getElementById('qr-url').textContent = `http://${d.ip}:${d.port}/draw.html`; } catch {}
}

// ── Timer ─────────────────────────────────────────────────────────────────────
let timerHandle = null;
let timerRemaining = 0;
let timerStartedAt = 0;
let timerDuration = 0;
let canvasCountdownHandle = null;

function startTimer(s) {
  clearTimeout(timerHandle);
  timerDuration = s;
  timerStartedAt = Date.now();
  timerRemaining = s;
  const bar = document.getElementById('timer-bar');
  bar.classList.remove('go'); bar.style.animationDuration = '';
  void bar.offsetWidth;
  bar.style.animationDuration = s + 's';
  bar.classList.add('go');
  scheduleCanvasCountdown(s);
}

function stopTimer() {
  clearTimeout(timerHandle);
  clearInterval(canvasCountdownHandle);
  document.getElementById('timer-bar').classList.remove('go');
  hideCanvasCountdown();
}

// Big countdown overlay when < 10 seconds
function scheduleCanvasCountdown(totalSeconds) {
  clearInterval(canvasCountdownHandle);
  hideCanvasCountdown();
  if (totalSeconds <= 10) {
    showCanvasCountdown(Math.ceil(totalSeconds));
    startCanvasCountdownTick(Math.ceil(totalSeconds));
  } else {
    const delay = (totalSeconds - 10) * 1000;
    timerHandle = setTimeout(() => {
      showCanvasCountdown(10);
      startCanvasCountdownTick(10);
    }, delay);
  }
}

function startCanvasCountdownTick(startN) {
  let n = startN;
  canvasCountdownHandle = setInterval(() => {
    n--;
    if (n <= 0) { clearInterval(canvasCountdownHandle); hideCanvasCountdown(); }
    else showCanvasCountdown(n);
  }, 1000);
}

function showCanvasCountdown(n) {
  const wrap = document.getElementById('canvas-countdown');
  const numEl = document.getElementById('canvas-countdown-num');
  numEl.textContent = n;
  // Force re-animation
  numEl.style.animation = 'none';
  void numEl.offsetWidth;
  numEl.style.animation = '';
  wrap.style.display = 'flex';
}

function hideCanvasCountdown() {
  document.getElementById('canvas-countdown').style.display = 'none';
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let isDrawer = false;
let drawing = false;
let currentColor = '#1a1a1a';
let currentSize = 3;
let erasing = false;
let lastX = 0, lastY = 0;
let pendingPts = [], sendHandle = null;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  // Save image
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  tmp.getContext('2d').drawImage(canvas, 0, 0);
  canvas.width = W; canvas.height = H;
  setupCtx();
  ctx.drawImage(tmp, 0, 0, canvas.width, canvas.height);
}

function setupCtx() {
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
setupCtx();

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scX = canvas.width / rect.width;
  const scY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scX, y: (src.clientY - rect.top) * scY };
}

function drawSegment(x1, y1, x2, y2, color, size, erase) {
  ctx.globalCompositeOperation = erase ? 'destination-out' : 'source-over';
  ctx.strokeStyle = color;
  ctx.lineWidth = size;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
}

function flushPts() {
  if (pendingPts.length) {
    send({ type: 'draw_pts', pts: pendingPts });
    pendingPts = [];
  }
  sendHandle = null;
}

function scheduleSend() {
  if (!sendHandle) sendHandle = setTimeout(flushPts, 20);
}

canvas.addEventListener('pointerdown', e => {
  if (!isDrawer) return;
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  drawing = true;
  const { x, y } = getPos(e);
  lastX = x; lastY = y;
  pendingPts.push({ x, y, x2: x, y2: y, c: erasing ? '#fff' : currentColor, s: currentSize, e: erasing, start: 1 });
  scheduleSend();
});

canvas.addEventListener('pointermove', e => {
  if (!isDrawer || !drawing) return;
  e.preventDefault();
  const { x, y } = getPos(e);
  drawSegment(lastX, lastY, x, y, erasing ? '#fff' : currentColor, currentSize, erasing);
  pendingPts.push({ x: lastX, y: lastY, x2: x, y2: y, c: erasing ? '#fff' : currentColor, s: currentSize, e: erasing });
  lastX = x; lastY = y;
  scheduleSend();
});

canvas.addEventListener('pointerup', () => { drawing = false; flushPts(); });
canvas.addEventListener('pointercancel', () => { drawing = false; });

// ── Toolbar ───────────────────────────────────────────────────────────────────
document.getElementById('color-row').addEventListener('click', e => {
  const dot = e.target.closest('.color-dot');
  if (!dot) return;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  currentColor = dot.dataset.color;
  erasing = false;
  document.getElementById('btn-erase').classList.remove('active');
});

document.getElementById('size-row').addEventListener('click', e => {
  const btn = e.target.closest('.size-btn');
  if (!btn) return;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSize = Number(btn.dataset.size);
});

function toggleErase() {
  erasing = !erasing;
  document.getElementById('btn-erase').classList.toggle('active', erasing);
}

// ── Receive drawing ───────────────────────────────────────────────────────────
function applyPts(pts) {
  pts.forEach(p => {
    if (p.e) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = p.c;
    }
    ctx.lineWidth = p.s;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x2, p.y2);
    ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
  });
}

// ── Replay all batches (for undo) ─────────────────────────────────────────────
function replayBatches(batches) {
  clearCanvas();
  if (!batches || !batches.length) return;
  batches.forEach(batch => {
    if (Array.isArray(batch)) applyPts(batch);
  });
}

// ── Guess log ─────────────────────────────────────────────────────────────────
const guesses = [];
function addGuess(name, word, result) {
  guesses.unshift({ name, word, result });
  if (guesses.length > 6) guesses.pop();
  const log = document.getElementById('guess-log');
  log.innerHTML = guesses.map(g => {
    const cls = g.result === 'correct' ? 'correct' : g.result === 'close' ? 'close' : '';
    return `<div class="guess-item ${cls}">${g.name}: <strong>${g.word}</strong>${g.result==='close'?' &#128293;':''}</div>`;
  }).join('');
}

// ── Update hint display ───────────────────────────────────────────────────────
function updateHintDisplay(hint) {
  if (!hint) return;
  const wh = document.getElementById('word-hint');
  if (wh.style.display !== 'none') {
    wh.textContent = hint;
  }
}

// ── Message handler ───────────────────────────────────────────────────────────
function handle(msg) {
  switch (msg.type) {
    case 'created_draw':
      mySlot=msg.slot;myCode=msg.code;
      document.getElementById('room-code-display').textContent=msg.code;
      show('s-wait');loadQR();
      break;
    case 'welcome_draw': mySlot = msg.slot; myCode = msg.code||''; break;
    case 'error': showErr(msg.msg); break;
    case 'player_left': show('s-home'); showErr((msg.name || 'L\'adversaire') + ' a quitté.'); break;

    case 'draw_state': renderState(msg); break;

    case 'draw_pts':
      applyPts(msg.pts);
      break;

    case 'draw_clear':
      clearCanvas();
      break;

    case 'guess_result':
      addGuess(msg.name, msg.word, msg.result);
      break;

    // Undo: server replays all batches
    case 'draw_replay':
      replayBatches(msg.batches);
      break;

    // Hint update for guesser
    case 'draw_hint_update':
      updateHintDisplay(msg.hint);
      if (msg.scores) {
        msg.scores.forEach((s, i) => {
          const el = document.getElementById('p' + i);
          if (el) el.textContent = s;
        });
      }
      break;

    // Scores update for drawer after hint
    case 'draw_scores_update':
      if (msg.scores) {
        msg.scores.forEach((s, i) => {
          const el = document.getElementById('p' + i);
          if (el) el.textContent = s;
        });
      }
      break;
  }
}

// ── Render scoreboard ─────────────────────────────────────────────────────────
function renderDrawScoreboard(players, scores, drawerSlot) {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  players.forEach((p, i) => {
    if (i > 0) { const vs = document.createElement('div'); vs.className = 'vs'; vs.textContent = 'VS'; sb.appendChild(vs); }
    const isDrawer = p.slot === drawerSlot;
    const d = document.createElement('div');
    d.className = 'sc' + (isDrawer ? ' drawer-active' : '');
    d.id = 'sc' + p.slot;
    d.innerHTML = '<div class="sc-name">' + p.name + (isDrawer ? ' ✏️' : '') + '</div>'
      + '<div class="sc-pts" id="p' + p.slot + '">' + (scores?.[p.slot] ?? 0) + '</div>'
      + '<div class="sc-role" id="r' + p.slot + '">' + (isDrawer ? '<span class="role-draw">Dessine</span>' : '<span class="role-guess">Devine</span>') + '</div>';
    sb.appendChild(d);
  });
}

// ── Render state ──────────────────────────────────────────────────────────────
function renderState(st) {
  const { phase, players, drawerSlot, round, maxRounds, word, letterCount, scores, timerSeconds, winnerSlot, hint } = st;
  isDrawer = (drawerSlot === mySlot);

  renderDrawScoreboard(players, scores, drawerSlot);

  if (phase === 'WAITING') {
    show('s-ready');
    const isP1 = mySlot === 0;
    document.getElementById('btn-launch').style.display = isP1 && players.length >= 2 ? '' : 'none';
    const n = players.length;
    document.getElementById('ready-title').textContent = n + ' joueur' + (n > 1 ? 's' : '') + ' connecté' + (n > 1 ? 's' : '') + ' !';
    document.getElementById('ready-sub').textContent = isP1 ? 'Lance quand tout le monde est là !' : 'En attente que l\'hôte lance...';
    return;
  }

  if (phase === 'READY') {
    show('s-ready');
    const isP1 = mySlot === 0;
    document.getElementById('btn-launch').style.display = isP1 ? '' : 'none';
    const rsWrap = document.getElementById('round-selector-wrap');
    rsWrap.style.display = isP1 ? 'flex' : 'none';
    const n = players.length;
    document.getElementById('ready-title').textContent = n + ' joueur' + (n > 1 ? 's' : '') + ' prêts !';
    document.getElementById('ready-sub').textContent = isP1
      ? 'Lance la partie quand tu es prêt !'
      : 'En attente que ' + (players[0]?.name || 'le joueur 1') + ' lance...';
    return;
  }

  if (phase === 'DRAWING') {
    show('s-game');
    guesses.length = 0;
    document.getElementById('guess-log').innerHTML = '';

    // Round info
    document.getElementById('round-info').textContent = 'Manche ' + round + '/' + maxRounds;

    // Word / hint
    const wv = document.getElementById('word-value');
    const wh = document.getElementById('word-hint');
    const wl = document.getElementById('word-label');
    if (isDrawer) {
      wl.textContent = 'Dessine :';
      wv.textContent = word.toUpperCase();
      wv.style.display = '';
      wh.style.display = 'none';
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('guess-area').style.display = 'none';
      document.getElementById('guess-log').style.display = 'none';
      document.getElementById('canvas-wrap').classList.remove('view-only');
    } else {
      wl.textContent = 'Devinez :';
      const displayHint = hint || ('_ '.repeat(letterCount).trim());
      wh.textContent = displayHint;
      wv.style.display = 'none';
      wh.style.display = '';
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('guess-area').style.display = 'flex';
      document.getElementById('guess-log').style.display = 'flex';
      document.getElementById('canvas-wrap').classList.add('view-only');
    }

    clearCanvas();
    startTimer(timerSeconds || 60);
    setTimeout(resizeCanvas, 50);
    return;
  }

  if (phase === 'REVEAL') {
    show('s-reveal');
    stopTimer();
    const guessed = st.guessedBy >= 0;
    document.getElementById('reveal-icon').textContent = guessed ? '🎉' : '⏱️';
    document.getElementById('reveal-word').textContent = st.revealWord?.toUpperCase() || '?';
    if (guessed) {
      const guesser = players.find(p => p.slot === st.guessedBy);
      const drawer = players.find(p => p.slot === drawerSlot);
      document.getElementById('reveal-msg').textContent = (guesser?.name || '?') + ' a trouvé !';
      document.getElementById('reveal-sub').textContent = '+2 pts pour ' + guesser?.name + ' · +1 pt pour ' + drawer?.name;
    } else {
      document.getElementById('reveal-msg').textContent = 'Temps écoulé ! Personne n\'a trouvé.';
      document.getElementById('reveal-sub').textContent = '';
    }
    return;
  }

  if (phase === 'GAME_OVER') {
    show('s-gameover');
    stopTimer();
    if (winnerSlot < 0) document.getElementById('go-winner').textContent = 'Égalité !';
    else if (winnerSlot === mySlot) document.getElementById('go-winner').textContent = 'Tu as gagné !';
    else document.getElementById('go-winner').textContent = (players.find(p=>p.slot===winnerSlot)?.name || '?') + ' a gagné !';

    const sc = document.getElementById('go-scores');
    sc.innerHTML = '';
    const sorted = [...players].sort((a, b) => (scores?.[b.slot] ?? 0) - (scores?.[a.slot] ?? 0));
    sorted.forEach(p => {
      const d = document.createElement('div');
      d.className = 'fs-card';
      if (p.slot === mySlot) d.style.borderColor = 'var(--orange)';
      d.innerHTML = '<div class="fs-name">' + p.name + '</div><div class="fs-pts">' + (scores?.[p.slot] ?? 0) + '</div>';
      sc.appendChild(d);
    });
  }
}
</script>
