<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="theme.css">
<title>ZapPlay — Phrase interdite</title>
<style>
:root{--primary:#a855f7;--card:#0E0E22;--border:rgba(168,85,247,.25);--text:#E8E8F0;--muted:#5A5A78}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden}
#wrap{max-width:480px;margin:0 auto;padding:56px 14px 20px;min-height:100dvh;display:flex;flex-direction:column;gap:12px}
.screen{display:none;flex-direction:column;gap:12px;flex:1;min-height:0;overflow-y:auto}
.screen.active{display:flex}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem}
.btn-primary{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff}
.btn-secondary{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
#dot{position:fixed;top:10px;right:12px;width:8px;height:8px;border-radius:50%;background:#ef4444;z-index:50}
#dot.ok{background:#22c55e}
#back{position:fixed;top:8px;left:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.75rem;z-index:50}
h1{font-size:1.35rem;color:var(--primary);text-align:center}
.phrase-box{font-size:1.05rem;padding:14px;background:rgba(168,85,247,.12);border-radius:12px;text-align:center;border:1px solid var(--border);word-break:break-word}
.vote-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.vote-row button{padding:10px 16px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-weight:600}
#err{color:#f87171;font-size:.85rem;text-align:center;min-height:18px}
input[type=text]{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text)}
</style>
</head>
<body>
<div class="zp-space-bg"><div class="zp-neb1"></div><div class="zp-neb2"></div><div class="zp-stars" id="zp-stars"></div><div class="zp-sgrid"></div><div class="zp-comet"></div></div>
<div id="dot"></div>
<button id="back" onclick="location.href='index.html'">← Accueil</button>
<div id="wrap">
  <div id="s-home" class="screen active">
    <h1>🤐 Phrase interdite</h1>
    <p style="text-align:center;color:var(--muted);font-size:.85rem">L’hôte choisit une cible, elle écrit une phrase à faire dire — tout le monde vote qui doit la dire.</p>
    <div class="card">
      <input id="inp-name" type="text" placeholder="Ton prénom" maxlength="20" autocomplete="off">
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary" style="flex:1" onclick="createR()">Créer une salle</button>
        <button class="btn btn-secondary" style="flex:1" onclick="toggleJoin()">Rejoindre</button>
      </div>
      <div id="join-area" style="display:none;flex-direction:column;gap:8px;margin-top:8px">
        <input id="inp-code" maxlength="4" placeholder="Code" autocomplete="off" style="text-align:center;letter-spacing:.2em;font-weight:700;text-transform:uppercase">
        <button class="btn btn-primary" onclick="joinR()">Rejoindre</button>
      </div>
      <div id="err"></div>
    </div>
  </div>
  <div id="s-wait" class="screen">
    <div class="card" style="text-align:center">
      <div style="font-size:.7rem;color:var(--muted)">Code de la salle</div>
      <div id="code-disp" style="font-size:2.2rem;font-weight:800;letter-spacing:.2em;color:var(--primary);font-family:monospace">----</div>
      <div id="wait-players" style="margin-top:10px;font-size:.9rem"></div>
    </div>
    <button id="btn-start" class="btn btn-primary" style="display:none" onclick="send({type:'start_phrase'})">Lancer la partie</button>
  </div>
  <div id="s-game" class="screen">
    <div id="phase-title" style="font-weight:800;color:var(--primary);text-align:center;font-size:1.1rem"></div>
    <div id="round-info" style="text-align:center;color:var(--muted);font-size:.8rem"></div>
    <div id="game-body"></div>
  </div>
  <div id="s-over" class="screen">
    <h1 style="text-align:center;font-size:1.5rem">🏆 Fin de partie</h1>
    <div id="final-scores" class="card"></div>
    <button class="btn btn-primary" onclick="send({type:'restart_phrase'})" id="btn-restart" style="display:none">Rejouer</button>
    <button class="btn btn-secondary" onclick="location.href='index.html'">Accueil</button>
  </div>
</div>
<script src="shared.js"></script>
<script src="chat.js"></script>
<script>
const WS=(location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws/phrase';
let ws=null,mySlot=-1,myName='',pending=null;
function el(id){return document.getElementById(id)}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}
function connect(){
  ws=new WebSocket(WS);
  ws.onopen=()=>{el('dot').classList.add('ok');if(window.ZapPlay)ZapPlay.hideLoader();if(pending){pending();pending=null}};
  ws.onclose=()=>{el('dot').classList.remove('ok');setTimeout(connect,2000)};
  ws.onmessage=e=>{let m;try{m=JSON.parse(e.data)}catch{return}handleMsg(m)};
}
connect();
function bindL(){if(window.ZapPlay)ZapPlay.setLoungeSender(t=>send({type:'lounge_chat',text:t}));else setTimeout(bindL,120)}
bindL();
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));el(id).classList.add('active')}
function createR(){
  const n=el('inp-name').value.trim();if(!n){el('err').textContent='Entre ton prénom';return}
  el('err').textContent='';if(window.ZapPlay)ZapPlay.savePseudo(n);myName=n;
  const go=()=>send({type:'create_phrase',name:n});
  if(ws&&ws.readyState===1)go();else pending=go;
}
function joinR(){
  let n=el('inp-name').value.trim();if(!n&&window.ZapPlay&&ZapPlay.getSavedPseudo)n=ZapPlay.getSavedPseudo().trim();
  el('inp-name').value=n;
  const c=el('inp-code').value.trim().toUpperCase();
  if(!n||!c){el('err').textContent='Prénom + code requis';return}
  el('err').textContent='';if(window.ZapPlay)ZapPlay.savePseudo(n);myName=n;
  const go=()=>send({type:'join_phrase',name:n,code:c});
  if(ws&&ws.readyState===1)go();else pending=go;
}
function toggleJoin(){const a=el('join-area');a.style.display=a.style.display==='flex'?'none':'flex';a.style.flexDirection='column'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function handleMsg(m){
  if(m.type==='error'){el('err').textContent=m.msg;return}
  if(m.type==='lounge_chat'&&window.ZapPlay){ZapPlay.addLoungeMessage(m);return}
  if(m.type==='created_phrase'){mySlot=m.slot;myName=m.name}
  if(m.type==='welcome_phrase'){mySlot=m.slot;myName=m.name}
  if(m.type!=='phrase_state')return;
  const s=m;
  if(mySlot<0&&myName){const me=s.players.find(p=>p.name===myName);if(me)mySlot=me.slot}
  const isHost=mySlot===0;
  if(s.phase==='WAITING'){
    el('code-disp').textContent=s.code||'----';
    el('wait-players').textContent=s.players.map(p=>p.name).join(' · ');
    el('btn-start').style.display=isHost&&s.players.length>=3?'block':'none';
    if(window.ZapPlay)ZapPlay.showLounge({players:s.players,mySlot,roomCode:s.code,gameName:'Phrase interdite'});
    show('s-wait');return
  }
  if(window.ZapPlay)ZapPlay.hideLounge();
  el('round-info').textContent=s.round?'Manche '+s.round+' / '+s.totalRounds:'';
  if(s.phase==='GAME_OVER'){
    let html='<table style="width:100%;font-size:.95rem">';
    s.players.slice().sort((a,b)=>(b.score||0)-(a.score||0)).forEach((p,i)=>{
      html+='<tr><td>'+(i+1)+'.</td><td>'+esc(p.name)+'</td><td style="text-align:right">'+(p.score||0)+' pts</td></tr>'
    });
    html+='</table>';
    el('final-scores').innerHTML=html;
    el('btn-restart').style.display=isHost?'block':'none';
    show('s-over');return
  }
  show('s-game');
  const title=el('phase-title'),body=el('game-body');
  if(s.phase==='CHOOSE'){
    title.textContent='Choisis une cible';
    body.innerHTML='';
    if(isHost){
      s.players.forEach(p=>{
        if(p.slot===mySlot)return;
        const b=document.createElement('button');b.className='btn btn-secondary';b.style.marginBottom='8px';
        b.textContent=p.name;b.onclick=()=>send({type:'phrase_set_target',targetSlot:p.slot});
        body.appendChild(b)
      })
    }else body.innerHTML='<p style="text-align:center;color:var(--muted)">L’hôte choisit une cible…</p>'
  }else if(s.phase==='ENTER_PHRASE'){
    title.textContent='Phrase à faire dire';
    if(mySlot===s.targetSlot){
      body.innerHTML='<p style="color:var(--muted);margin-bottom:8px;font-size:.9rem">Écris une phrase courte (sans citer un nom).</p><input id="ph-inp" maxlength="200" type="text" placeholder="Ta phrase…"><button class="btn btn-primary" style="margin-top:10px" onclick="subPhrase()">Valider</button>'
    }else{
      const nm=s.players.find(p=>p.slot===s.targetSlot);
      body.innerHTML='<p style="text-align:center;color:var(--muted)">'+(nm?esc(nm.name):'?')+' rédige la phrase…</p>'
    }
  }else if(s.phase==='VOTE'){
    title.textContent='Qui doit dire cette phrase ?';
    body.innerHTML='<div class="phrase-box">'+esc(s.phrase)+'</div><div class="vote-row" id="votes"></div>';
    const vr=el('votes');
    if(s.votes&&s.votes[mySlot]!==undefined){
      vr.innerHTML='<p style="color:var(--muted)">Vote enregistré</p>';return
    }
    s.players.forEach(p=>{
      if(p.slot===mySlot)return;
      const b=document.createElement('button');b.textContent=p.name;
      b.onclick=()=>send({type:'phrase_vote',targetSlot:p.slot});
      vr.appendChild(b)
    })
  }else if(s.phase==='ROUND_RESULT'){
    title.textContent='Manche terminée';
    body.innerHTML='<p style="text-align:center;color:var(--muted)">Manche suivante…</p>'
  }
}
function subPhrase(){const i=el('ph-inp');if(!i)return;const t=i.value.trim();if(!t)return;send({type:'phrase_submit',text:t})}
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('name'))el('inp-name').value=p.get('name');
  if(p.get('code')){el('inp-code').value=p.get('code').toUpperCase();toggleJoin()}
  if(p.get('create')==='1'&&p.get('name')){el('inp-name').value=p.get('name');setTimeout(createR,400)}
  if(p.get('code')&&p.get('name')&&p.get('create')!=='1'){el('inp-name').value=p.get('name');setTimeout(joinR,500)}
})();
el('inp-code')&&el('inp-code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)});
</script>
<script>(function(){var sc=document.getElementById('zp-stars');if(!sc)return;for(var i=0;i<50;i++){var s=document.createElement('div');s.className='zp-star';s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(.4+Math.random()*1.2)+'px;height:'+(.4+Math.random()*1.2)+'px';sc.appendChild(s)}})();</script>
</body>
</html>
