<!DOCTYPE html>
<html lang="fr" data-zp-game="skyline">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="theme.css">
<title>ZapPlay — Skyline</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#00E8D4;--gold:#fbbf24;--ok:#22c55e;--bad:#ef4444;--text:#E8E8F0;--muted:#7A8098;--border:rgba(0,232,212,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;color:var(--text);min-height:100dvh;padding-bottom:24px}
#app{max-width:520px;margin:0 auto;padding:60px 14px 20px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
#back{position:fixed;top:8px;left:8px;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:1rem;z-index:120}
#dot{position:fixed;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--bad);z-index:120}
#dot.ok{background:var(--ok)}
.hidden{display:none!important}
.card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:14px;padding:16px;backdrop-filter:blur(8px)}
.btn{border:none;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;transition:transform .1s;font-size:.95rem;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--primary);color:#000}
.btn-s{background:rgba(255,255,255,.12);color:var(--text)}
.btn-full{width:100%}
input{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px;font-size:1rem;outline:none;font-family:inherit}
h2{font-size:1.45rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px}
.code-box{text-align:center;background:rgba(0,232,212,.07);border:1px solid rgba(0,232,212,.2);border-radius:12px;padding:12px;cursor:pointer;width:100%}
.code-big{font-size:2.2rem;font-weight:900;letter-spacing:.2em;color:var(--primary);font-family:monospace}
.spectate-strip{display:none;margin:0 0 12px;padding:8px 12px;text-align:center;font-size:.76rem;font-weight:700;color:#99f6e4;background:rgba(0,232,212,.1);border:1px solid rgba(0,232,212,.28);border-radius:10px}
.spectate-strip.on{display:block}
.rnd-tag{font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-align:center;margin-bottom:6px}

.sky-game-hud{text-align:center;margin-bottom:8px}
.sky-game-hud .who{font-size:1.05rem;font-weight:800;color:var(--text)}
.sky-game-hud .sub{font-size:.78rem;color:var(--muted);margin-top:4px}
.sky-play-duo{display:flex;flex-direction:column;gap:12px;width:100%}
@media (min-width:640px){
  .sky-play-duo{flex-direction:row;align-items:stretch}
  .sky-play-duo .sky-tower-3d-wrap{flex:0 0 38%;max-width:220px}
  .sky-play-duo .sky-stack-canvas-wrap{flex:1;min-width:0}
}
.sky-tower-3d-wrap{position:relative;border-radius:14px;overflow:hidden;background:radial-gradient(120% 80% at 50% 100%,#0a1020 0%,#04060d 100%);border:1px solid rgba(0,232,212,.16);min-height:min(28vh,200px);aspect-ratio:4/3}
.sky-tower-3d-wrap canvas.sky-tower-webgl{display:block;width:100%;height:100%}
.sky-tower-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.76rem;color:var(--muted);padding:10px;text-align:center}
.sky-stack-canvas-wrap{position:relative;flex:1;border-radius:14px;overflow:hidden;background:linear-gradient(180deg,#12182a,#070914);border:1px solid rgba(0,232,212,.14);min-height:min(44vh,340px)}
#sky-stack-canvas{display:block;width:100%;height:auto;vertical-align:middle;touch-action:manipulation;cursor:pointer}
.sky-stack-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,8,18,.72);color:#e8f0ff;font-weight:800;font-size:1.05rem;text-align:center;padding:16px;line-height:1.35;pointer-events:none;z-index:2}
.sky-stack-overlay.hidden{display:none!important}
.sky-stack-hint{font-size:.74rem;color:var(--muted);text-align:center;margin-top:10px}

/* ── Ville 3D (arrière-plan) ── */
.sky-city-bg{position:fixed;left:0;right:0;bottom:0;height:min(42vh,320px);pointer-events:none;z-index:0;overflow:hidden;opacity:.92}
.sky-city-persp{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;perspective:900px;perspective-origin:50% 85%}
.sky-city-slab{width:120%;height:200px;display:flex;align-items:flex-end;justify-content:center;gap:clamp(6px,2vw,14px);transform-style:preserve-3d;transform:rotateX(58deg) translateY(18%) scale(1.15);animation:sky-city-drift 22s ease-in-out infinite}
@keyframes sky-city-drift{
  0%,100%{transform:rotateX(58deg) translateY(18%) scale(1.15) rotateY(-6deg)}
  50%{transform:rotateX(58deg) translateY(18%) scale(1.15) rotateY(6deg)}
}
.sky-bg-bld{--W:42px;--H:110px;--D:36px;flex-shrink:0;transform-style:preserve-3d;animation:sky-bld-pulse 4s ease-in-out infinite;transform-origin:50% 100%}
.sky-bg-bld.sky-bg-bld--fall{animation:none!important;filter:none!important}
.sky-bg-bld.sky-bg-bld--fall .sky-cube{animation:sky-cube-crash .95s cubic-bezier(.25,.1,.45,1) forwards;transform-origin:50% 100%}
@keyframes sky-cube-crash{
  0%{transform:translateZ(0) rotateX(0deg)}
  35%{transform:translateZ(20px) rotateX(-18deg)}
  100%{transform:translateZ(-60px) rotateX(-92deg) translateY(140px);opacity:.25}
}
.sky-bg-bld:nth-child(2n){animation-delay:-1.2s}
.sky-bg-bld:nth-child(3n){animation-delay:-2.4s}
@keyframes sky-bld-pulse{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.12)}
}
.sky-cube{width:var(--W);height:var(--H);position:relative;transform-style:preserve-3d;transform:translateZ(0)}
.sky-cube .sky-face{position:absolute;box-sizing:border-box;backface-visibility:hidden;border:1px solid rgba(0,0,0,.35)}
.sky-cube .sky-f-front{width:var(--W);height:var(--H);transform:translateZ(calc(var(--D)/2));background:linear-gradient(180deg,#4a5f78 0%,#2a3548 55%,#1a2230 100%);box-shadow:inset 0 0 24px rgba(0,232,212,.06)}
.sky-cube .sky-f-back{width:var(--W);height:var(--H);transform:rotateY(180deg) translateZ(calc(var(--D)/2));background:linear-gradient(180deg,#283242,#151b26)}
.sky-cube .sky-f-left{width:var(--D);height:var(--H);left:50%;margin-left:calc(var(--D)/-2);transform:rotateY(-90deg) translateZ(calc(var(--W)/2));background:linear-gradient(90deg,#1e2633,#2d3a4d)}
.sky-cube .sky-f-right{width:var(--D);height:var(--H);left:50%;margin-left:calc(var(--D)/-2);transform:rotateY(90deg) translateZ(calc(var(--W)/2));background:linear-gradient(270deg,#1e2633,#2d3a4d)}
.sky-cube .sky-f-top{width:var(--W);height:var(--D);top:0;left:0;transform:rotateX(90deg) translateZ(calc(var(--H)/2));background:linear-gradient(135deg,#5a6d88,#3d4d62)}
.sky-win-grid{position:absolute;inset:8px 6px 14px 6px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(5,1fr);gap:3px;pointer-events:none;opacity:.55}
.sky-win-grid span{background:rgba(0,232,212,.25);border-radius:1px;box-shadow:0 0 6px rgba(0,232,212,.2)}
.sky-ant{position:absolute;top:-14px;left:50%;width:4px;height:16px;margin-left:-2px;background:linear-gradient(180deg,#8899aa,#333);transform:translateZ(calc(var(--D)/2 + 1px));border-radius:1px}

.sky-round-goal{font-size:.78rem;color:var(--primary);text-align:center;font-weight:700;margin-bottom:8px;min-height:1.2em}
.sky-tower-meta{font-size:.82rem;color:var(--muted);text-align:center;margin-top:8px}
.sky-tap-btn{width:100%;padding:18px;font-size:1.05rem;border-radius:14px;font-weight:800;letter-spacing:.02em}
.sky-tap-btn:disabled{opacity:.45;cursor:not-allowed}
.sky-wait-card{text-align:center;padding:20px;color:var(--muted);font-size:.9rem}
.sky-flash{position:fixed;inset:0;pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;text-shadow:0 2px 20px rgba(0,0,0,.8);opacity:0;transition:opacity .2s}
.sky-flash.on{opacity:1}
.sky-flash.ok{color:var(--ok)}
.sky-flash.bad{color:var(--bad)}
@media (prefers-reduced-motion: reduce){
  .sky-city-slab{animation:none!important}
  .sky-bg-bld{animation:none!important}
}
</style>
</head>
<body>
<div class="zp-space-bg"><div class="zp-neb1"></div><div class="zp-neb2"></div><div class="zp-stars" id="zp-stars-sky"></div><div class="zp-sgrid"></div><div class="zp-comet"></div></div>
<div class="sky-city-bg" aria-hidden="true"><div class="sky-city-persp"><div class="sky-city-slab" id="sky-city-slab">
<div class="sky-bg-bld" style="--W:36px;--H:72px;--D:30px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:44px;--H:118px;--D:38px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-ant"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:40px;--H:96px;--D:34px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:48px;--H:132px;--D:42px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-ant"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:34px;--H:64px;--D:28px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:42px;--H:104px;--D:36px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:38px;--H:88px;--D:32px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
<div class="sky-bg-bld" style="--W:46px;--H:124px;--D:40px"><div class="sky-cube"><div class="sky-face sky-f-front"></div><div class="sky-face sky-f-back"></div><div class="sky-face sky-f-left"></div><div class="sky-face sky-f-right"></div><div class="sky-face sky-f-top"></div><div class="sky-ant"></div><div class="sky-win-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div></div>
</div></div></div>
<div id="sky-flash" class="sky-flash" aria-hidden="true"></div>
<div id="app">
<div id="spectate-strip" class="spectate-strip"></div>
<button id="back" type="button" onclick="history.back()">← Retour</button>
<div id="dot"></div>

<div id="scr-name">
  <h2>🏙️ Skyline</h2>
  <div class="card" style="display:flex;flex-direction:column;gap:10px">
    <p style="text-align:center;color:var(--muted);font-size:.85rem">Même principe que <b>Stack Tower</b> : le bloc rebondit en haut — <b>clic ou Espace</b> pour le lâcher. Mal aligné = découpe ; complètement à côté = game over pour ton tour. Objectif d’étages par manche.</p>
    <input id="name-input" type="text" maxlength="20" placeholder="Ton pseudo" autocomplete="off">
    <div style="display:flex;gap:8px">
      <button class="btn btn-p" style="flex:1" onclick="createGame()">Créer une salle</button>
      <button class="btn btn-s" style="flex:1" onclick="toggleJoin()">Rejoindre</button>
    </div>
    <div id="join-area" style="display:none;flex-direction:column;gap:8px">
      <input id="code-in" type="text" maxlength="4" placeholder="Code" style="text-transform:uppercase;text-align:center;font-size:1.2rem;letter-spacing:.15em">
      <button class="btn btn-p btn-full" onclick="joinGame()">Rejoindre</button>
      <button type="button" class="btn btn-s btn-full" onclick="joinSpectate()">Regarder en spectateur</button>
    </div>
    <p id="err" style="color:var(--bad);text-align:center;font-size:.85rem;min-height:18px"></p>
  </div>
</div>

<div id="scr-wait" class="hidden">
  <h2>🏙️ Skyline</h2>
  <div class="card" style="display:flex;flex-direction:column;gap:12px;align-items:center">
    <div class="code-box" onclick="copyCode()">
      <div style="font-size:.62rem;color:var(--muted);letter-spacing:.08em;margin-bottom:4px">CODE</div>
      <div class="code-big" id="w-code">----</div>
    </div>
    <p id="w-hint" style="color:var(--muted);font-size:.82rem"></p>
    <button id="start-btn" class="btn btn-p btn-full hidden" onclick="startGame()">▶ Lancer</button>
  </div>
</div>

<div id="scr-cd" class="hidden" style="min-height:40vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <p style="color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-size:.9rem">C’est parti</p>
  <div style="font-size:4.5rem;font-weight:900;color:var(--primary)" id="cd-n">3</div>
</div>

<div id="scr-game" class="hidden">
  <div class="rnd-tag" id="game-rnd">MANCHE 1/5</div>
  <div class="card">
    <div class="sky-game-hud">
      <div class="who" id="game-who">—</div>
      <div class="sub" id="game-sub"></div>
    </div>
    <div class="sky-round-goal" id="sky-round-goal"></div>
    <div class="sky-play-duo">
      <div class="sky-tower-3d-wrap" id="sky-tower-3d-wrap">
        <canvas class="sky-tower-webgl" aria-hidden="true"></canvas>
        <div class="sky-tower-fallback" id="sky-tower-fallback">Préparation du rendu 3D…</div>
      </div>
      <div class="sky-stack-canvas-wrap" id="sky-stack-wrap">
        <canvas id="sky-stack-canvas" width="400" height="360" aria-label="Jeu — empiler les blocs"></canvas>
        <div class="sky-stack-overlay hidden" id="sky-stack-overlay"></div>
      </div>
    </div>
    <p class="sky-stack-hint" id="sky-stack-hint"></p>
    <div class="sky-tower-meta" id="tower-meta">—</div>
    <button type="button" class="btn btn-p sky-tap-btn" id="tap-btn" onclick="doStackAction()">Lâcher le bloc (clic ou Espace)</button>
  </div>
</div>

<div id="scr-over" class="hidden">
  <div class="card" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:8px">🏆</div>
    <p id="winner-txt" style="font-size:1.15rem;font-weight:800;color:var(--gold);margin-bottom:14px"></p>
    <div id="final-ranks" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;text-align:left"></div>
    <button class="btn btn-s btn-full" onclick="restart()">Rejouer</button>
  </div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
<script src="skyline-tower-3d.js"></script>
<script src="skyline-stack-canvas.js"></script>
<script>
const WS_URL = (location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws/skyline';
let ws, mySlot=-1, myCode='', isSpectator=false, pendingAction=null;
const skyTurnState = { turnSlot: -1, phase: '', targetFloors: 3, stackDifficulty: 1, round: 1 };
let stackGame = null;
let stackFinishedSent = false;
let lastStackTurnKey = '';
let lastTowerFloors = -1;
let towerThreeReady = false;

function stopStack(){
  if(stackGame && typeof stackGame.stop==='function'){ try{ stackGame.stop(); }catch(_){} }
  stackGame = null;
}
const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');
const send = d => ws && ws.readyState===1 && ws.send(JSON.stringify(d));

function syncSpectateStrip(){
  const el=$('spectate-strip'); if(!el)return;
  el.classList.toggle('on',!!isSpectator);
  el.textContent=isSpectator?'Spectateur — tu vois la partie, pas le bouton.':'';
}
function joinSpectate(){
  const n=$('name-input').value.trim()||'Joueur';
  const c=$('code-in').value.trim().toUpperCase();
  if(!c){$('err').textContent='Code requis';return;}
  if(window.ZapPlay)ZapPlay.savePseudo(n);
  isSpectator=true; mySlot=-1; syncSpectateStrip();
  send({type:'join_skyline_spectate',name:n,code:c});
}

function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{$('dot').classList.add('ok'); if(pendingAction){pendingAction();pendingAction=null;}};
  ws.onclose=()=>{$('dot').classList.remove('ok'); setTimeout(connect,2000);};
  ws.onmessage=e=>{ try{ handleMsg(JSON.parse(e.data)); }catch(_){} };
}
connect();
function bindLounge(){ if(window.ZapPlay) ZapPlay.setLoungeSender(t=>send({type:'lounge_chat',text:t})); else setTimeout(bindLounge,120); }
bindLounge();

function toggleJoin(){
  const a=$('join-area');
  a.style.display=a.style.display==='flex'?'none':'flex';
}
function createGame(){ isSpectator=false; syncSpectateStrip(); send({type:'create_skyline',name:$('name-input').value.trim()||'Joueur'}); }
function joinGame(){ isSpectator=false; syncSpectateStrip(); send({type:'join_skyline',name:$('name-input').value.trim()||'Joueur',code:$('code-in').value.trim().toUpperCase()}); }
function copyCode(){ try{ navigator.clipboard.writeText(myCode); }catch(_){} }
function startGame(){ if(isSpectator)return; send({type:'start_skyline'}); }
function restart(){ if(isSpectator)return; send({type:'restart_skyline'}); }

function isStackTurn(){
  return !isSpectator && skyTurnState.phase === 'TURNING' && skyTurnState.turnSlot === mySlot;
}

function syncStackOverlay(){
  const ov=$('sky-stack-overlay');
  const pl=(typeof skyTurnState._activeName==='string')?skyTurnState._activeName:'';
  const hint=$('sky-stack-hint');
  if(!ov)return;
  if(isStackTurn()){
    ov.classList.add('hidden');
    if(hint) hint.textContent='Clique ou Espace pour lâcher le bloc quand il est bien au-dessus de la pile.';
  }else{
    ov.classList.remove('hidden');
    ov.textContent=isSpectator?'Spectateur — '+pl+' joue.':('Tour de '+pl+' — regarde la pile et la prévisualisation 3D.');
    if(hint) hint.textContent=isSpectator?'Tu observes le joueur actif.':'Ce n’est pas ton tour — la prévisualisation 3D suit la pile du joueur actif.';
  }
}

function startStackForTurn(state){
  const key=(state.turnSlot||0)+'_'+(state.round||1)+'_'+(state.stackDifficulty||1);
  if(isSpectator){
    lastStackTurnKey=key;
    return;
  }
  if(!isStackTurn()){
    lastStackTurnKey=key;
    stopStack();
    return;
  }
  if(lastStackTurnKey===key && stackGame)return;
  if(lastStackTurnKey===key && stackFinishedSent)return;
  lastStackTurnKey=key;
  stackFinishedSent=false;
  stopStack();
  towerThreeReady=false;
  lastTowerFloors=-1;
  const c=$('sky-stack-canvas');
  if(!c||typeof window.SkylineStackGame!=='function')return;
  stackGame=new SkylineStackGame(c);
  stackGame.onFloorCountChange=function(n){
    const n3=Math.min(18,Math.max(0,n|0));
    if(!towerThreeReady&&window.SkylineTower3D){
      towerThreeReady=!!SkylineTower3D.init('sky-tower-3d-wrap');
      const fb=$('sky-tower-fallback');
      if(fb) fb.style.display=towerThreeReady?'none':'flex';
    }
    var prev=lastTowerFloors;
    if(towerThreeReady&&typeof SkylineTower3D.setFloorsFromBottom==='function'&&n3>prev){
      SkylineTower3D.setFloorsFromBottom(Math.max(0,prev),n3,function(){});
      lastTowerFloors=n3;
    }
  };
  stackGame.onFinish=function(score){
    if(stackFinishedSent)return;
    stackFinishedSent=true;
    stopStack();
    send({type:'skyline_stack_done',score:score|0});
  };
  stackGame.start({speedMul:state.stackDifficulty||1});
}

function triggerCityBuildingFall(){
  const slab = $('sky-city-slab');
  if(!slab) return;
  const kids = slab.querySelectorAll('.sky-bg-bld');
  if(!kids.length) return;
  const k = kids[Math.floor(Math.random() * kids.length)];
  k.classList.add('sky-bg-bld--fall');
  const inner = k.querySelector('.sky-cube');
  const done = () => { k.classList.remove('sky-bg-bld--fall'); };
  if(inner){
    inner.addEventListener('animationend', done, { once: true });
    setTimeout(done, 1100);
  } else setTimeout(done, 1100);
}

function teardownTower3D(){
  lastTowerFloors=-1;
  towerThreeReady=false;
  if(window.SkylineTower3D&&typeof SkylineTower3D.dispose==='function'){
    try{ SkylineTower3D.dispose(); }catch(_){}
  }
  const fb=$('sky-tower-fallback');
  if(fb){ fb.style.display='flex'; fb.textContent=''; }
}

function renderTowerFloors(n, opts){
  opts=opts||{};
  const force=!!opts.force;
  const wrap=$('sky-tower-3d-wrap');
  const fb=$('sky-tower-fallback');
  if(!wrap)return;
  n=Math.min(18,Math.max(0,n|0));
  const prev=lastTowerFloors;
  if(!force&&n===prev&&prev>=0)return;
  if(typeof window.SkylineTower3D==='undefined'||typeof window.SkylineTower3D.init!=='function'){
    if(fb){ fb.style.display='flex'; fb.textContent='Chargement du moteur 3D…'; }
    return;
  }
  if(!towerThreeReady){
    towerThreeReady=!!SkylineTower3D.init('sky-tower-3d-wrap');
    if(!towerThreeReady){
      if(fb){ fb.style.display='flex'; fb.textContent='WebGL indisponible sur cet appareil.'; }
      return;
    }
    if(fb) fb.style.display='none';
  }
  if(n===0&&prev>0){
    lastTowerFloors=n;
    SkylineTower3D.playCollapse(function(){ SkylineTower3D.setFloors(0); });
    return;
  }
  if(!force&&n>prev&&n>=1&&typeof SkylineTower3D.setFloorsFromBottom==='function'){
    lastTowerFloors=n;
    SkylineTower3D.setFloorsFromBottom(Math.max(0,prev),n,function(){});
    return;
  }
  lastTowerFloors=n;
  SkylineTower3D.setFloors(n);
}

function resetTowerForNewRound(){
  lastTowerFloors=-1;
  if(towerThreeReady&&window.SkylineTower3D&&typeof SkylineTower3D.setFloorsInstant==='function'){
    SkylineTower3D.setFloorsInstant(0);
  }
}

function applyGameVisual(state){
  skyTurnState.turnStart=state.turnStart||0;
  skyTurnState.turnEnd=state.turnEnd||0;
  skyTurnState.turnSlot=state.turnSlot!=null?state.turnSlot:-1;
  skyTurnState.phase=state.phase||'';
  skyTurnState.targetFloors=state.targetFloors!=null?state.targetFloors:3;
  skyTurnState.stackDifficulty=state.stackDifficulty!=null?state.stackDifficulty:1;
  skyTurnState.round=state.round!=null?state.round:1;
  const pl=(state.players||[]).find(p=>p.slot===state.turnSlot);
  const name=pl?pl.name:'?';
  skyTurnState._activeName=name;
  const myTurn=!isSpectator&&state.turnSlot===mySlot;
  $('game-who').textContent=myTurn?'À toi !':('Tour de '+name);
  const tgt=skyTurnState.targetFloors;
  const spd=(skyTurnState.stackDifficulty||1).toFixed(2).replace(/\.?0+$/,'');
  $('game-sub').textContent=myTurn
    ? ('Manche '+skyTurnState.round+' · vitesse ×'+spd+' — empile le plus possible avant la fin du temps.')
    :(isSpectator?('Observation · objectif : '+tgt+' étages · vitesse ×'+spd)
    :('Attends… · objectif : '+tgt+' étages'));
  const goalEl=$('sky-round-goal');
  if(goalEl) goalEl.textContent='Objectif manche : '+tgt+' étages ou plus (+30 pts bonus si réussi)';
  const me=(state.players||[]).find(p=>p.slot===mySlot);
  let floorsViz=0, scoreLine='';
  if(isSpectator){
    const ap=pl;
    floorsViz=ap? (ap.floors||0):0;
    scoreLine=name+' — record du tour (serv.) : '+floorsViz+' étages · score '+(ap?(ap.score||0):0);
  }else if(myTurn){
    floorsViz=0;
    scoreLine='Ton meilleur score ce tour partira au serveur à la fin (temps ou chute).';
  }else{
    floorsViz=me? (me.floors||0):0;
    scoreLine='Tes étages enregistrés : '+floorsViz+'/'+tgt+' · score '+(me?(me.score||0):0);
  }
  $('tower-meta').textContent=scoreLine;
  if(isSpectator||!myTurn){
    renderTowerFloors(floorsViz,{force:isSpectator});
  }
  syncStackOverlay();
  const btn=$('tap-btn');
  if(btn){
    btn.disabled=!myTurn||isSpectator;
    btn.textContent=isSpectator?'Spectateur':(myTurn?'Lâcher le bloc (clic ou Espace)':'Pas ton tour');
  }
  $('game-rnd').textContent='MANCHE '+(state.round||1)+'/'+(state.totalRounds||5);
}

function showGameScreen(state){
  hide('scr-name'); hide('scr-wait'); hide('scr-cd'); hide('scr-over'); show('scr-game');
  stopStack();
  applyGameVisual(state);
  if(state.phase==='TURNING'){
    startStackForTurn(state);
  }
}

function updateState(d){
  if(d.phase==='TURNING'&&window.ZapPlay){
    const showLou=d.turnSlot!==mySlot||isSpectator;
    if(showLou) ZapPlay.showLounge({players:d.players||[],mySlot:isSpectator?-1:mySlot,roomCode:d.code||myCode,gameName:'Skyline'});
    else ZapPlay.hideLounge();
  }
  if(d.phase==='WAITING'){
    teardownTower3D();
    stopStack();
    lastStackTurnKey='';
    hide('scr-cd'); hide('scr-game'); hide('scr-over');
    show('scr-wait');
    $('w-code').textContent=d.code||myCode;
    const host=d.players&&d.players[0]?d.players[0].name:'';
    const n=(d.players||[]).length;
    $('start-btn').classList.toggle('hidden',!(mySlot===0&&n>=2));
    $('w-hint').textContent=n<2?'En attente d’un adversaire…':(mySlot===0?'Tu es l’hôte — lance quand tout le monde est prêt.':'En attente du lancement par '+host+'…');
    if(window.ZapPlay) ZapPlay.showLounge({players:d.players||[],mySlot:isSpectator?-1:mySlot,roomCode:d.code||myCode,gameName:'Skyline'});
  }
  if(d.phase==='GAME_OVER'){
    teardownTower3D();
    stopStack();
    renderGameOverFromState(d);
  }
}

function renderGameOverFromState(d){
  hide('scr-game'); hide('scr-cd'); hide('scr-wait'); show('scr-over');
  const pl=d.players||[];
  const sorted=[...pl].sort((a,b)=>(b.score||0)-(a.score||0));
  const w=sorted[0];
  $('winner-txt').textContent=w ? '🏆 '+w.name+' gagne avec '+w.score+' pts !' : 'Partie terminée';
  const fr=$('final-ranks'); fr.textContent='';
  sorted.forEach((p,i)=>{
    const div=document.createElement('div');
    div.style.padding='8px 12px';
    div.style.background='rgba(255,255,255,.05)';
    div.style.borderRadius='8px';
    div.textContent=(i+1)+'. '+p.name+' — '+p.score+' pts';
    fr.appendChild(div);
  });
  if(window.ZapPlay) ZapPlay.hideLounge();
}

function flash(msg, ok){
  const el=$('sky-flash');
  if(!el)return;
  el.textContent=msg;
  el.className='sky-flash on '+(ok?'ok':'bad');
  el.setAttribute('aria-hidden','false');
  setTimeout(()=>{ el.classList.remove('on'); el.setAttribute('aria-hidden','true'); }, 900);
}

function doStackAction(){
  if(!isStackTurn()||!stackGame||typeof stackGame.handleInput!=='function')return;
  stackGame.handleInput();
}

(function setupStackInput(){
  const cv=$('sky-stack-canvas');
  if(!cv)return;
  cv.addEventListener('pointerdown',function(e){
    if(!isStackTurn())return;
    e.preventDefault();
    doStackAction();
  },{passive:false});
})();

function handleMsg(d){
  switch(d.type){
    case 'error':
      $('err').textContent=d.msg||'Erreur';
      break;
    case 'welcome_skyline_spectate':
      isSpectator=true; mySlot=-1; myCode=d.code; syncSpectateStrip();
      hide('scr-name'); show('scr-wait');
      $('w-code').textContent=d.code;
      $('w-hint').textContent='Mode spectateur.';
      $('start-btn').classList.add('hidden');
      break;
    case 'created_skyline':
    case 'welcome_skyline':
      isSpectator=false; syncSpectateStrip();
      mySlot=d.slot; myCode=d.code;
      hide('scr-name'); show('scr-wait');
      $('w-code').textContent=d.code;
      $('w-hint').textContent='';
      break;
    case 'skyline_state':
      if(d.phase==='GAME_OVER'){
        updateState(d);
        break;
      }
      if(d.phase==='WAITING'){
        updateState(d);
        break;
      }
      if(d.phase==='TURNING'){
        updateState(d);
        showGameScreen(d);
      }
      break;
    case 'countdown':
      hide('scr-name'); hide('scr-wait'); hide('scr-game'); hide('scr-over');
      if(window.ZapPlay) ZapPlay.hideLounge();
      show('scr-cd');
      let n=d.seconds||3; $('cd-n').textContent=n;
      const iv=setInterval(()=>{ n--; if(n<=0){ clearInterval(iv); hide('scr-cd'); } else $('cd-n').textContent=n; },1000);
      break;
    case 'skyline_turn_result':
      if(d.slot===mySlot) stopStack();
      if(!d.success) triggerCityBuildingFall();
      if(d.slot===mySlot){
        const bonus=d.pointsDelta!=null?d.pointsDelta:0;
        const sc=d.stackScore!=null?d.stackScore:0;
        if(d.reason==='timeout'){
          flash('Temps écoulé — score envoyé : '+sc+' étages.',false);
        }else if(d.success){
          flash('Tour terminé ! '+sc+' étages · +'+bonus+' pts',true);
        }else{
          flash('Chute ! Score : '+sc+' étages.',false);
        }
      }
      break;
    case 'skyline_round_result':
      resetTowerForNewRound();
      teardownTower3D();
      lastStackTurnKey='';
      (d.bonuses||[]).forEach(b=>{
        if(b.slot===mySlot && b.bonus){
          flash('Objectif manche '+d.round+' atteint ! +'+(b.bonus||0)+' pts', true);
        }
      });
      break;
    case 'player_left':
      $('w-hint').textContent=(d.name||'Un joueur')+' a quitté.';
      break;
    case 'lounge_chat':
      if(window.ZapPlay) ZapPlay.addLoungeMessage(d);
      break;
  }
}

document.addEventListener('keydown', e=>{
  if(e.code==='Space' && !$('scr-game').classList.contains('hidden')){
    const btn=$('tap-btn');
    if(btn && !btn.disabled){ e.preventDefault(); doStackAction(); }
  }
});

(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('create')==='1'&&p.get('name')){
    $('name-input').value=p.get('name');
    pendingAction=()=>send({type:'create_skyline',name:p.get('name')});
  }
  if(p.get('code')&&p.get('name')&&!p.get('create')){
    $('name-input').value=p.get('name');
    $('code-in').value=p.get('code').toUpperCase();
    $('join-area').style.display='flex';
    pendingAction=()=>send({type:'join_skyline',name:p.get('name'),code:p.get('code').toUpperCase()});
  }
  if(p.get('spectate')==='1'&&p.get('code')){
    $('code-in').value=p.get('code').toUpperCase();
    $('join-area').style.display='flex';
    pendingAction=()=>send({type:'join_skyline_spectate',name:p.get('name')||'Spectateur',code:p.get('code').toUpperCase()});
  }
})();
